    .selector{display:flex;align-items:center;justify-content:center;background:#f6fbff;color:var(--accent);font-weight:900;cursor:pointer;user-select:none}.row.selected .selector{background:#bfe6ff}.row input{height:30px;background:transparent;border:0;padding:0 7px;font:16px Barlow,Arial;color:var(--text)}.row input:focus{background:#fff}.row [data-col-wrap].col-selected{background:#eaf8ff}

    .totals{display:flex;justify-content:center;align-items:center;gap:14px}.total-box{display:grid;grid-template-columns:90px 170px;border:1px solid var(--line);background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}.total-box span{padding:8px 10px;background:var(--soft);font:800 18px 'Barlow Condensed';color:var(--muted)}.total-box strong{padding:8px 10px;text-align:right;font-size:18px}

    .order-detail{overflow:auto;padding:14px}.detail-summary{display:grid;grid-template-columns:90px 1fr 130px 150px;gap:8px;margin-bottom:12px}.detail-summary div{border:1px solid #d9edff;border-radius:10px;background:#fff;padding:8px}.detail-summary span{display:block;color:var(--muted);font:800 15px 'Barlow Condensed'}.detail-summary strong{font-size:17px}.detail-table{border:1px solid var(--line);border-radius:12px;overflow:hidden}.detail-row{display:grid;grid-template-columns:120px minmax(260px,1fr) 80px 120px 120px 130px 160px;min-height:32px;border-bottom:1px solid #edf4ff}.detail-row:nth-child(even){background:var(--row)}.detail-row.head{background:var(--soft);font:900 16px 'Barlow Condensed'}.detail-row div{padding:6px 8px;border-right:1px solid #d9edff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.detail-actions{display:flex;justify-content:flex-end;gap:10px;padding:12px 16px;border-top:1px solid #d9edff;background:#fff}.danger{background:linear-gradient(135deg,#df1731,#ff5c8a);border-color:#ff8ba5;color:#fff}
    .context-menu{position:fixed;z-index:95;display:none;min-width:170px;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:var(--shadow);padding:5px}.context-menu.visible{display:block}.context-menu button{width:100%;height:32px;border:0;border-radius:7px;box-shadow:none;text-align:left;background:#fff}.context-menu button:hover{background:var(--select)}
    @media(max-width:1000px){.order-head{grid-template-columns:1fr}.head,.row{grid-template-columns:26px 120px 95px minmax(230px,1fr) 70px 105px 105px 115px 95px 95px 130px}.status{display:none}}
  </style>

<body>
<div class="app">
  <header>
    <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="">
    <h1>Pedidos</h1>
    <div class="top-actions">
      <span class="status" id="status">Inicializando...</span>
      <button class="icon-btn" id="prevOrderBtn" type="button" title="Pedido anterior">‹</button>
      <button class="icon-btn" id="nextOrderBtn" type="button" title="Pedido siguiente">›</button>
      <span class="order-counter" id="orderCounter">0/0</span>
      <button id="newOrderBtn" type="button">Nuevo pedido</button>
      <button id="cancelOrderBtn" type="button">Cancelar pedido</button>
      <button id="historyBtn" type="button">Historial</button>
      <button data-nav-url="menu.html">Menu</button>
    </div>
  </header>
  <section class="order-head">
    <div class="field"><div class="label">Proveedor</div><input id="providerInput" autocomplete="off"></div>
    <div class="field"><div class="label">Nro Pedido</div><input id="orderNumber" inputmode="numeric" readonly></div>
    <label class="toggle-card"><input id="confirmedCheck" type="checkbox"> Pedido?</label>
    <div class="field"><div class="label">Fecha</div><input id="dateInput" type="date"></div>
    <label class="toggle-card catalog-syncing" id="catalogToggleCard"><input id="filterPriceList" type="checkbox"> Filtrar en listas de precio</label>
  </section>
  <section class="table">
    <div class="head">
      <div data-table-select="1">◢</div><div data-col-head="1">Codigo Proveedor</div><div data-col-head="2">Filtro</div><div data-col-head="3">Articulos</div><div data-col-head="4">Cantidad</div><div data-col-head="5">s.iva</div><div data-col-head="6">c.iva</div><div>Subtotal</div><div data-col-head="7">antes</div><div>Diferencia</div><div>Proveedor</div>
    </div>
    <div class="body" id="rows"></div>
    <div class="foot"><span>Registro:</span><span id="recordInfo">0 de 0</span><span id="sourceInfo" style="margin-left:auto"></span></div>
  </section>
  <section class="totals">
    <button class="primary" id="confirmBtn" type="button">Confirmar Pedido</button>
    <div class="total-box"><span>Total</span><strong id="totalValue">$ 0,00</strong></div>
  </section>
</div>
<div class="combo-menu" id="comboMenu"></div>
<div class="context-menu" id="rowContextMenu">
  <button type="button" id="compareRowBtn">Comparar</button>
  <button type="button" id="deleteRowsBtn">Eliminar fila</button>
</div>
<div class="modal" id="historyModal">
  <div class="modal-card">
    <div class="modal-head"><h2>Historial de pedidos confirmados</h2><button id="closeHistoryBtn" type="button">Cerrar</button></div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>
<div class="modal" id="orderDetailModal">
  <div class="modal-card detail-card">
    <div class="modal-head"><h2 id="orderDetailTitle">Pedido</h2><button id="closeOrderDetailBtn" type="button">Cerrar</button></div>
    <div class="order-detail" id="orderDetailBody"></div>
    <div class="detail-actions">
      <button id="editOrderDetailBtn" type="button">Editar</button>
      <button class="danger" id="deleteOrderDetailBtn" type="button">Eliminar pedido</button>
    </div>
  </div>
</div>
<script>
const Core=CorralonSystem;
const Catalog=CorralonSystem.faltantes;
const LOCAL_KEY='corralon_pedidos_actual_v1';
const ORDER_COUNTER_LOCAL_KEY='corralon_pedidos_ultimo_numero_v2';
const ORDER_COUNTER_DOC='pedidos_secuencial_v1';
const FIREBASE_CONFIG={apiKey:'AIzaSyCxwUGX-rVusOI13j7oTfQuAtkeNXdAYH0',authDomain:'corralon-progreso.firebaseapp.com',projectId:'corralon-progreso',storageBucket:'corralon-progreso.firebasestorage.app',messagingSenderId:'466583614632',appId:'1:466583614632:web:42cb839f83e97475fabe9d'};
const cols=[1,2,3,4,5,6];
let db=null,catalog=[],catalogCache={index:null,proveedores:null},providerRows=[],rows=[],headerProviderId='',orderList=[],currentOrderIndex=-1,detailOrderId='',activeCell={row:0,col:3},contextRowIndex=-1,selectedRows=new Set(),selectedCols=new Set(),tableSelected=false,pendingRows=new Set(),suppressArticleChange=new Set(),canceledOrderIds=new Set(),lastSelectedRow=-1,suppressNextFocusCombo=false,combo={input:null,rowIndex:-1,active:0,options:[],mode:'article',navigated:false,loading:false},providerCatalogWorker=null,providerCatalogReady=false,providerCatalogLoading=false,providerCatalogProvider='',providerQuerySeq=0,saveTimer=null,savingRemote=false,saveAgain=false,forceSaveAgain=false;
const els={
  status:document.getElementById('status'),
  orderCounter:document.getElementById('orderCounter'),
  rows:document.getElementById('rows'),
  recordInfo:document.getElementById('recordInfo'),
  sourceInfo:document.getElementById('sourceInfo'),
  catalogToggleCard:document.getElementById('catalogToggleCard'),
  filterPriceList:document.getElementById('filterPriceList'),
  providerInput:document.getElementById('providerInput'),
  orderNumber:document.getElementById('orderNumber'),
  confirmedCheck:document.getElementById('confirmedCheck'),
  dateInput:document.getElementById('dateInput'),
  confirmBtn:document.getElementById('confirmBtn'),
  prevOrderBtn:document.getElementById('prevOrderBtn'),
  nextOrderBtn:document.getElementById('nextOrderBtn'),
  newOrderBtn:document.getElementById('newOrderBtn'),
  cancelOrderBtn:document.getElementById('cancelOrderBtn'),
  historyBtn:document.getElementById('historyBtn'),
  historyModal:document.getElementById('historyModal'),
  historyList:document.getElementById('historyList'),
  closeHistoryBtn:document.getElementById('closeHistoryBtn'),
  orderDetailModal:document.getElementById('orderDetailModal'),
  orderDetailTitle:document.getElementById('orderDetailTitle'),
  orderDetailBody:document.getElementById('orderDetailBody'),
  closeOrderDetailBtn:document.getElementById('closeOrderDetailBtn'),
  editOrderDetailBtn:document.getElementById('editOrderDetailBtn'),
  deleteOrderDetailBtn:document.getElementById('deleteOrderDetailBtn'),
  rowContextMenu:document.getElementById('rowContextMenu'),
  compareRowBtn:document.getElementById('compareRowBtn'),
  deleteRowsBtn:document.getElementById('deleteRowsBtn'),
  totalValue:document.getElementById('totalValue'),
  comboMenu:document.getElementById('comboMenu')
};
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function money(v){return Core.money(v)}
function parseMoney(v){return Core.parseMoney(v)}
function today(){return new Date().toISOString().slice(0,10)}
function orderId(){return String(els.orderNumber.value||'').trim()||String(Date.now()).slice(-6)}
function firebaseDb(){if(db)return db;if(!window.firebase?.firestore)return null;if(!window.firebase.apps.length)window.firebase.initializeApp(FIREBASE_CONFIG);db=window.firebase.firestore();return db}
async function nextOrderNumber(){const localLast=Number(localStorage.getItem(ORDER_COUNTER_LOCAL_KEY)||0);const firestore=firebaseDb();if(!firestore){const next=localLast+1;localStorage.setItem(ORDER_COUNTER_LOCAL_KEY,String(next));return next}try{const ref=firestore.collection('contadores').doc(ORDER_COUNTER_DOC);const next=await firestore.runTransaction(async tx=>{const snap=await tx.get(ref);const remoteLast=Number(snap.exists?snap.data().ultimo:0)||0;const value=Math.max(localLast,remoteLast)+1;tx.set(ref,{ultimo:value,updatedAt:window.firebase.firestore.FieldValue.serverTimestamp()},{merge:true});return value});localStorage.setItem(ORDER_COUNTER_LOCAL_KEY,String(next));return next}catch(error){console.warn(error);const next=localLast+1;localStorage.setItem(ORDER_COUNTER_LOCAL_KEY,String(next));return next}}
async function ensureOrderNumber(){if(String(els.orderNumber.value||'').trim())return;els.orderNumber.value=String(await nextOrderNumber())}
function cleanProviderId(value){return String(value??'').trim().replace(/\.0+$/,'')}
function providerDisplay(provider){const id=cleanProviderId(provider?.id_proveedor||provider?.idProveedor||'');const name=String(provider?.proveedor||'').trim();return id&&name?`${id} - ${name}`:name||id}
function selectedProviderName(){return String(els.providerInput.value||'').replace(/^\s*\d+\s*[-–]\s*/,'').trim()}
function makeRowUid(){return crypto.randomUUID?crypto.randomUUID():`pedido-${Date.now()}-${Math.random().toString(16).slice(2)}`}
function ensureRowUid(row){if(row&&!row.localUid)row.localUid=makeRowUid();return row}
function blankRow(){return{localUid:makeRowUid(),codProv:'',filtro:'',articulo:'',cantidad:'',precioSiva:0,precioCiva:0,subtotal:0,antes:0,diferencia:0,proveedor:'',idProveedor:''}}
function isBlank(row){return !String(row.codProv||row.filtro||row.articulo||row.cantidad||'').trim()}
function isSelectableRow(index){return rows[index]&&!isBlank(rows[index])}
function ensureBlank(){rows.forEach(ensureRowUid);while(rows.length>1&&isBlank(rows[rows.length-1])&&isBlank(rows[rows.length-2]))rows.pop();if(!rows.length||!isBlank(rows[rows.length-1]))rows.push(blankRow())}
function recalc(row){row.precioCiva=Number(row.precioSiva||0)*1.21;row.subtotal=Number(row.precioCiva||0)*Number(row.cantidad||0);row.diferencia=Number(row.precioSiva||0)?((Number(row.antes||0)-Number(row.precioSiva||0))/Number(row.precioSiva||0))*100:0}
function total(){return rows.reduce((sum,row)=>sum+Number(row.subtotal||0),0)}
function saveLocal(){localStorage.setItem(LOCAL_KEY,JSON.stringify({header:headerData(),rows}))}
function loadLocal(){try{const data=JSON.parse(localStorage.getItem(LOCAL_KEY)||'null');if(data){headerProviderId=cleanProviderId(data.header?.idProveedor||data.header?.id_proveedor||'');Object.assign(els.providerInput,{value:data.header?.proveedor||''});els.orderNumber.value=data.header?.id||'';els.confirmedCheck.checked=Boolean(data.header?.confirmado);els.dateInput.value=data.header?.fecha||today();els.filterPriceList.checked=false;rows=Array.isArray(data.rows)?data.rows:[]}}catch{}}
function hasOrderContent(){return String(els.providerInput.value||'').trim()||rows.some(row=>!isBlank(row))}
function normalizeOrderDoc(doc){const data=doc.data?doc.data():doc;return{...data,id:String(data.id||doc.id||''),detalles:Array.isArray(data.detalles)?data.detalles:[]}}
function normalizeOrderList(){const map=new Map();for(const order of orderList){const id=String(order.id||'').trim();if(!id||canceledOrderIds.has(id))continue;map.set(id,{...(map.get(id)||{}),...order,id})}orderList=[...map.values()].sort((a,b)=>Number(a.id)-Number(b.id))}
function pendingOrders(){normalizeOrderList();return orderList.filter(order=>!order.confirmado&&!canceledOrderIds.has(String(order.id))).sort((a,b)=>Number(a.id)-Number(b.id))}
function updateOrderCounter(){const pending=pendingOrders();const index=pending.findIndex(order=>String(order.id)===orderId());if(els.orderCounter)els.orderCounter.textContent=pending.length?`${index>=0?index+1:0}/${pending.length}`:'0/0'}
function clearSelection(){selectedRows.clear();selectedCols.clear();tableSelected=false;lastSelectedRow=-1}
function loadOrder(order){clearSelection();headerProviderId=cleanProviderId(order.idProveedor||order.id_proveedor||'');els.providerInput.value=order.proveedor||'';els.orderNumber.value=String(order.id||'');els.confirmedCheck.checked=Boolean(order.confirmado);els.dateInput.value=order.fecha||today();els.filterPriceList.checked=false;resetProviderCatalog();rows=Array.isArray(order.detalles)&&order.detalles.length?order.detalles.map(row=>({...blankRow(),...row})): [blankRow()];ensureBlank();saveLocal();paint();updateOrderCounter();focusCell(0,3,false)}
async function refreshOrderList(){const firestore=firebaseDb();if(!firestore){updateOrderCounter();return[]}try{const snap=await firestore.collection('pedidos').orderBy('id','asc').get();orderList=snap.docs.map(normalizeOrderDoc).filter(order=>!canceledOrderIds.has(String(order.id)));normalizeOrderList();currentOrderIndex=orderList.findIndex(order=>String(order.id)===orderId());updateOrderCounter();return orderList}catch(error){console.warn(error);updateOrderCounter();return orderList}}
async function newBlankOrder(){clearSelection();headerProviderId='';rows=[blankRow()];els.providerInput.value='';els.orderNumber.value='';els.confirmedCheck.checked=false;els.dateInput.value=today();els.filterPriceList.checked=false;resetProviderCatalog();await ensureOrderNumber();currentOrderIndex=-1;saveLocal();paint();updateOrderCounter();saveRemote(true);focusCell(0,3,false)}
async function openNewOrder(saveCurrent=true){clearTimeout(saveTimer);if(saveCurrent&&hasOrderContent()){const ok=await saveRemote();if(!ok){els.status.textContent='No se pudo guardar el pedido actual';return}}await newBlankOrder();els.status.textContent='Pedido nuevo'}
function setSyncing(value,text='Sincronizando...'){document.body.classList.toggle('syncing',value);if(value)els.status.textContent=text}
function paintRowSyncState(){els.rows.querySelectorAll('.row').forEach(rowEl=>rowEl.classList.toggle('sync-pending',pendingRows.has(rowEl.dataset.uid)))}
function markPending(row){if(!row||isBlank(row))return;ensureRowUid(row);pendingRows.add(row.localUid);paintRowSyncState();els.status.textContent='Pendiente de sincronizar'}
function queueSave(row=null){if(row)markPending(row);saveLocal();clearTimeout(saveTimer)}
function syncPendingRows(){if(!pendingRows.size)return;clearTimeout(saveTimer);saveRemote()}

;req.onsuccess=()=>res(req.result||[]);req.onerror=()=>rej(req.error)})}function scanProvider(db,provider){return new Promise((res,rej)=>{const out=[],target=searchNorm(provider),req=db.transaction('articulos','readonly').objectStore('articulos').openCursor();req.onsuccess=()=>{const cursor=req.result;if(!cursor){res(out);return}if(searchNorm(cursor.value?.proveedor).includes(target))out.push(cursor.value);cursor.continue()};req.onerror=()=>rej(req.error)})}async function load(provider){const providerName=String(provider||'').trim();if(!providerName){data=[];ready=false;loadedProvider='';postMessage({type:'needProvider'});return}const db=await openDb();let rows=await readExactProvider(db,providerName);if(!rows.length)rows=await scanProvider(db,providerName);data=rows.map(normal).filter(r=>r.descripcion||r.idart).sort((a,b)=>String(a.descripcion||'').localeCompare(String(b.descripcion||''),'es',{numeric:true,sensitivity:'base'}));ready=true;loadedProvider=providerName;postMessage({type:'loaded',provider:providerName,total:data.length})}function match(row,f){const words=f.articleWords||[];return(!f.code||row.codProvNorm.includes(f.code)||row.idartNorm.includes(f.code))&&(!words.length||words.every(w=>row.descripcionNorm.includes(w)))}function query(msg){if(!ready||msg.provider!==loadedProvider){postMessage({type:'options',seq:msg.seq,loading:true,rows:[]});return}const f=msg.filter||{},out=[],limit=msg.limit||100;for(let i=0;i<data.length&&out.length<limit;i++)if(match(data[i],f))out.push(data[i]);postMessage({type:'options',seq:msg.seq,rows:out,total:data.length})}onmessage=e=>{const msg=e.data||{};if(msg.type==='load')load(msg.provider).catch(error=>postMessage({type:'error',message:String(error&&error.message||error)}));if(msg.type==='query')query(msg)};`;const worker=new Worker(URL.createObjectURL(new Blob([code],{type:'text/javascript'})));worker.onmessage=event=>{const msg=event.data||{};if(msg.type==='loaded'&&msg.provider===providerCatalogProvider){providerCatalogReady=true;providerCatalogLoading=false;catalog=[];els.sourceInfo.textContent=`Combo: listas de proveedores - ${msg.provider}`;els.status.textContent=`${Number(msg.total||0).toLocaleString('es-AR')} articulos de ${msg.provider}`;setCatalogState('ready');if(combo.input&&combo.mode==='article'&&els.filterPriceList.checked)requestProviderArticleOptions(combo.input.value,combo.rowIndex)}if(msg.type==='needProvider'){providerCatalogLoading=false;providerCatalogReady=false;setCatalogState('syncing');els.status.textContent='Elegí un proveedor para usar listas de precio'}if(msg.type==='options'&&msg.seq===providerQuerySeq){combo.loading=Boolean(msg.loading);combo.options=msg.rows||[];combo.active=Math.max(0,Math.min(combo.active,combo.options.length-1));renderComboOptions()}if(msg.type==='error'){providerCatalogLoading=false;setCatalogState('syncing');els.status.textContent='No se pudo cargar listas de proveedores';console.warn(msg.message)}};return worker}

function setRowValue(row,col,value){if(!row)return;ensureRowUid(row);if(col===1)row.codProv=value;if(col===2)row.filtro=value;if(col===3){if(value!==row.articulo)clearArticleData(row);row.articulo=value}if(col===4)row.cantidad=parseMoney(value)||value;if(col===5)row.precioSiva=parseMoney(value);if(col===6)row.precioSiva=parseMoney(value)/1.21;if(col===7)row.antes=parseMoney(value);recalc(row);pendingRows.add(row.localUid)}
function headerToCol(value){const key=String(value||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();if(key.includes('codigo proveedor'))return 1;if(key==='filtro')return 2;if(key.includes('articulo'))return 3;if(key.includes('cantidad'))return 4;if(key.includes('s.iva'))return 5;if(key.includes('c.iva'))return 6;if(key.includes('antes'))return 7;return null}
function pasteTableText(text){let matrix=parseClipboardTable(text);if(!matrix.length)return false;let headerCols=null;if(looksLikePasteHeader(matrix[0])){headerCols=matrix[0].map(headerToCol);matrix=matrix.slice(1)}if(!matrix.length)return false;const fallbackCols=tableSelected?[1,2,3,4,5,6,7]:(selectedCols.size?[...selectedCols].sort((a,b)=>a-b):(selectedRows.size?cols:cols.slice(Math.max(0,cols.indexOf(activeCell.col)))));let startRow=selectedRows.size?Math.min(...selectedRows):activeCell.row;startRow=Math.max(0,startRow||0);for(let r=0;r<matrix.length;r++){const rowIndex=startRow+r;while(rowIndex>=rows.length)rows.push(blankRow());const row=rows[rowIndex];if(headerCols&&!selectedCols.size&&!tableSelected){headerCols.forEach((col,idx)=>{if(col&&idx<matrix[r].length)setRowValue(row,col,matrix[r][idx]??'')})}else fallbackCols.forEach((col,idx)=>{if(idx<matrix[r].length)setRowValue(row,col,matrix[r][idx]??'')})}ensureBlank();clearSelection();paint();saveLocal();syncPendingRows();const focusCol=(headerCols?.find(Boolean))||fallbackCols[0]||3;focusCell(startRow,focusCol,false);return true}
function shouldHandlePaste(event,text){if(tableSelected||selectedCols.size||selectedRows.size)return true;const input=document.activeElement?.closest?.('#rows [data-col]');if(!input)return false;return text.includes('\t')||text.includes('\n')}
document.querySelector('.head').addEventListener('click',e=>{const table=e.target.closest('[data-table-select]');if(table){selectTable(e);return}const head=e.target.closest('[data-col-head]');if(head)selectColumn(Number(head.dataset.colHead),e)})
document.addEventListener('paste',e=>{const text=e.clipboardData?.getData('text/plain')||'';if(!text||!shouldHandlePaste(e,text))return;e.preventDefault();pasteTableText(text)})
els.rows.addEventListener('click',e=>{const selector=e.target.closest('[data-selector]');if(!selector)return;e.preventDefault();selectRow(Number(selector.closest('.row')?.dataset.row),e)})
els.rows.addEventListener('mousedown',e=>{const input=e.target.closest('[data-col="3"]');if(!input||document.activeElement!==input||!isAllSelected(input))return;requestAnimationFrame(()=>{if(isAllSelected(input))input.setSelectionRange(input.value.length,input.value.length)})})
els.rows.addEventListener('contextmenu',e=>{const rowEl=e.target.closest('.row');if(!rowEl)return;const index=Number(rowEl.dataset.row);contextRowIndex=index;if(isSelectableRow(index)&&!selectedRows.has(index))selectRow(index,e);if(selectedRows.size)showRowContextMenu(e)})
els.rows.addEventListener('input',e=>{const input=e.target.closest('[data-col]');if(!input)return;updateCell(input,false);if(Number(input.dataset.col)===3)showCombo(input,false,'article')})
els.rows.addEventListener('change',e=>{const input=e.target.closest('[data-col]');if(!input)return;const rowEl=input.closest('.row');if(Number(input.dataset.col)===3&&rowEl&&suppressArticleChange.has(rowEl.dataset.uid)){suppressArticleChange.delete(rowEl.dataset.uid);return}updateCell(input,true)})
els.rows.addEventListener('focusin',e=>{const input=e.target.closest('[data-col]');if(!input)return;activeCell={row:Number(input.closest('.row').dataset.row),col:Number(input.dataset.col)};input.select?.();if(suppressNextFocusCombo)suppressNextFocusCombo=false;hideCombo()})
els.rows.addEventListener('focusout',e=>{const rowEl=e.target.closest('.row');if(!rowEl)return;const nextRow=e.relatedTarget?.closest?.('.row');if(nextRow===rowEl)return;setTimeout(()=>{const activeRow=document.activeElement?.closest?.('.row');if(activeRow===rowEl)return;const row=rows[Number(rowEl.dataset.row)];if(row&&pendingRows.has(row.localUid))syncPendingRows()},0)})
els.comboMenu.addEventListener('mousedown',e=>{e.preventDefault();const opt=e.target.closest('[data-index]');if(opt)pickCombo(Number(opt.dataset.index))})
document.addEventListener('mousedown',e=>{if(!e.target.closest('#comboMenu')&&!e.target.closest('.article-input')&&!e.target.closest('#providerInput'))hideCombo()})
document.addEventListener('mousedown',e=>{if(!e.target.closest('#rowContextMenu'))hideRowContextMenu()})
els.rowContextMenu.addEventListener('mousedown',e=>e.stopPropagation())
els.compareRowBtn.addEventListener('click',()=>{hideRowContextMenu();openCompareForContextRow()})
els.deleteRowsBtn.addEventListener('click',()=>{hideRowContextMenu();deleteSelectedRows()})
els.providerInput.addEventListener('focus',()=>{els.providerInput.select();showCombo(els.providerInput,false,'provider')})
els.providerInput.addEventListener('input',()=>{headerProviderId='';resetProviderCatalog();showCombo(els.providerInput,false,'provider')})
;[els.orderNumber,els.dateInput,els.confirmedCheck].forEach(input=>input.addEventListener('change',()=>{queueSave();saveRemote()}))
Catalog.bindCatalogToggle(els.filterPriceList,()=>scheduleCatalogLoad(false,()=>{if(combo.input)showCombo(combo.input,true,combo.mode)}))
els.confirmBtn.addEventListener('click',async()=>{clearTimeout(saveTimer);try{exportPedidoExcel()}catch(error){console.warn(error);els.status.textContent='No se pudo generar el Excel';return}els.confirmedCheck.checked=true;paint();saveLocal();els.status.textContent='Guardando pedido...';const ok=await saveRemote(true);if(ok){await refreshOrderList();await newBlankOrder();els.status.textContent='Pedido confirmado. Excel generado y nuevo pedido listo'}else els.status.textContent='Excel generado, pero no se pudo guardar en nube'})
els.newOrderBtn.addEventListener('click',()=>openNewOrder(true))
async function cancelCurrentOrder(){if(!confirm('Cancelar este pedido y borrar todo?'))return;clearTimeout(saveTimer);const id=String(orderId()).trim();if(id)canceledOrderIds.add(id);normalizeOrderList();const pending=pendingOrders().filter(order=>String(order.id)!==id);let nextOrder=null;if(pending.length){const after=pending.find(order=>Number(order.id)>Number(id));nextOrder=after||pending[0]}orderList=orderList.filter(order=>String(order.id)!==id);updateOrderCounter();pendingRows.clear();paintRowSyncState();if(nextOrder){loadOrder(nextOrder);els.status.textContent='Pedido cancelado. Siguiente pedido cargado'}else{await newBlankOrder();els.status.textContent='Pedido cancelado. Pedido nuevo'}const firestore=firebaseDb();if(firestore&&id)firestore.collection('pedidos').doc(id).delete().then(()=>refreshOrderList().catch(console.warn)).catch(error=>{console.warn(error);els.status.textContent='No pude borrar el pedido en nube'})}
els.cancelOrderBtn.addEventListener('click',()=>cancelCurrentOrder())
function jumpPendingOrder(direction){if(hasOrderContent())syncCurrentOrderInBackground();const pending=pendingOrders();if(!pending.length){preloadPendingOrdersBackground();return}let idx=pending.findIndex(order=>String(order.id)===orderId());idx=direction<0?(idx<=0?pending.length-1:idx-1):(idx<0||idx>=pending.length-1?0:idx+1);loadOrder(pending[idx]);els.status.textContent='Pedido pendiente cargado'}
els.prevOrderBtn.addEventListener('click',()=>jumpPendingOrder(-1))
els.nextOrderBtn.addEventListener('click',()=>jumpPendingOrder(1))
function renderHistory(orders){const confirmed=orders.filter(order=>order.confirmado).sort((a,b)=>String(b.fecha||'').localeCompare(String(a.fecha||''))||Number(b.id)-Number(a.id));els.historyList.innerHTML=`<div class="history-row head"><div>Nro</div><div>Proveedor</div><div>Fecha</div><div>Total</div><div>Lineas</div><div></div></div>`+(confirmed.map(order=>`<div class="history-row" data-history-order="${esc(order.id)}"><div>${esc(order.id)}</div><div>${esc(order.proveedor||'')}</div><div>${esc(order.fecha||'')}</div><div>${money(order.total||0)}</div><div>${(order.detalles||[]).length}</div><div>Abrir</div></div>`).join('')||'<div style="padding:18px;font-weight:800;color:var(--muted)">No hay pedidos confirmados todavia.</div>')}
function renderOrderDetail(order){detailOrderId=String(order.id||'');els.orderDetailTitle.textContent=`Pedido ${detailOrderId}`;const details=Array.isArray(order.detalles)?order.detalles:[];els.orderDetailBody.innerHTML=`<div class="detail-summary"><div><span>Nro</span><strong>${esc(order.id)}</strong></div><div><span>Proveedor</span><strong>${esc(order.proveedor||'')}</strong></div><div><span>Fecha</span><strong>${esc(order.fecha||'')}</strong></div><div><span>Total</span><strong>${money(order.total||0)}</strong></div></div><div class="detail-table"><div class="detail-row head"><div>Cod Prov</div><div>Articulo</div><div>Cant.</div><div>s.iva</div><div>c.iva</div><div>Subtotal</div><div>Proveedor</div></div>${details.map(row=>`<div class="detail-row"><div>${esc(row.codProv||'')}</div><div>${esc(row.articulo||'')}</div><div class="money">${esc(row.cantidad||'')}</div><div class="money">${money(row.precioSiva||0)}</div><div class="money">${money(row.precioCiva||0)}</div><div class="money">${money(row.subtotal||0)}</div><div>${esc(row.proveedor||'')}</div></div>`).join('')||'<div style="padding:16px;font-weight:800;color:var(--muted)">Este pedido no tiene articulos.</div>'}</div>`}
function openOrderDetail(id){const order=orderList.find(item=>String(item.id)===String(id));if(!order)return;renderOrderDetail(order);els.orderDetailModal.classList.add('visible')}
async function deleteOrder(id){const firestore=firebaseDb();if(!firestore){els.status.textContent='Sin conexion a Firebase';return false}try{await firestore.collection('pedidos').doc(String(id)).delete();orderList=orderList.filter(order=>String(order.id)!==String(id));if(String(orderId())===String(id))await newBlankOrder();updateOrderCounter();return true}catch(error){console.warn(error);els.status.textContent='No se pudo eliminar el pedido';return false}}
els.historyBtn.addEventListener('click',async()=>{els.historyModal.classList.add('visible');renderHistory(await refreshOrderList())})
els.closeHistoryBtn.addEventListener('click',()=>els.historyModal.classList.remove('visible'))
els.historyModal.addEventListener('mousedown',e=>{if(e.target===els.historyModal)els.historyModal.classList.remove('visible')})
els.historyList.addEventListener('click',e=>{const row=e.target.closest('[data-history-order]');if(row)openOrderDetail(row.dataset.historyOrder)})
els.closeOrderDetailBtn.addEventListener('click',()=>els.orderDetailModal.classList.remove('visible'))
els.orderDetailModal.addEventListener('mousedown',e=>{if(e.target===els.orderDetailModal)els.orderDetailModal.classList.remove('visible')})
els.editOrderDetailBtn.addEventListener('click',()=>{const order=orderList.find(item=>String(item.id)===String(detailOrderId));if(order){els.orderDetailModal.classList.remove('visible');els.historyModal.classList.remove('visible');loadOrder(order);els.status.textContent='Pedido cargado para editar'}})
els.deleteOrderDetailBtn.addEventListener('click',async()=>{if(!detailOrderId)return;if(!confirm('Eliminar este pedido?'))return;const ok=await deleteOrder(detailOrderId);if(ok){els.orderDetailModal.classList.remove('visible');renderHistory(orderList);els.status.textContent='Pedido eliminado'}})
document.addEventListener('keydown',e=>{if(e.key==='F1'){e.preventDefault();els.providerInput.focus();els.providerInput.select();return}if(e.key==='Escape'&&els.comboMenu.classList.contains('visible')){e.preventDefault();hideCombo();return}if(e.key==='Delete'&&selectedRows.size){e.preventDefault();hideRowContextMenu();deleteSelectedRows();return}const input=document.activeElement?.closest?.('[data-col]');if(input){if(e.key==='F2'){e.preventDefault();toggleFieldSelection(input);hideCombo();return}const col=Number(input.dataset.col);if(col===3&&els.comboMenu.classList.contains('visible')){if(e.key==='ArrowDown'){e.preventDefault();combo.active=combo.navigated?Math.min(combo.options.length-1,combo.active+1):0;combo.navigated=true;showCombo(combo.input,true,combo.mode);return}if(e.key==='ArrowUp'){e.preventDefault();combo.active=Math.max(0,combo.active-1);combo.navigated=true;showCombo(combo.input,true,combo.mode);return}if(e.key==='Enter'&&combo.options.length&&combo.navigated){e.preventDefault();pickCombo();return}if(e.key==='Enter')hideCombo()}if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();updateCell(input,true);moveCell(0,e.shiftKey?-1:1);return}if(e.key==='ArrowDown'){e.preventDefault();updateCell(input,true);moveCell(1,0);return}if(e.key==='ArrowUp'){e.preventDefault();updateCell(input,true);moveCell(-1,0);return}if(e.key==='ArrowRight'||e.key==='ArrowLeft'){const all=input.selectionStart===0&&input.selectionEnd===input.value.length;const atStart=input.selectionStart===0&&input.selectionEnd===0;const atEnd=input.selectionStart===input.value.length&&input.selectionEnd===input.value.length;if(all||(e.key==='ArrowLeft'&&atStart)||(e.key==='ArrowRight'&&atEnd)){e.preventDefault();moveCell(0,e.key==='ArrowRight'?1:-1)}}}})
async function init(){els.dateInput.value=today();loadLocal();if(!localStorage.getItem(ORDER_COUNTER_LOCAL_KEY)&&Number(els.orderNumber.value)>1000)els.orderNumber.value='';if(!els.dateInput.value)els.dateInput.value=today();await ensureOrderNumber();if(!rows.length)rows=[blankRow()];setCatalogState('syncing');paint();Promise.all([loadProviders(),refreshOrderList()]).then(()=>paint()).catch(console.warn);scheduleCatalogLoad(false);focusCell(0,3,false)}
init();
</script>
