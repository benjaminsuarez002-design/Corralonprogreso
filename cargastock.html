  <style>
    *{box-sizing:border-box}
    :root{--red:#e8183a;--purple:#6d5df7;--line:#8bc7ff;--soft:#eef8ff;--bg:#f6fcff;--row:#f7fbff;--text:#20223a;--muted:#6d7190;--ok:#d9f8e4;--ok2:#079a52;--bad:#ffe0e6;--bad2:#d7163c}
    html,body{margin:0;height:100%;overflow:hidden}
    body{font-family:Barlow,Arial,sans-serif;color:var(--text);background:linear-gradient(135deg,#f7feff,#f5f1ff 72%,#fff)}
    .app{height:100dvh;display:grid;grid-template-rows:54px auto 1fr auto}
    header{display:flex;align-items:center;gap:14px;padding:0 24px;background:rgba(255,255,255,.86);box-shadow:0 12px 34px rgba(81,129,255,.14);border-bottom:1px solid #d8ecff;backdrop-filter:blur(10px)}

    h1{font:900 32px 'Barlow Condensed';margin:0;color:var(--red);letter-spacing:.2px}

    .status{font:800 14px Barlow;color:var(--muted);min-width:250px;text-align:right}
    button{height:36px;border:1px solid var(--line);border-radius:9px;background:#fff;color:#19223b;font:900 18px 'Barlow Condensed';padding:5px 16px;cursor:pointer;box-shadow:0 2px 5px #0001}

    input,select{width:100%;height:36px;border:1px solid #bde4ff;border-radius:8px;background:#fff;color:#111a33;padding:4px 9px;font:700 18px 'Barlow Condensed';outline:0}

    .combo-list{position:absolute;z-index:30;left:0;right:0;top:100%;max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:0 16px 34px #1e304c2e;display:none}

    .provider-modal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--soft);border-bottom:1px solid #cfe8ff;color:#4350c8;font:900 22px 'Barlow Condensed'}

    .table-wrap{min-height:0;margin:14px 22px;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 8px 22px #1e304c17;overflow:hidden;display:grid;grid-template-rows:34px 1fr 28px}

    .row{min-height:32px;border-bottom:1px solid #e6f1fb;font:700 16px Barlow;background:#fff}
    .row:nth-child(even){background:var(--row)}

    .row.ok .state{color:#fff;background:var(--ok2)}

    .row .num{text-align:right;font-variant-numeric:tabular-nums}
    .row [contenteditable="true"]{outline:0;min-height:20px}
    .head [data-col-select]{cursor:pointer;user-select:none}
    .head [data-col-select].is-selected,.row [data-row-select].is-selected{background:rgba(109,93,247,.18);box-shadow:inset 0 0 0 2px rgba(109,93,247,.55)}
    .head [data-sort-key].sort-asc::after{content:" ▲";font-size:12px}
    .head [data-sort-key].sort-desc::after{content:" ▼";font-size:12px}
    .row [data-row-select]{cursor:pointer;user-select:none;background:#eef8ff}
    .row [data-field].is-selected{background:rgba(109,93,247,.13);box-shadow:inset 0 0 0 2px rgba(109,93,247,.65)}
    .row [data-field].is-active-cell{background:rgba(109,93,247,.13);box-shadow:inset 0 0 0 2px rgba(109,93,247,.65)}
    .row [data-field].currency-raw-selected{background:#fff;box-shadow:inset 0 0 0 2px #7d6cff}
    .foot{display:flex;align-items:center;gap:14px;padding:4px 9px;background:#fff;border-top:1px solid #d9edff;font:800 13px Barlow;color:var(--muted)}
    .foot-totals{margin-left:auto;display:flex;align-items:center;gap:16px;font:900 16px 'Barlow Condensed';color:#17315f}
    .actions-bottom{display:flex;align-items:center;justify-content:center;gap:14px;padding:0 22px 18px}
    .summary-pill{height:38px;min-width:150px;padding:6px 14px;border:1px solid #bde4ff;border-radius:9px;background:#f7fcff;font:900 18px 'Barlow Condensed';color:#17315f}
    .empty{padding:34px;text-align:center;font:900 24px 'Barlow Condensed';color:#6d7190}
    .toast{position:fixed;left:50%;bottom:24px;translate:-50% 0;background:#172033;color:#fff;border-radius:999px;padding:10px 18px;font-weight:800;opacity:0;pointer-events:none;transition:.15s}
    .toast.visible{opacity:1}
    @media(max-width:900px){
      .toolbar label:first-child,.toolbar label:not(:first-child){flex:1 1 100%}
      .table-wrap{overflow-x:auto}
      .head,.row{min-width:980px}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="">
    <h1>Carga Stock</h1>
    <div class="header-actions">
      <div class="status" id="status">Inicializando...</div>
      <button id="viewProviderBtn" type="button">Proveedor</button>
      <button data-nav-url="menu.html" type="button">Menu</button>
    </div>
  </header>

  <section class="toolbar">
    <label>Proveedor
      <div class="combo-field" id="providerCombo">
        <input id="providerInput" type="text" autocomplete="off" placeholder="Buscar proveedor...">
        <div class="combo-list" id="providerList"></div>
      </div>
    </label>
    <label>Desc. factura
      <input id="providerInvoiceDiscount" class="provider-percent-live" type="text" inputmode="decimal" data-format="percent" value="0,00 %">
    </label>
    <label>Desc. final factura
      <input id="providerFinalInvoiceDiscount" class="provider-percent-live" type="text" inputmode="decimal" data-format="percent" value="0,00 %">
    </label>
    <label>Flete
      <input id="providerFreight" class="provider-percent-live" type="text" inputmode="decimal" data-format="percent" value="0,00 %">
    </label>
    <label>Iva incluido
      <div class="info-check"><input id="providerIvaIncluded" type="checkbox"></div>
    </label>
    <label>Iva
      <input id="providerIva" class="provider-percent-live" type="text" inputmode="decimal" data-format="percent" value="0,00 %">

  <section class="table-wrap">
    <div class="head">
      <div class="corner" id="corner" data-table-corner title="Doble clic para pegar toda la tabla"></div>

      <div class="foot-totals">
        <span id="totalUnitario">Unitario: $ 0,00</span>

  <section class="actions-bottom">

</div>
<div class="modal-backdrop" id="providerModal">
  <div class="provider-modal">
    <div class="provider-modal-head">
      <span class="provider-modal-title">Proveedor <button class="provider-edit-btn" type="button" id="editProviderModalBtn" title="Editar">✎</button></span>
      <button type="button" id="closeProviderModalBtn">Cerrar</button>
    </div>
    <div class="provider-modal-grid">
      <label>IDProveedor</label><input id="modalProviderId" readonly>
      <label>Proveedor</label><input id="modalProviderName" readonly>
      <label>Desc. factura</label><input id="modalDiscountInvoice" readonly>
      <label>Desc. final factura</label><input id="modalDiscountFinalInvoice" readonly>
      <label>Desc. lista</label><input id="modalDiscountList" readonly>
      <label>Ultima act.</label><input id="modalDate" readonly>
      <label>Vendedor</label><input id="modalSeller" readonly>
      <label>Telefono</label><input id="modalPhone" readonly>
      <label>Pagina</label><input id="modalPageLink" readonly>
      <label>Porc. flete</label><input id="modalFreight" readonly>
      <label>Porc. IVA</label><input id="modalIva" readonly>
      <label>Iva incluido?</label><input id="modalIvaIncluded" type="checkbox" disabled>
      <label>Nota</label><textarea id="modalNote" readonly></textarea>

    <div class="provider-modal-actions">
      <button class="provider-hidden" type="button" id="saveProviderModalBtn">Guardar</button>
      <button type="button" id="closeProviderModalActionBtn">Cerrar</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDocFromServer, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCxwUGX-rVusOI13j7oTfQuAtkeNXdAYH0",
  authDomain: "corralon-progreso.firebaseapp.com",
  projectId: "corralon-progreso",
  storageBucket: "corralon-progreso.firebasestorage.app",
  messagingSenderId: "466583614632",
  appId: "1:466583614632:web:42cb839f83e97475fabe9d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const CACHE_KEY = 'corralon_carga_stock_rows_v1';
const PROVIDER_KEY = 'corralon_carga_stock_provider_v1';
const INDEX_CODES_CACHE_KEY = 'corralon_carga_stock_index_codes_v1';

let providers = [];
let provider = null;
let rowsData = [];
let indexCodes = new Set();
let undoStack = null;
let editSnapshot = null;
let editHadChanges = false;
let tableEditUndoPushed = false;
let tableSelectionApi = null;
let suppressFullSelectTarget = null;
let mouseEditTarget = null;
let activeToolbarField = null;
let providerMouseEdit = false;
const selectedRows = new Set();
const selectedCols = new Set();
let rowSelectionAnchor = null;
let colSelectionAnchor = null;

const FX = window.CorralonFunciones || {};

const el = {
  status: document.getElementById('status'),
  providerInput: document.getElementById('providerInput'),
  providerList: document.getElementById('providerList'),
  providerInvoiceDiscount: document.getElementById('providerInvoiceDiscount'),
  providerFinalInvoiceDiscount: document.getElementById('providerFinalInvoiceDiscount'),
  providerFreight: document.getElementById('providerFreight'),
  providerIvaIncluded: document.getElementById('providerIvaIncluded'),
  providerIva: document.getElementById('providerIva'),
  rows: document.getElementById('rows'),
  corner: document.getElementById('corner'),
  totalRows: document.getElementById('totalRows'),
  totalUnitario: document.getElementById('totalUnitario'),
  totalFinal: document.getElementById('totalFinal'),
  copySummary: document.getElementById('copySummary'),
  toast: document.getElementById('toast')
};

function norm(value) {
  return String(value ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().replace(/\s+/g, ' ').trim();
}
function codeKey(value) {
  const raw = norm(value).replace(/\s+/g, '');
  if (!raw) return '';
  return raw;
}
function codeVariants(value) {
  const key = codeKey(value);
  if (!key) return [];
  const out = new Set([key]);
  if (/^\d+$/.test(key)) out.add(key.replace(/^0+/, '') || '0');
  return [...out];
}
function moneyNumber(value) {
  return window.CorralonSystem?.parseMoney ? CorralonSystem.parseMoney(value) : Number(String(value || '').replace(/\./g, '').replace(',', '.').replace(/[^0-9.-]/g, '')) || 0;
}
function money(value) {
  return `$ ${Number(value || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
}
function rawNumber(value) {
  return Number(value || 0).toFixed(2).replace('.', ',');
}
function parsePercent(value) {
  return moneyNumber(value) / 100;
}
function percent(value) {
  return `${(Number(value || 0) * 100).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} %`;
}
function modalValue(id) {
  return document.getElementById(id);
}
function parseModalPercent(id) {
  return parsePercent(modalValue(id)?.value || '0');
}
function escapeHtml(value) {
  return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function show(message) {
  el.toast.textContent = message;
  el.toast.classList.add('visible');
  clearTimeout(show.timer);
  show.timer = setTimeout(() => el.toast.classList.remove('visible'), 1800);
}
function saveRows() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(rowsData)); } catch (_) {}
}
function loadRows() {
  try {
    const parsed = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
    rowsData = Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    rowsData = [];
  }
}
function rowsState() {
  return rowsData.map((row) => ({ ...row }));
}
function restoreRowsState(state) {
  rowsData = Array.isArray(state) ? state.map((row, index) => normalizeRow(row, index)) : [];
  saveRows();
  render();
  show('Cambio deshecho');
}
function pushUndoSnapshot(state = rowsState()) {
  if (undoStack && Array.isArray(state)) undoStack.push(state);
}
function startCellEditSnapshot() {
  editSnapshot = rowsState();
  editHadChanges = false;
}
function commitCellEditSnapshot() {
  if (editHadChanges && editSnapshot) pushUndoSnapshot(editSnapshot);
  editSnapshot = null;
  editHadChanges = false;
}
function beginTableEditUndo() {
  if (tableEditUndoPushed) return;
  pushUndoSnapshot();
  tableEditUndoPushed = true;
}
function finishTableEditUndo(message = '') {
  tableEditUndoPushed = false;
  saveRows();
  render();
  if (message) show(message);
}
function readField(source, names) {
  for (const name of names) {
    if (source && Object.prototype.hasOwnProperty.call(source, name)) return source[name];
  }
  const keys = Object.keys(source || {});
  for (const name of names) {
    const found = keys.find((key) => norm(key) === norm(name));
    if (found) return source[found];
  }
  return '';
}
function articleProviderCodes(article = {}) {
  const value = readField(article, [
    'idartprov', 'idArtProv', 'idart_prov', 'id_art_prov',
    'codprov', 'codProv', 'cod_prov', 'codigoProveedor',
    'codigo_proveedor', 'codigo_prov', 'codProveedor',
    'CodProveedor', 'CodProveed'
  ]);
  return codeVariants(value);
}
function isGreen(row) {
  return codeVariants(row.codigo).some((key) => indexCodes.has(key));
}
function calcPrecioFinal(row) {
  const precio = Number(row.precio) || 0;
  const descuento = Number(row.descuento ?? providerDiscountValue()) || 0;
  const flete = Number(provider?.porc_flete || 0) || 0;
  const iva = Number(provider?.porc_iva || 0) || 0;
  const ivaIncluido = boolInput(provider?.iva_incluido);
  let base = precio * (1 - descuento) * (1 + flete);
  base *= (1 - (Number(row.descuentoAdicional || 0) || 0));
  base = ivaIncluido ? (base / (1 + iva)) : (base * (1 + iva));
  return base;
}
function calcPrecioFinalTotal(row) {
  const precio = Number(row.precio) || 0;
  const descuento = Number(provider?.descuento_total_fc ?? provider?.descuento_final_factura ?? 0) || 0;
  const flete = Number(provider?.porc_flete || 0) || 0;
  const iva = Number(provider?.porc_iva || 0) || 0;
  const ivaIncluido = boolInput(provider?.iva_incluido);
  let base = precio * (1 - descuento) * (1 + flete);
  base = ivaIncluido ? (base / (1 + iva)) : (base * (1 + iva));
  return base;
}
function providerDiscountValue() {
  return Number(provider?.descuento_factura || 0) || 0;
}
function boolInput(value) {
  return value === true || value === 1 || value === '1' || String(value).toLowerCase() === 'true' || String(value).toLowerCase() === 'si';
}
function renderProviderInfo() {
  el.providerInvoiceDiscount.value = percent(provider?.descuento_factura || 0);
  el.providerFinalInvoiceDiscount.value = percent(provider?.descuento_total_fc ?? provider?.descuento_final_factura ?? 0);
  el.providerFreight.value = percent(provider?.porc_flete || 0);
  el.providerIvaIncluded.checked = boolInput(provider?.iva_incluido);
  el.providerIva.value = percent(provider?.porc_iva || 0);
}
function updateProviderOverrides() {
  pushUndoSnapshot();
  if (!provider) provider = {};
  provider.descuento_factura = parsePercent(el.providerInvoiceDiscount.value);
  provider.descuento_total_fc = parsePercent(el.providerFinalInvoiceDiscount.value);
  provider.porc_flete = parsePercent(el.providerFreight.value);
  provider.iva_incluido = el.providerIvaIncluded.checked;
  provider.porc_iva = parsePercent(el.providerIva.value);
  rowsData.forEach((row) => row.descuento = provider.descuento_factura);
  saveRows();
  render();
}
function providerLabel(item) {
  return String(item?.proveedor || '').trim();
}
function filteredProviders() {
  const terms = norm(el.providerInput.value).split(' ').filter(Boolean);
  const source = terms.length
    ? providers.filter((item) => {
      const hay = norm(`${item.id_proveedor || ''} ${item.proveedor || ''}`);
      return terms.every((term) => hay.includes(term));
    })
    : providers;
  return source.slice(0, 40);
}
function setProvider(nextProvider, options = {}) {
  pushUndoSnapshot();
  provider = nextProvider || null;
  if (provider && !options.keepText) el.providerInput.value = providerLabel(provider);
  if (provider) localStorage.setItem(PROVIDER_KEY, String(provider.id_proveedor));
  else localStorage.removeItem(PROVIDER_KEY);
  renderProviderInfo();
  const desc = providerDiscountValue();
  rowsData.forEach((row) => row.descuento = desc);
  saveRows();
  render();
}
function applyProvider() {

  selectedRows.clear();
  applyTableSelectionMarks();
}
function deleteSelectedRows() {
  if (!selectedRows.size) return false;
  pushUndoSnapshot();
  rowsData = rowsData.filter((_, index) => !selectedRows.has(index));
  clearTableSelections();
  saveRows();
  render();
  show('Filas borradas');
  return true;
}
function pasteIntoSelectedColumns(text) {
  if (!selectedCols.size) return false;
  const table = FX.parseClipboardTable ? FX.parseClipboardTable(text) : String(text || '').split(/\r?\n/).map((line) => line.split('\t'));
  const cols = [...selectedCols].sort((a, b) => a - b);
  if (!table.length || !cols.length) return false;
  pushUndoSnapshot();
  table.forEach((line, rowIndex) => {
    cols.forEach((col, selectedIndex) => {
      const cell = editableCellAt(rowIndex, col);
      if (cell) setEditableCellValue(cell, line[selectedIndex] ?? line[0] ?? '');
    });
  });
  finishTableEditUndo('Columnas pegadas');
  return true;
}
function sortRowsBy(key, dir) {
  if (!key || !dir) return;
  pushUndoSnapshot();
  const numeric = key === 'cantidad' || key === 'precio' || key === 'descuento' || key === 'precioFinal';
  const factor = dir === 'desc' ? -1 : 1;
  rowsData.sort((a, b) => {
    const av = key === 'precioFinal' ? calcPrecioFinal(a) : (key === 'descuento' ? Number(a.descuentoAdicional || 0) : (numeric ? moneyNumber(a[key]) : norm(a[key])));
    const bv = key === 'precioFinal' ? calcPrecioFinal(b) : (key === 'descuento' ? Number(b.descuentoAdicional || 0) : (numeric ? moneyNumber(b[key]) : norm(b[key])));
    if (numeric) return (av - bv) * factor;
    return String(av).localeCompare(String(bv), 'es') * factor;
  });
  clearTableSelections();
  saveRows();
  render();
}
function initFuncionesJsBindings() {
  undoStack = FX.createUndoStack ? FX.createUndoStack({
    getState: rowsState,
    restoreState: restoreRowsState,
    onStatus: show
  }) : null;

  if (FX.bindLabelSelect) FX.bindLabelSelect({ root: document });

  if (FX.bindLiveLocaleNumber) FX.bindLiveLocaleNumber({
    root: document.querySelector('.toolbar'),
    selector: '.provider-percent-live',
    decimals: 2,
    suffix: ' %'
  });

  if (FX.bindTableSelectPaste) tableSelectionApi = FX.bindTableSelectPaste({
    root: document.querySelector('.table-wrap'),
    cellSelector: '[data-field][data-row][data-col]',
    columnSelector: '[data-col-select]',
    cornerSelector: '[data-table-corner]',
    selectedClass: 'is-selected',
    activeClass: 'is-active-cell',
    clearOnDelete: false,
    getPosition: editableCellPosition,
    findCell: editableCellAt,
    getCellValue: getEditableCellValue,
    setCellValue: setEditableCellValue,
    pasteText: (text) => pasteIntoSelectedColumns(text),
    afterPaste: (rows) => finishTableEditUndo(`${rows.length} fila${rows.length === 1 ? '' : 's'} pegada${rows.length === 1 ? '' : 's'}`),
    afterClear: () => finishTableEditUndo('Celdas borradas'),
    selectOnCellMouseDown: true,
    afterSelect: (cells) => {
      const cell = cells[cells.length - 1];
      if (cell) {
        cell.focus?.({ preventScroll: true });
        selectEditableCellText(cell);
      }
    }
  });

  if (FX.bindTableSort) FX.bindTableSort({
    root: document.querySelector('.head'),
    headerSelector: '[data-sort-key]',
    sort: sortRowsBy
  });

  if (FX.bindRawCurrencySelection) FX.bindRawCurrencySelection({
    root: el.rows,
    selector: '[data-currency-cell="1"]',
    prefix: '$ ',
    decimals: 2,
    selectedClass: 'currency-raw-selected'
  });

  document.addEventListener('keydown', (event) => {
    if (FX.isUndoShortcut ? FX.isUndoShortcut(event) : (event.ctrlKey && !event.shiftKey && String(event.key || '').toLowerCase() === 'z')) {
      if (undoStack?.undo()) event.preventDefault();
    }
  });
  document.addEventListener('keydown', handleRuleNavigation, true);
}

el.providerInput.addEventListener('input', () => {
  el.providerInput.dataset.fullSelected = '0';
  providerMouseEdit = true;
  provider = null;
  openProviderList();
});
el.providerInput.addEventListener('focus', () => {
  activeToolbarField = el.providerInput;
  if (providerMouseEdit) return;
  if (suppressFullSelectTarget === el.providerInput) {
    suppressFullSelectTarget = null;
    return;
  }
  scheduleFullSelect(el.providerInput);
});
el.providerInput.addEventListener('keydown', (event) => {
  if (event.defaultPrevented) return;
  if (event.key === 'F4') {
    event.preventDefault();
    openProviderList();
    return;
  }
  if (event.key === 'ArrowDown') {
    if (el.providerList.classList.contains('open')) {
      event.preventDefault();
      moveProviderActive(1);
    }
    return;
  }
  if (event.key === 'ArrowUp') {
    if (el.providerList.classList.contains('open')) {
      event.preventDefault();
      moveProviderActive(-1);
    }
    return;
  }
  if (event.key === 'Enter') {
    if (!el.providerInput.value.trim()) {
      closeProviderList();
      focusNextToolbarField(el.providerInput, 1);
      event.preventDefault();
      return;
    }
    const active = el.providerList.querySelector('.combo-option.active[data-id]');
    if (active) {
      event.preventDefault();
      pickProviderById(active.dataset.id);
      focusNextToolbarField(el.providerInput, 1);
      return;
    }
    if (!el.providerList.classList.contains('open') && focusNextToolbarField(el.providerInput, 1)) event.preventDefault();
  }
});
el.providerInput.addEventListener('blur', () => {
  providerMouseEdit = false;
});
el.providerList.addEventListener('mousedown', (event) => {
  const option = event.target.closest('[data-id]');
  if (!option) return;
  event.preventDefault();
  pickProviderById(option.dataset.id);
});
document.addEventListener('mousedown', (event) => {
  if (!event.target.closest('#providerCombo')) closeProviderList();
});
[el.providerInvoiceDiscount, el.providerFinalInvoiceDiscount, el.providerFreight, el.providerIva].forEach((input) => {
  input.addEventListener('input', () => { input.dataset.fullSelected = '0'; });
  input.addEventListener('focus', () => {
    input.value = rawNumber(moneyNumber(input.value));
    if (suppressFullSelectTarget === input) {
      suppressFullSelectTarget = null;
      return;
    }
    scheduleFullSelect(input);
  });
  input.addEventListener('change', updateProviderOverrides);
  input.addEventListener('blur', () => { updateProviderOverrides(); renderProviderInfo(); });
});
el.providerIvaIncluded.addEventListener('keydown', (event) => {
  if (event.key === ' ') {
    event.preventDefault();
    el.providerIvaIncluded.checked = !el.providerIvaIncluded.checked;
    updateProviderOverrides();
  }
});
el.providerIvaIncluded.addEventListener('change', updateProviderOverrides);
document.querySelector('.toolbar').addEventListener('pointerdown', toolbarFieldPointerDown, true);
document.addEventListener('focusin', (event) => {
  if (!event.target.closest?.('.toolbar')) {
    activeToolbarField = null;
    providerMouseEdit = false;
  }
});
document.getElementById('viewProviderBtn').addEventListener('click', openProviderModal);
document.getElementById('editProviderModalBtn').addEventListener('click', () => setProviderModalEditing(true));
document.getElementById('saveProviderModalBtn').addEventListener('click', async () => {
  try {
    await saveProviderModal();
  } catch (error) {
    console.error(error);
    show('No se pudo guardar el proveedor');
  }
});
document.getElementById('closeProviderModalBtn').addEventListener('click', closeProviderModal);
document.getElementById('closeProviderModalActionBtn').addEventListener('click', closeProviderModal);
document.getElementById('providerModal').addEventListener('mousedown', (event) => {
  if (event.target === document.getElementById('providerModal')) closeProviderModal();
});
document.getElementById('copyBtn').addEventListener('click', () => copyGreen().catch((error) => { console.error(error); show('No pude copiar'); }));
el.corner.addEventListener('click', () => el.corner.classList.toggle('active'));
el.corner.addEventListener('dblclick', (event) => {
  event.preventDefault();
  pasteAll().catch((error) => { console.error(error); show('No pude pegar'); });
});
el.rows.addEventListener('focusin', (event) => {
  const cell = event.target.closest('[data-field]');
  if (!cell) return;
  startCellEditSnapshot();
  if (cell.dataset.field === 'precio') cell.textContent = getEditableCellValue(cell);
  if (suppressFullSelectTarget === cell) {
    suppressFullSelectTarget = null;
    return;
  }
  selectEditableCellText(cell);
});
document.querySelector('.table-wrap').addEventListener('mousedown', (event) => {
  const rowSelect = event.target.closest('[data-row-select]');
  if (rowSelect) {
    event.preventDefault();
    event.stopImmediatePropagation();
    selectTableRow(rowSelect.dataset.rowSelect, event);
    return;
  }
  const colSelect = event.target.closest('[data-col-select]');
  if (colSelect) {
    event.preventDefault();
    event.stopImmediatePropagation();
    selectTableCol(colSelect.dataset.colSelect, event);
    return;
  }
  const cell = event.target.closest('[data-field][data-row][data-col]');
  if (cell) {
    if (placeCaretOnMouseClick(cell, event)) {
      event.stopImmediatePropagation();
      return;
    }
    event.preventDefault();
    event.stopImmediatePropagation();
    focusNavigationTarget(cell);
  }
});
el.rows.addEventListener('input', (event) => {
  const cell = event.target.closest('[data-field]');
  const rowEl = event.target.closest('.row');
  if (!cell || !rowEl) return;
  cell.dataset.fullSelected = '0';
  const row = rowsData.find((item) => item.id === rowEl.dataset.id);
  if (!row) return;
  const field = cell.dataset.field;
  if (field === 'precio') row.precio = moneyNumber(cell.textContent);
  else if (field === 'cantidad') row.cantidad = rawNumber(moneyNumber(cell.textContent));
  else if (field === 'descuento') row.descuentoAdicional = parsePercent(cell.textContent);
  else row[field] = String(cell.textContent || '').trim();
  editHadChanges = true;
  saveRows();
  if (field === 'descuento' || field === 'precio' || field === 'cantidad') updateCalculatedCells();
});
el.rows.addEventListener('blur', (event) => {
  const cell = event.target.closest('[data-field]');
  if (!cell) return;
  commitCellEditSnapshot();
  if (cell.dataset.field === 'precio') cell.textContent = money(rowFromCell(cell)?.precio || 0);
  if (cell.dataset.field === 'descuento') {
    const row = rowFromCell(cell);
    cell.textContent = row?.descuentoAdicional ? percent(row.descuentoAdicional) : '';
  }
  if (!el.rows.contains(event.relatedTarget)) render();
}, true);
el.rows.addEventListener('keydown', (event) => {
  if (event.defaultPrevented) return;
  const cell = event.target.closest('[contenteditable="true"]');
  if (!cell) return;
  if (isPrintableTypingKey(event)) cell.dataset.fullSelected = '0';
  if (isPrintableTypingKey(event) || event.key === 'F2') mouseEditTarget = cell;
  if (event.key === 'F2') {
    event.preventDefault();
    const text = cell.textContent || '';
    const selection = window.getSelection();
    const allSelected = selection?.toString?.() === text && text.length > 0;
    if (allSelected) placeCaretEnd(cell);
    else selectEditableCellText(cell);
    return;
  }
  if (event.code === 'NumpadDecimal') {
    event.preventDefault();
    document.execCommand('insertText', false, ',');
  }
});
document.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();
  if (event.code === 'NumpadDecimal' && event.target?.matches?.('input[inputmode="decimal"]')) {
    event.preventDefault();
    const input = event.target;
    const start = input.selectionStart ?? input.value.length;
    const end = input.selectionEnd ?? start;
    input.value = `${input.value.slice(0, start)},${input.value.slice(end)}`;
    input.setSelectionRange(start + 1, start + 1);
    input.dispatchEvent(new Event('input', { bubbles: true }));
  }
  if (event.ctrlKey && key === 'v' && el.corner.classList.contains('active')) {
    event.preventDefault();
    pasteAll().catch((error) => { console.error(error); show('No pude pegar'); });
  }
  if (event.key === 'Delete' && selectedRows.size) {
    event.preventDefault();
    deleteSelectedRows();
  }
});
document.querySelector('.table-wrap').addEventListener('keydown', (event) => {
  if (event.key !== 'Delete') return;
  const selectedCells = tableSelectionApi?.getSelectedCells?.() || [];
  if (!selectedRows.size && !selectedCells.length) return;
  event.preventDefault();
  if (selectedRows.size) {
    deleteSelectedRows();
    return;
  }
  selectedCells.forEach((cell) => setEditableCellValue(cell, ''));
  finishTableEditUndo('Celdas borradas');
});

initFuncionesJsBindings();
loadRows();
render();
Promise.all([loadProviders(), loadIndexCodes()]).then(() => render());
</script>
