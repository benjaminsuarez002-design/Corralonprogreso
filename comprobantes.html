<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Comprobantes - Corralon Progreso</title>
  <link rel="icon" type="image/x-icon" href="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/icono-corralon-Photoroom.ico">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f4efe9;
      --panel: #ffffff;
      --panel-soft: #f7f5ff;
      --line: #d6ccef;
      --line-strong: #b8abd9;
      --purple: #6c4fc7;
      --purple-dark: #4d35a0;
      --red: #de3328;
      --text: #1f2233;
      --muted: #767b8d;
      --ok: #1f8f53;
      --shadow: 0 8px 22px rgba(58, 35, 120, .1);
      --radius: 12px;
      --radius-sm: 9px;
      --content: 780px;
    }

    html, body { min-height: 100%; margin: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #faf8f4 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 18px rgba(0,0,0,.04);
    }

    .topbar-inner {
      max-width: var(--content);
      margin: 0 auto;
      padding: 14px 14px 10px;
    }

    .title {
      margin: 0;
      color: var(--red);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      height: 34px;
      width: auto;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }

    .tab.active {
      color: var(--purple);
      border-color: var(--purple);
      box-shadow: inset 0 0 0 1px var(--purple);
    }

    .content {
      width: 100%;
      max-width: var(--content);
      margin: 0 auto;
      padding: 14px 14px 118px;
      flex: 1;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .section-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #faf8ff 0%, #f4efff 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      color: var(--purple-dark);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .alias-form {
      display: grid;
      grid-template-columns: 1.2fr 1fr .9fr auto;
      gap: 9px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .alias-list {
      display: grid;
    }

    .alias-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
    }

    .alias-row:nth-child(even),
    .record-card:nth-child(even),
    .summary-row:nth-child(even) {
      background: var(--panel-soft);
    }

    .alias-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }

    .alias-meta {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .field-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .input,
    .pick-btn,
    .file-btn,
    .action-btn,
    .danger-btn,
    .ghost-btn,
    .nav-btn {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: .18s ease;
    }

    .input:focus,
    .pick-btn:focus,
    .file-btn:focus,
    .action-btn:focus,
    .danger-btn:focus,
    .ghost-btn:focus,
    .nav-btn:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(108,79,199,.14);
    }

    .input[readonly] {
      background: #fcfbff;
    }

    .money {
      text-align: right;
      font-weight: 800;
      color: var(--purple-dark);
    }

    .pick-btn,
    .file-btn,
    .action-btn,
    .danger-btn,
    .ghost-btn,
    .nav-btn {
      cursor: pointer;
      font-weight: 800;
    }

    .pick-btn {
      text-align: left;
    }

    .action-btn {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .action-btn.ok,
    .file-btn.ok {
      background: #ebfff3;
      border-color: #8fdbac;
      color: var(--ok);
    }

    .danger-btn {
      background: #fff1f1;
      border-color: #f1c5c5;
      color: var(--red);
    }

    .ghost-btn,
    .nav-btn {
      color: var(--purple);
      background: #fff;
    }

    .records {
      display: grid;
      gap: 9px;
      margin-top: 10px;
    }

    #saved-records {
      display: none;
    }

    .record-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .record-body {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: 1.4fr 1fr .9fr;
      gap: 8px;
    }

    .grid-middle {
      display: grid;
      grid-template-columns: 1.2fr auto auto;
      gap: 8px;
      align-items: end;
    }

    .meta-box {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      min-height: 36px;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .meta-box span {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .meta-box strong {
      font-size: 12px;
      color: var(--text);
    }

    .grid-bottom {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .record-link {
      color: var(--purple);
      font-size: 11px;
      font-weight: 800;
      text-decoration: underline;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      width: auto;
      min-height: auto;
    }

    .record-link:disabled {
      cursor: default;
      text-decoration: none;
      color: var(--muted);
    }

    .summary-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .summary-view-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .summary-view-chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      min-height: 34px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }

    .summary-view-chip.active {
      color: var(--purple);
      border-color: var(--purple);
      box-shadow: inset 0 0 0 1px var(--purple);
      background: #faf8ff;
    }

    .summary-date {
      text-align: center;
      font-size: 17px;
      font-weight: 900;
      color: var(--purple-dark);
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .summary-head {
      padding: 10px 12px;
      background: #efe9ff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .summary-alias {
      font-size: 15px;
      font-weight: 900;
      color: var(--purple);
    }

    .summary-total {
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
    }

    .summary-row {
      padding: 9px 12px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 72px 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .summary-time {
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
    }

    .summary-main {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .summary-client {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }

    .summary-machine {
      font-size: 11px;
      color: var(--purple);
      background: transparent;
      border: none;
      padding: 0;
      text-align: left;
      text-decoration: underline;
      cursor: pointer;
    }

    .summary-machine:disabled {
      text-decoration: none;
      cursor: default;
      color: var(--muted);
    }

    .summary-amount {
      font-size: 15px;
      font-weight: 900;
      color: var(--purple-dark);
      text-align: right;
    }

    .summary-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      align-items: center;
    }

    .summary-icon-btn {
      width: 30px;
      min-width: 30px;
      min-height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
    }

    .summary-day-total {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #efe9ff;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 15px;
      font-weight: 900;
    }

    .summary-subsection {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .summary-subhead {
      padding: 10px 12px;
      background: #f5f0ff;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .summary-subtitle {
      font-size: 13px;
      font-weight: 900;
      color: var(--purple-dark);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .summary-submeta {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .empty {
      padding: 22px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 24px rgba(0,0,0,.08);
    }

    .footer-inner {
      max-width: var(--content);
      margin: 0 auto;
      padding: 9px 14px 10px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .total-box {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .total-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .total-value {
      font-size: 22px;
      font-weight: 900;
      color: var(--purple-dark);
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(21, 17, 40, .45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-bg.open { display: flex; }

    .modal {
      width: min(100%, 420px);
      max-height: 82vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.22);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      color: var(--purple-dark);
      font-size: 15px;
      font-weight: 900;
    }

    .modal-body {
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .picker-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      padding: 9px 10px;
      cursor: pointer;
    }

    .picker-item strong {
      display: block;
      font-size: 13px;
      color: var(--text);
    }

    .picker-item span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .confirm-copy {
      padding: 14px;
      display: grid;
      gap: 8px;
      color: var(--text);
      line-height: 1.45;
    }

    .confirm-actions {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 900px) {
      .alias-form,
      .grid-top,
      .grid-middle,
      .grid-bottom,
      .footer-inner {
        grid-template-columns: 1fr;
      }

      .footer-inner {
        align-items: stretch;
      }

      .summary-row {
        grid-template-columns: 1fr auto auto;
        align-items: center;
        row-gap: 4px;
      }

      .summary-main {
        grid-column: 1;
      }

      .summary-amount {
        grid-column: 2;
        text-align: right;
        white-space: nowrap;
      }

      .summary-actions {
        grid-column: 3;
        justify-content: flex-end;
        flex-wrap: nowrap;
      }

      .summary-time {
        grid-column: 1 / -1;
        order: 10;
        font-size: 10px;
      }
    }

    @media (max-width: 640px) {
      .topbar-inner,
      .content,
      .footer-inner {
        padding-left: 12px;
        padding-right: 12px;
      }

      .title {
        font-size: 22px;
      }

      .brand-logo {
        height: 30px;
      }

      .tabs {
        gap: 8px;
      }

      .tab {
        padding: 10px 12px;
        font-size: 13px;
      }

      .record-body,
      .alias-form,
      .section-head,
      .summary-head,
      .summary-row,
      .summary-day-total {
        padding-left: 12px;
        padding-right: 12px;
      }

      .field-label {
        font-size: 10px;
      }

      .input,
      .pick-btn,
      .file-btn,
      .action-btn,
      .danger-btn,
      .ghost-btn,
      .nav-btn,
      .meta-box {
        min-height: 42px;
        font-size: 14px;
      }

      .summary-date {
        font-size: 17px;
      }

      .summary-row {
        grid-template-columns: 1fr auto auto;
      }

      .summary-client {
        font-size: 13px;
      }

      .summary-machine {
        font-size: 10px;
      }

      .summary-amount {
        font-size: 13px;
      }

      .summary-icon-btn {
        width: 26px;
        min-width: 26px;
        min-height: 26px;
        font-size: 12px;
      }

      .total-value {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand-row">
          <img class="brand-logo" src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="Corralón Progreso">
          <h1 class="title">Comprobantes</h1>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="comp" type="button">Cargar</button>
          <button class="tab" data-tab="alias" type="button">Alias</button>
          <button class="tab" data-tab="resumen" type="button">Resumen</button>
        </div>
      </div>
    </div>

    <main class="content">
      <section class="panel active" id="panel-comp">
        <div class="records" id="saved-records"></div>

        <div class="record-card" id="draft-card">
          <div class="section-head">
            <h2 class="section-title" id="draft-title">Cargar movimiento</h2>
          </div>
          <div class="record-body">
            <div class="grid-top">
              <label class="field">
                <span class="field-label">Cliente</span>
                <input class="input" id="draft-client" autocomplete="off">
              </label>
              <label class="field">
                <span class="field-label">N° máquina</span>
                <input class="input" id="draft-machine" autocomplete="off" inputmode="numeric">
              </label>
              <label class="field">
                <span class="field-label">Monto</span>
                <input class="input money" id="draft-amount" autocomplete="off" inputmode="decimal" placeholder="$ 0,00">
              </label>
            </div>

            <div class="grid-middle">
              <div class="field">
                <span class="field-label">Transferencia a</span>
                <button class="pick-btn" id="draft-transfer" type="button">Elegir alias</button>
              </div>
              <div class="meta-box">
                <span>Fecha</span>
                <strong id="draft-date"></strong>
              </div>
              <div class="meta-box">
                <span>Hora</span>
                <strong id="draft-time"></strong>
              </div>
            </div>

            <div class="grid-bottom">
              <div class="field">
                <span class="field-label">Comprobante</span>
                <div style="display:flex; gap:10px; align-items:center;">
                  <button class="file-btn" id="draft-upload" type="button">Subir comprobante</button>
                  <button class="record-link" id="draft-open-file" type="button" disabled>Ver archivo</button>
                </div>
              </div>
              <button class="ghost-btn" id="draft-clear" type="button">Limpiar fila</button>
              <button class="action-btn" id="draft-add" type="button">+ Guardar movimiento</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" id="panel-alias">
        <div class="section-card">
          <div class="section-head">
            <h2 class="section-title">Alias</h2>
          </div>
          <div class="alias-form">
            <label class="field">
              <span class="field-label">Nombre</span>
              <input class="input" id="alias-name" autocomplete="off">
            </label>
            <label class="field">
              <span class="field-label">Alias</span>
              <input class="input" id="alias-alias" autocomplete="off">
            </label>
            <label class="field">
              <span class="field-label">CUIT</span>
              <input class="input" id="alias-cuit" autocomplete="off">
            </label>
            <button class="action-btn" id="alias-add" type="button">+ Agregar</button>
          </div>
          <div class="alias-list" id="alias-list"></div>
        </div>
      </section>

      <section class="panel" id="panel-resumen">
        <div class="summary-nav">
          <button class="nav-btn" id="summary-prev" type="button">← Día anterior</button>
          <div class="summary-date" id="summary-date">Sin datos</div>
          <button class="nav-btn" id="summary-next" type="button">Día siguiente →</button>
        </div>
        <div class="summary-view-tabs">
          <button class="summary-view-chip active" id="summary-view-alias" data-summary-view="alias" type="button">Vista por alias</button>
          <button class="summary-view-chip" id="summary-view-time" data-summary-view="time" type="button">Vista por hora</button>
        </div>
        <div class="summary-list" id="summary-list"></div>
      </section>
    </main>

    <div class="footer-bar">
      <div class="footer-inner">
        <div class="total-box">
          <span class="total-label">Total del día</span>
          <strong class="total-value" id="day-total">$ 0</strong>
        </div>
        <button class="ghost-btn" id="save-new" type="button">Guardar y nuevo</button>
        <button class="danger-btn" id="clear-all" type="button">Limpiar</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="alias-modal-bg">
    <div class="modal">
      <div class="modal-head">
        <h3 class="modal-title">Elegir alias</h3>
        <button class="danger-btn" id="alias-modal-close" type="button">X</button>
      </div>
      <div class="modal-body" id="alias-modal-list"></div>
    </div>

      function createDraft() {
        return {
          client: "",
          machine: "",
          amountInput: "",
          amountNumber: 0,
          transfer: null,
          dateIso: todayIso(),
          dateText: formatDate(todayIso()),
          timeText: currentTime(),
          attachment: null
        };
      }

      function todayIso() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function currentTime() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function formatDate(iso) {
        const m = String(iso || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
        return m ? `${m[3]}/${m[2]}/${m[1]}` : "";
      }

      function parseDateToIso(value) {
        const raw = String(value || "").trim();
        let match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (match) return `${match[1]}-${match[2]}-${match[3]}`;
        match = raw.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})$/);
        if (match) {
          return `${match[3]}-${String(Number(match[2]) || 0).padStart(2, "0")}-${String(Number(match[1]) || 0).padStart(2, "0")}`;
        }
        return "";
      }

      function parseAmount(value) {
        const cleaned = String(value || "").replace(/\./g, "").replace(",", ".").replace(/[^0-9.-]/g, "");
        const parsed = Number(cleaned);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function formatAmount(number, forceDecimals) {
        return "$ " + Number(number || 0).toLocaleString("es-AR", {
          minimumFractionDigits: forceDecimals ? 2 : 0,
          maximumFractionDigits: 2
        });
      }

      function formatAmountInput(value) {
        const parsed = parseAmount(value);
        return parsed ? formatAmount(parsed, true) : "";
      }

      function formatMachine(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const groups = raw.match(/\d+/g) || [];
        if (groups.length >= 2) {
          return `${String(Number(groups[0]) || 0).padStart(4, "0")}-${String(Number(groups[1]) || 0).padStart(8, "0")}`;
        }
        if (groups.length === 1 && groups[0].length > 4) {
          return `${String(Number(groups[0].slice(0, 4)) || 0).padStart(4, "0")}-${String(Number(groups[0].slice(4)) || 0).padStart(8, "0")}`;
        }
        return raw;
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function normalize(value) {
        return String(value || "").trim().toLowerCase();
      }

      function resolveAliasName(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const match = state.aliases.find((item) => normalize(item.nombre) === normalize(raw) || normalize(item.alias) === normalize(raw));
        return match ? match.nombre : raw;
      }

      function throttleError(prefix, error) {
        console.error(prefix, error);
        const now = Date.now();
        if (now - state.lastErrorAt > 2500) {
          state.lastErrorAt = now;
          alert(`${prefix}: ${String(error && error.message ? error.message : error)}`);
        }
      }

      function hasDraftData() {
        const draft = state.draft;
        return !!(draft.client.trim() || draft.machine.trim() || draft.amountNumber || draft.transfer || draft.attachment);
      }

      function syncDraftFromInputs() {
        state.draft.client = String(el.draftClient.value || "").trim();
        state.draft.machine = formatMachine(el.draftMachine.value || "");
        state.draft.amountInput = formatAmountInput(el.draftAmount.value || "");
        state.draft.amountNumber = parseAmount(el.draftAmount.value || "");
      }

      function syncDraftToInputs() {
        el.draftClient.value = state.draft.client || "";
        el.draftMachine.value = state.draft.machine || "";
        el.draftAmount.value = state.draft.amountInput || "";
        el.draftTransfer.textContent = state.draft.transfer ? state.draft.transfer.nombre : "Elegir alias";
        el.draftTransfer.classList.toggle("ok", !!state.draft.transfer);
        el.draftDate.textContent = state.draft.dateText;
        el.draftTime.textContent = state.draft.timeText;
        el.draftUpload.textContent = state.draft.attachment ? "Cambiar comprobante" : "Subir comprobante";
        el.draftUpload.classList.toggle("ok", !!state.draft.attachment);
        el.draftOpenFile.disabled = !(state.draft.attachment && state.draft.attachment.url);
        el.draftTitle.textContent = state.editingId ? "Editar movimiento" : "Cargar movimiento";
        el.draftAdd.textContent = state.editingId ? "Guardar cambios" : "+ Guardar movimiento";
        el.saveNew.textContent = state.editingId ? "Guardar y cerrar" : "Guardar y nuevo";
      }

      function resetDraft() {
        state.draft = createDraft();
        state.editingId = null;
        syncDraftToInputs();
      }

      function activateTab(name) {
        el.tabs.forEach((button) => button.classList.toggle("active", button.dataset.tab === name));
        Object.keys(el.panels).forEach((key) => {
          el.panels[key].classList.toggle("active", key === name);
        });
      }

      function syncSummaryViewTabs() {
        el.summaryViewTabs.forEach((button) => {
          button.classList.toggle("active", button.dataset.summaryView === state.summaryView);
        });
      }

      function recordSort(a, b) {
        const timeA = String(a.timeText || "");
        const timeB = String(b.timeText || "");
        if (timeA !== timeB) return timeA.localeCompare(timeB);
        return Number(a.createdClientMs || 0) - Number(b.createdClientMs || 0);
      }

      function hasVisibleRecordData(item) {
        return !!(
          String(item.client || "").trim() ||
          String(item.machine || "").trim() ||
          Number(item.amountNumber || 0) > 0 ||
          String(item.attachmentUrl || "").trim()
        );
      }

      function refreshDerivedRecords() {
        const all = state.allRecords
          .filter(hasVisibleRecordData)
          .slice()
          .sort(recordSort);
        const today = todayIso();
        state.todayRecords = all.filter((item) => item.dateIso === today);
        state.summaryDates = Array.from(new Set(all.map((item) => item.dateIso).filter(Boolean))).sort();
        if (!state.summaryDates.includes(state.summaryDateIso)) {
          state.summaryDateIso = state.summaryDates[state.summaryDates.length - 1] || today;
        }
        state.summaryRecords = all.filter((item) => item.dateIso === state.summaryDateIso);
        renderTodayRecords();
        renderSummaryDate();
        renderSummary();
      }

      function renderAliases() {
        if (!state.aliases.length) {
          el.aliasList.innerHTML = '<div class="empty">Todavía no hay alias cargados.</div>';
          return;
        }
        el.aliasList.innerHTML = state.aliases.map((item) => `
          <div class="alias-row">
            <div>
              <div class="alias-name">${esc(item.nombre)}</div>

            <button class="danger-btn" type="button" data-action="delete-alias" data-id="${esc(item.id)}">Eliminar</button>
          </div>
        `).join("");
      }

      function renderTodayRecords() {
        const items = state.todayRecords.slice().sort(recordSort);
        if (!items.length) {
          el.savedRecords.innerHTML = '<div class="section-card"><div class="empty">Todavía no hay comprobantes guardados para hoy.</div></div>';
          el.dayTotal.textContent = formatAmount(0, false);
          return;
        }
        el.savedRecords.innerHTML = items.map((item) => `
          <article class="record-card" data-id="${esc(item.id)}">
            <div class="record-body">
              <div class="grid-top">
                <label class="field">
                  <span class="field-label">Cliente</span>

                </label>

                  <span class="field-label">N° máquina</span>
                  <input class="input js-record-input" data-field="machine" value="${esc(item.machine || "")}">
                </label>
                <label class="field">
                  <span class="field-label">Monto</span>
                  <input class="input money js-record-input" data-field="amount" value="${esc(formatAmount(item.amountNumber || 0, true))}">
                </label>
              </div>
              <div class="grid-middle">
                <div class="field">
                  <span class="field-label">Transferencia a</span>
                  <button class="pick-btn ${item.transferName ? "ok" : ""}" type="button" data-action="pick-row-alias">${esc(item.transferName || "Elegir alias")}</button>
                </div>
                <div class="meta-box">
                  <span>Fecha</span>
                  <strong>${esc(item.dateText || "")}</strong>
                </div>
                <div class="meta-box">
                  <span>Hora</span>
                  <strong>${esc(item.timeText || "")}</strong>
                </div>
              </div>
              <div class="grid-bottom">
                <div class="field">
                  <span class="field-label">Comprobante</span>
                  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <button class="file-btn ${item.attachmentUrl ? "ok" : ""}" type="button" data-action="upload-row-file">${item.attachmentUrl ? "Cambiar comprobante" : "Subir comprobante"}</button>
                    <button class="record-link" type="button" data-action="open-row-file" ${item.attachmentUrl ? "" : "disabled"}>Ver archivo</button>
                  </div>
                </div>
                <div></div>
                <button class="danger-btn" type="button" data-action="delete-row">Eliminar</button>
              </div>
            </div>
          </article>
        `).join("");

        const total = items.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
        el.dayTotal.textContent = formatAmount(total, false);
      }

      function renderSummary() {
        const items = state.summaryRecords.slice().sort(recordSort);
        syncSummaryViewTabs();
        if (!items.length) {
          el.summaryList.innerHTML = '<div class="section-card"><div class="empty">Sin comprobantes para ese día.</div></div>';
          return;
        }

        const groups = new Map();
        items.forEach((item) => {
          const key = item.transferName || "Sin proveedor";
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(item);
        });

        let dayTotal = 0;
        const groupedHtml = Array.from(groups.entries()).map(([name, group]) => {
          const total = group.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
          dayTotal += total;
          return `
            <section class="summary-card">
              <div class="summary-head">
                <div class="summary-alias">${esc(name)}</div>
                <div class="summary-total">${formatAmount(total, false)}</div>
              </div>
              ${group.map((item) => `
                <div class="summary-row">
                  <div class="summary-time">${esc(item.timeText || "--:--")}</div>
                  <div class="summary-main">
                    <div class="summary-client">${esc(item.client || "Sin cliente")}</div>
                    <button class="summary-machine" type="button" data-action="open-summary-file" data-id="${esc(item.id)}" ${item.attachmentUrl ? "" : "disabled"}>${esc(item.machine || item.attachmentName || (item.attachmentUrl ? "Ver comprobante" : "Sin comprobante"))}</button>
                  </div>
                  <div class="summary-amount">${formatAmount(item.amountNumber || 0, false)}</div>
                  <div class="summary-actions">
                    <button class="ghost-btn summary-icon-btn" type="button" title="Editar" aria-label="Editar" data-action="edit-summary" data-id="${esc(item.id)}">✎</button>
                    <button class="danger-btn summary-icon-btn" type="button" title="Eliminar" aria-label="Eliminar" data-action="delete-summary" data-id="${esc(item.id)}">✕</button>
                  </div>
                </div>
              `).join("")}
            </section>
          `;
        }).join("");

        const timelineHtml = `
          <section class="summary-card">
            <div class="summary-head">
              <div class="summary-alias">Ordenado por hora</div>
              <div class="summary-submeta">De la más vieja a la más nueva</div>
            </div>
            ${items.map((item) => `
              <div class="summary-row">
                <div class="summary-time">${esc(item.timeText || "--:--")}</div>
                <div class="summary-main">
                  <div class="summary-client">${esc(item.client || "Sin cliente")}</div>
                  <button class="summary-machine" type="button" data-action="open-summary-file" data-id="${esc(item.id)}" ${item.attachmentUrl ? "" : "disabled"}>${esc(item.machine || item.attachmentName || (item.attachmentUrl ? "Ver comprobante" : "Sin comprobante"))}</button>
                </div>
                <div class="summary-amount">${formatAmount(item.amountNumber || 0, false)}</div>
                <div class="summary-actions">
                  <button class="ghost-btn summary-icon-btn" type="button" title="Editar" aria-label="Editar" data-action="edit-summary" data-id="${esc(item.id)}">✎</button>
                  <button class="danger-btn summary-icon-btn" type="button" title="Eliminar" aria-label="Eliminar" data-action="delete-summary" data-id="${esc(item.id)}">✕</button>
                </div>
              </div>
            `).join("")}
          </section>
        `;

        const currentViewHtml = state.summaryView === "time" ? timelineHtml : groupedHtml;

        el.summaryList.innerHTML = currentViewHtml + `
          <div class="summary-day-total">
            <span>Total del día</span>
            <strong>${formatAmount(dayTotal, false)}</strong>
          </div>
        `;
      }

      function renderSummaryDate() {
        if (!state.summaryDates.length) {
          el.summaryDate.textContent = "Sin datos";
          el.summaryPrev.disabled = true;
          el.summaryNext.disabled = true;
          return;
        }
        const index = state.summaryDates.indexOf(state.summaryDateIso);
        const safeIndex = index >= 0 ? index : state.summaryDates.length - 1;
        state.summaryDateIso = state.summaryDates[safeIndex];
        el.summaryDate.textContent = formatDate(state.summaryDateIso);
        el.summaryPrev.disabled = safeIndex <= 0;
        el.summaryNext.disabled = safeIndex >= state.summaryDates.length - 1;
      }

      function findRecord(id, source) {
        return source.find((item) => String(item.id) === String(id)) || null;
      }

      function firstText() {
        for (let i = 0; i < arguments.length; i += 1) {
          const value = arguments[i];
          if (value !== undefined && value !== null && String(value).trim() !== "") return String(value).trim();
        }
        return "";
      }

      function firstNumber() {
        for (let i = 0; i < arguments.length; i += 1) {
          const value = arguments[i];
          const parsed = parseAmount(value);
          if (parsed) return parsed;
        }
        return 0;
      }

      function mapDoc(doc) {
        const data = doc.data() || {};
        const createdAtMs = data.createdAt && typeof data.createdAt.toMillis === "function"
          ? data.createdAt.toMillis()
          : Number(data.createdAt || data.created_at || 0);
        const dateIso = firstText(
          data.dateIso,
          data.fecha_iso,
          parseDateToIso(data.dateText),
          parseDateToIso(data.fecha_texto),
          parseDateToIso(data.fecha),
          todayIso()
        );
        const amountNumber = firstNumber(
          data.amountNumber,
          data.monto,
          data.monto_total,
          data.montoTotal
        );
        return {
          id: doc.id,
          client: firstText(data.client, data.cliente, data.nombreCliente),
          machine: firstText(data.machine, data.maquina, data.numeroMaquina, data.maquina_texto),
          amountNumber,
          transferName: firstText(data.transferName, data.transferencia, data.transfer, data.aliasNombre, data.alias, data.alias_mp),
          transferAlias: firstText(data.transferAlias, data.alias, data.alias_mp),
          transferCuit: firstText(data.transferCuit, data.cuit),
          dateIso,
          dateText: firstText(data.dateText, data.fecha_texto, data.fecha, formatDate(dateIso)),
          timeText: firstText(
            data.timeText,
            data.hora,
            data.hora_texto,
            createdAtMs ? new Date(createdAtMs).toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", hour12: false }) : ""
          ),
          attachmentUrl: firstText(data.attachmentUrl, data.comprobante_url, data.comprobanteUrl),
          attachmentName: firstText(data.attachmentName, data.comprobante_nombre, data.comprobanteNombre),
          attachmentType: firstText(data.attachmentType, data.comprobante_tipo, data.comprobanteTipo),
          createdClientMs: Number(data.createdClientMs || data.created_client_ms || data.timestamp || createdAtMs || 0)
        };
      }

      async function uploadFileToSupabase(file, keyPart) {
        const cleanName = String(file.name || `comprobante_${keyPart}`).replace(/[^a-zA-Z0-9._-]/g, "_");
        const path = `comprobantes/${todayIso()}/${Date.now()}_${keyPart}_${cleanName}`;
        const encodedPath = path.split("/").map(encodeURIComponent).join("/");
        const response = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${encodedPath}`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "x-upsert": "true",
            "Content-Type": file.type || "application/octet-stream"
          },
          body: file
        });
        const text = await response.text();
        if (!response.ok) throw new Error(text || `Error ${response.status}`);
        return {
          url: `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${encodedPath}`,
          name: file.name || cleanName,
          type: file.type || ""
        };
      }

      function buildDraftPayload() {
        syncDraftFromInputs();
        return {
          client: state.draft.client,
          machine: state.draft.machine,
          amountNumber: state.draft.amountNumber,
          transferName: state.draft.transfer ? state.draft.transfer.nombre : "",
          transferAlias: state.draft.transfer ? state.draft.transfer.alias : "",
          transferCuit: state.draft.transfer ? state.draft.transfer.cuit : "",
          dateIso: state.draft.dateIso,
          dateText: state.draft.dateText,
          timeText: state.draft.timeText,
          createdClientMs: Date.now(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
      }

      function recordRef(id) {
        return state.db.collection(COMPROBANTES_COLLECTION).doc(String(id));
      }

      function aliasRef(id) {
        return state.db.collection(ALIASES_COLLECTION).doc(String(id));
      }

      async function saveAlias() {
        const nombre = String(el.aliasName.value || "").trim();
        const alias = String(el.aliasAlias.value || "").trim();
        const cuit = String(el.aliasCuit.value || "").trim();
        if (!nombre) {
          el.aliasName.focus();
          return;
        }
        await state.db.collection(ALIASES_COLLECTION).add({
          nombre,
          alias,
          cuit,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        el.aliasName.value = "";
        el.aliasAlias.value = "";
        el.aliasCuit.value = "";
        el.aliasName.focus();
      }

      async function deleteAlias(id) {
        await aliasRef(id).delete();
      }

      async function saveDraft() {
        syncDraftFromInputs();
        if (!hasDraftData()) {
          el.draftClient.focus();
          return;
        }
        if (!state.draft.client.trim()) {
          alert("Completá cliente.");
          el.draftClient.focus();
          return;
        }
        if (!state.draft.machine.trim()) {
          alert("Completá N° de máquina.");
          el.draftMachine.focus();
          return;
        }
        if (!(Number(state.draft.amountNumber || 0) > 0)) {
          alert("Completá monto.");
          el.draftAmount.focus();
          return;
        }
        if (!state.draft.transfer) {
          alert("Elegí alias.");
          openAliasModal({ type: "draft" });
          return;
        }
        const payload = buildDraftPayload();
        if (state.draft.attachment && state.draft.attachment.file) {
          const uploaded = await uploadFileToSupabase(state.draft.attachment.file, state.draft.machine || "draft");
          payload.attachmentUrl = uploaded.url;
          payload.attachmentName = uploaded.name;
          payload.attachmentType = uploaded.type;
        } else if (state.draft.attachment && state.draft.attachment.url) {
          payload.attachmentUrl = state.draft.attachment.url;
          payload.attachmentName = state.draft.attachment.name || "";
          payload.attachmentType = state.draft.attachment.type || "";
        } else {
          payload.attachmentUrl = "";
          payload.attachmentName = "";
          payload.attachmentType = "";
        }
        if (state.editingId) {
          await recordRef(state.editingId).update(payload);
        } else {
          payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await state.db.collection(COMPROBANTES_COLLECTION).add(payload);
        }
        resetDraft();
        activateTab("resumen");
      }

      async function updateRecordField(id, field, value) {
        const payload = { updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
        if (field === "client") payload.client = String(value || "").trim();
        if (field === "machine") payload.machine = formatMachine(value);
        if (field === "amount") payload.amountNumber = parseAmount(value);
        await recordRef(id).update(payload);
      }

      async function updateRecordAlias(id, aliasDoc) {
        await recordRef(id).update({
          transferName: aliasDoc ? aliasDoc.nombre : "",
          transferAlias: aliasDoc ? aliasDoc.alias : "",
          transferCuit: aliasDoc ? aliasDoc.cuit : "",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }

      async function updateRecordAttachment(id, file) {
        const uploaded = await uploadFileToSupabase(file, id);
        await recordRef(id).update({
          attachmentUrl: uploaded.url,
          attachmentName: uploaded.name,
          attachmentType: uploaded.type,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }

      async function deleteRecord(id) {
        await recordRef(id).delete();
      }

      function loadRecordIntoDraft(record) {
        if (!record) return;
        state.editingId = record.id;
        state.draft = createDraft();
        state.draft.client = record.client || "";
        state.draft.machine = record.machine || "";
        state.draft.amountNumber = Number(record.amountNumber || 0);
        state.draft.amountInput = record.amountNumber ? formatAmount(record.amountNumber, true) : "";
        state.draft.transfer = record.transferName ? {
          id: "",
          nombre: record.transferName || "",
          alias: record.transferAlias || "",
          cuit: record.transferCuit || ""
        } : null;
        state.draft.dateIso = record.dateIso || todayIso();
        state.draft.dateText = record.dateText || formatDate(state.draft.dateIso);
        state.draft.timeText = record.timeText || currentTime();
        state.draft.attachment = record.attachmentUrl ? {
          file: null,
          url: record.attachmentUrl,
          name: record.attachmentName || "Comprobante",
          type: record.attachmentType || ""
        } : null;
        syncDraftToInputs();
        activateTab("comp");
        el.draftClient.focus();
      }

      function openAliasModal(target) {
        state.aliasPickerTarget = target;
        el.aliasModalList.innerHTML = state.aliases.length
          ? state.aliases.map((item) => `
              <button class="picker-item" type="button" data-action="pick-alias" data-id="${esc(item.id)}">
                <strong>${esc(item.nombre)}</strong>
                <span>Alias: ${esc(item.alias || "-")} | CUIT: ${esc(item.cuit || "-")}</span>
              </button>
            `).join("")
          : '<div class="empty">No hay alias cargados.</div>';
        el.aliasModalBg.classList.add("open");
      }

      function closeAliasModal() {
        state.aliasPickerTarget = null;
        el.aliasModalBg.classList.remove("open");
      }

      function openConfirm(action) {
        state.confirm = { action, step: 1 };
        renderConfirm();
      }

      function closeConfirm() {
        state.confirm = null;
        el.confirmModalBg.classList.remove("open");
      }

      function renderConfirm() {
        if (!state.confirm) return;
        const matrix = {
          clear: [
            ["Confirmación 1/3", "Vas a borrar los comprobantes visibles del día actual."],
            ["Confirmación 2/3", "La eliminación impacta en Firebase y no usa nada local."],
            ["Confirmación 3/3", "Último paso: confirmar borrado total del día."]
          ],
          saveNew: [
            ["Confirmación 1/3", "Se guarda la fila nueva actual."],
            ["Confirmación 2/3", "Después se limpia la fila para arrancar otra."],
            ["Confirmación 3/3", "Último paso: confirmar guardar y nuevo."]
          ]
        };
        const info = matrix[state.confirm.action][state.confirm.step - 1];
        el.confirmTitle.textContent = info[0];
        el.confirmCopy.textContent = info[1];
        el.confirmOk.textContent = state.confirm.step === 3 ? "Confirmar" : "Continuar";
        el.confirmModalBg.classList.add("open");
      }

      async function continueConfirm() {
        if (!state.confirm) return;
        if (state.confirm.step < 3) {
          state.confirm.step += 1;
          renderConfirm();
          return;
        }
        const action = state.confirm.action;
        closeConfirm();
        if (action === "saveNew") {
          await saveDraft();
          return;
        }
        const ids = state.todayRecords.map((item) => item.id);
        for (const id of ids) {
          await deleteRecord(id);
        }
        resetDraft();
      }

      function openFileFromDraft() {
        const attachment = state.draft.attachment;
        if (attachment && attachment.url) window.open(attachment.url, "_blank", "noopener");
      }

      function handlePickedAlias(aliasId) {
        const aliasDoc = findRecord(aliasId, state.aliases);
        if (!aliasDoc || !state.aliasPickerTarget) return;
        const target = state.aliasPickerTarget;
        closeAliasModal();
        if (target.type === "draft") {
          // Preserve what the user already typed before writing back to the UI.
          syncDraftFromInputs();
          state.draft.transfer = aliasDoc;
          syncDraftToInputs();
          openFilePicker({ type: "draft" });
          return;
        }
        updateRecordAlias(target.id, aliasDoc).then(() => {
          openFilePicker({ type: "record", id: target.id });
        }).catch((error) => throttleError("No se pudo actualizar alias", error));
      }

      function openFilePicker(target) {
        if (target && target.type === "draft") {
          // Keep draft state aligned with inputs before opening/canceling the picker.
          syncDraftFromInputs();
        }
        state.fileTarget = target;
        el.fileInput.value = "";
        el.fileInput.click();
      }

      function applySelectedFile(file, target) {
        if (!file || !target) return Promise.resolve();
        if (target.type === "draft") {
          state.draft.attachment = {
            file,
            url: URL.createObjectURL(file),
            name: file.name || "Comprobante",
            type: file.type || ""
          };
          syncDraftToInputs();
          el.draftAdd.focus();
          return Promise.resolve();
        }
        return updateRecordAttachment(target.id, file);
      }

      function subscribeAliases() {
        if (state.unsubAliases) state.unsubAliases();
        state.unsubAliases = state.db.collection(ALIASES_COLLECTION).orderBy("nombre", "asc").onSnapshot((snapshot) => {
          state.aliases = snapshot.docs.map((doc) => ({
            id: doc.id,
            nombre: String(doc.data().nombre || ""),
            alias: String(doc.data().alias || ""),
            cuit: String(doc.data().cuit || "")
          }));
          renderAliases();
          syncDraftToInputs();
          renderTodayRecords();
          renderSummary();
        }, (error) => throttleError("No se pudieron leer alias", error));
      }

      function subscribeTodayRecords() {
        if (state.unsubRecords) state.unsubRecords();
        state.unsubRecords = state.db.collection(COMPROBANTES_COLLECTION).onSnapshot((snapshot) => {
          state.allRecords = snapshot.docs.map(mapDoc);
          refreshDerivedRecords();
        }, (error) => throttleError("No se pudieron leer comprobantes", error));
      }

      function subscribeSummaryDates() {
        refreshDerivedRecords();
      }

      function subscribeSummaryRecords() {
        refreshDerivedRecords();
      }

      function bindTabs() {
        el.tabs.forEach((button) => {
          button.addEventListener("click", () => activateTab(button.dataset.tab));
        });
      }

      function bindAliasSection() {
        el.aliasAdd.addEventListener("click", () => {
          saveAlias().catch((error) => throttleError("No se pudo guardar alias", error));
        });
        [el.aliasName, el.aliasAlias, el.aliasCuit].forEach((input) => {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              saveAlias().catch((error) => throttleError("No se pudo guardar alias", error));
            }
          });
        });
        el.aliasList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-action='delete-alias']");
          if (!button) return;
          deleteAlias(button.dataset.id).catch((error) => throttleError("No se pudo borrar alias", error));
        });
      }

      function bindDraftSection() {
        el.draftClient.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.draftMachine.focus();
          }
        });
        el.draftMachine.addEventListener("blur", () => {
          el.draftMachine.value = formatMachine(el.draftMachine.value);
        });
        el.draftMachine.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.draftMachine.value = formatMachine(el.draftMachine.value);
            el.draftAmount.focus();
          }
        });
        el.draftAmount.addEventListener("blur", () => {
          el.draftAmount.value = formatAmountInput(el.draftAmount.value);
        });
        el.draftAmount.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.draftAmount.value = formatAmountInput(el.draftAmount.value);
            openAliasModal({ type: "draft" });
          }
        });
        el.draftTransfer.addEventListener("click", () => openAliasModal({ type: "draft" }));
        el.draftUpload.addEventListener("click", () => openFilePicker({ type: "draft" }));
        el.draftOpenFile.addEventListener("click", openFileFromDraft);
        el.draftClear.addEventListener("click", resetDraft);
        el.draftAdd.addEventListener("click", () => {
          saveDraft().catch((error) => throttleError("No se pudo guardar la fila", error));
        });
      }

      function bindRecords() {
        el.savedRecords.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") return;
          const input = event.target.closest(".js-record-input");
          if (!input) return;
          event.preventDefault();
          const card = input.closest(".record-card");
          const id = card && card.dataset.id;
          if (!id) return;
          if (input.dataset.field === "client") {
            card.querySelector('[data-field="machine"]').focus();
            return;
          }
          if (input.dataset.field === "machine") {
            input.value = formatMachine(input.value);
            card.querySelector('[data-field="amount"]').focus();
            return;
          }
          if (input.dataset.field === "amount") {
            input.value = formatAmountInput(input.value);
            openAliasModal({ type: "record", id });
          }
        });

        el.savedRecords.addEventListener("focusout", (event) => {
          const input = event.target.closest(".js-record-input");
          if (!input) return;
          const card = input.closest(".record-card");
          const id = card && card.dataset.id;
          if (!id) return;
          if (input.dataset.field === "machine") input.value = formatMachine(input.value);
          if (input.dataset.field === "amount") input.value = formatAmountInput(input.value);
          updateRecordField(id, input.dataset.field, input.value).catch((error) => throttleError("No se pudo actualizar", error));
        });

        el.savedRecords.addEventListener("click", (event) => {
          const card = event.target.closest(".record-card");
          const id = card && card.dataset.id;
          if (!id) return;
          const action = event.target.dataset.action;
          if (action === "pick-row-alias") openAliasModal({ type: "record", id });
          if (action === "upload-row-file") openFilePicker({ type: "record", id });
          if (action === "open-row-file") {
            const item = findRecord(id, state.todayRecords);
            if (item && item.attachmentUrl) window.open(item.attachmentUrl, "_blank", "noopener");
          }
          if (action === "delete-row") {
            deleteRecord(id).catch((error) => throttleError("No se pudo borrar comprobante", error));
          }
        });
      }

      function bindSummary() {
        el.summaryPrev.addEventListener("click", () => {
          const index = state.summaryDates.indexOf(state.summaryDateIso);
          if (index > 0) {
            state.summaryDateIso = state.summaryDates[index - 1];
            subscribeSummaryRecords();
          }
        });
        el.summaryNext.addEventListener("click", () => {
          const index = state.summaryDates.indexOf(state.summaryDateIso);
          if (index >= 0 && index < state.summaryDates.length - 1) {
            state.summaryDateIso = state.summaryDates[index + 1];
            subscribeSummaryRecords();
          }
        });
        el.summaryViewTabs.forEach((button) => {
          button.addEventListener("click", () => {
            state.summaryView = button.dataset.summaryView === "time" ? "time" : "alias";
            renderSummary();
          });
        });
        el.summaryList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-action]");
          if (!button) return;
          const action = button.dataset.action;
          const item = findRecord(button.dataset.id, state.summaryRecords);
          if (!item) return;
          if (action === "open-summary-file" && item.attachmentUrl) {
            window.open(item.attachmentUrl, "_blank", "noopener");
            return;
          }
          if (action === "edit-summary") {
            loadRecordIntoDraft(item);
            return;
          }
          if (action === "delete-summary") {
            if (!window.confirm("¿Borrar este movimiento?")) return;
            if (!window.confirm("Confirmación final: este movimiento se va a eliminar.")) return;
            deleteRecord(item.id).catch((error) => throttleError("No se pudo borrar comprobante", error));
          }
        });
      }

      function bindModals() {
        el.aliasModalClose.addEventListener("click", closeAliasModal);
        el.aliasModalBg.addEventListener("click", (event) => {
          if (event.target === el.aliasModalBg) closeAliasModal();
        });
        el.aliasModalList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-action='pick-alias']");
          if (!button) return;
          handlePickedAlias(button.dataset.id);
        });

        el.confirmCancel.addEventListener("click", closeConfirm);
        el.confirmOk.addEventListener("click", () => {
          continueConfirm().catch((error) => throttleError("No se pudo completar la acción", error));
        });
        el.confirmModalBg.addEventListener("click", (event) => {
          if (event.target === el.confirmModalBg) closeConfirm();
        });
      }

      function bindFooter() {
        el.saveNew.addEventListener("click", () => openConfirm("saveNew"));
        el.clearAll.addEventListener("click", () => openConfirm("clear"));
      }

      function bindFileInput() {
        el.fileInput.addEventListener("change", (event) => {
          const file = event.target.files && event.target.files[0];
          const target = state.fileTarget || { type: "draft" };
          state.fileTarget = null;
          if (!file) return;
          applySelectedFile(file, target).catch((error) => throttleError("No se pudo subir archivo", error));
        });
      }

      function bindPasteAndDrop() {
        window.addEventListener("paste", (event) => {
          const item = Array.from(event.clipboardData && event.clipboardData.items || []).find((entry) => entry.kind === "file");
          const file = item && item.getAsFile ? item.getAsFile() : null;
          if (!file || !el.panels.comp.classList.contains("active")) return;
          event.preventDefault();
          const target = state.fileTarget || { type: "draft" };
          state.fileTarget = null;
          applySelectedFile(file, target).catch((error) => throttleError("No se pudo pegar archivo", error));
        });
        window.addEventListener("dragover", (event) => {
          if (!el.panels.comp.classList.contains("active")) return;
          event.preventDefault();
        });
        window.addEventListener("drop", (event) => {
          if (!el.panels.comp.classList.contains("active")) return;
          const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
          if (!file) return;
          event.preventDefault();
          const target = state.fileTarget || { type: "draft" };
          state.fileTarget = null;
          applySelectedFile(file, target).catch((error) => throttleError("No se pudo arrastrar archivo", error));
        });
      }

      function initStaticUi() {
        activateTab("comp");
        syncDraftToInputs();
        renderAliases();
        renderTodayRecords();
        renderSummaryDate();
        renderSummary();
        bindTabs();
        bindAliasSection();
        bindDraftSection();
        bindRecords();
        bindSummary();
        bindModals();
        bindFooter();
        bindFileInput();
        bindPasteAndDrop();
      }

      function initFirebase() {
        if (!window.firebase || !window.firebase.firestore) throw new Error("Firebase no cargó correctamente");
        if (!window.firebase.apps.length) {
          window.firebase.initializeApp(firebaseConfig);
        }
        state.db = window.firebase.firestore();
        subscribeAliases();
        subscribeTodayRecords();
        subscribeSummaryDates();
      }

      initStaticUi();
      try {
        initFirebase();
      } catch (error) {
        throttleError("Error inicializando Firebase", error);
      }
    })();
</script>
