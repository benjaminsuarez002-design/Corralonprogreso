<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Corralon Progreso - Comprobantes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo: #e50000;
      --rojo2: #c0392b;
      --violeta: #6c4fc7;
      --borde: #c8c0e8;
      --fila-header: #d0c8f0;
      --fila-body: #e8e4f8;
      --texto-dark: #1a1a2e;
      --sombra: 0 2px 12px rgba(108,79,199,0.13);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: #f0ece8;
      color: var(--texto-dark);
    }

    .header {
      background: #fff;
      border-bottom: 2px solid var(--borde);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--sombra);
      z-index: 5;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--rojo);
      letter-spacing: .4px;
      text-transform: uppercase;
      flex: 1;
    }

    .tabs {
      background: #fff;
      border-bottom: 1px solid var(--borde);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }
    .tab {
      border: none;
      background: transparent;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: 700;
      color: #7a7a8a;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab.active {
      color: var(--violeta);
      border-bottom-color: var(--violeta);
    }

    .panel { display: none; flex: 1; min-height: 0; }
    .panel.active { display: flex; flex-direction: column; }
    #panelResumen {
      align-items: center;
      width: 100%;
      background: #fff;
    }
    #panelResumen .resumen-nav,
    #panelResumen .resumen-wrap {
      width: 33.3333vw;
      min-width: 33.3333vw;
      max-width: 33.3333vw;
      margin-left: auto;
      margin-right: auto;
    }

    .resumen-wrap {
      flex: 1;
      overflow: auto;
      background: #fff;
      padding: 10px 12px 130px;
    }
    .resumen-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
      border-bottom: none;
    }
    .resumen-nav::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100vw;
      height: 1px;
      background: var(--borde);
    }
    .resumen-fecha {
      font-weight: 800;
      color: var(--violeta);
      font-size: 14px;
    }
    .btn-dia {
      border: 1px solid var(--borde);
      background: #fff;
      color: var(--violeta);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-dia:disabled {
      opacity: .45;
      cursor: default;
    }
    .resumen-card {
      border: 1px solid var(--borde);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--sombra);
    }
    .resumen-head {
      background: var(--fila-header);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .resumen-alias {
      font-size: 15px;
      font-weight: 700;
      color: var(--violeta);
    }
    .resumen-total-alias {
      font-size: 15px;
      font-weight: 900;
      color: var(--texto-dark);
    }
    .resumen-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--borde);
      font-size: 13px;
      align-items: center;
    }
    .resumen-row:nth-child(even) { background: var(--fila-body); }
    .resumen-row:last-child { border-bottom: none; }
    .resumen-left { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; }
    .resumen-right { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; text-align: right; }
    .resumen-hora { font-weight: 700; color: #555; }
    .resumen-cli { color: var(--texto-dark); font-weight: 700; text-align: right; }
    .resumen-monto-item { color: #111827; font-weight: 800; text-align: right; }
    .resumen-comp { color: var(--violeta); font-weight: 700; }
    .resumen-comp-link {
      border: none;
      background: transparent;
      color: var(--violeta);
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      font-size: 13px;
    }
    .resumen-comp-link:disabled {
      color: #999;
      cursor: default;
      text-decoration: none;
    }
    .resumen-vacio {
      text-align: center;
      color: #888;
      padding: 40px 16px;
      font-size: 14px;
    }

    .alias-box {
      padding: 14px;
      border-bottom: 1px solid var(--borde);
      background: #fff;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 8px;
    }
    .alias-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--borde);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    .alias-input:focus { border-color: var(--violeta); }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: var(--violeta);
      color: #fff;
    }

    .alias-list {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      padding: 0 0 120px;
    }
    .alias-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid var(--borde);
    }
    .alias-row:nth-child(even) { background: var(--fila-body); }
    .alias-name { font-size: 14px; font-weight: 700; }
    .alias-meta { font-size: 12px; color: #666; margin-top: 2px; line-height: 1.3; }
    .btn-del {
      border: none;
      background: #fff0f0;
      color: var(--rojo);
      border-radius: 8px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .tabla-header {
      background: var(--fila-header);
      border-bottom: 2px solid var(--borde);
      padding: 7px 10px;
      display: grid;
      grid-template-columns: 1fr 170px 110px 190px 120px 110px 34px 120px;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--violeta);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .lista {
      flex: 1;
      overflow: auto;
      padding-bottom: 128px;
      background: #fff;
    }

    .fila, .fila-agregar {
      min-width: 0;
      border-bottom: 1px solid var(--borde);
      padding: 6px 10px;
      display: grid;
      grid-template-columns: 1fr 170px 110px 190px 120px 110px 34px 120px;
      gap: 6px;
      align-items: center;
      background: #fff;
    }
    .fila:nth-child(even) { background: var(--fila-body); }
    .fila-agregar {
      position: static;
      background: rgba(108,79,199,.05);
      border-top: 1px dashed var(--borde);
    }

    .inp {
      width: 100%;
      border: 1px solid #bcb4df;
      background: #fff;
      outline: none;
      font-size: 14px;
      color: var(--texto-dark);
      border-radius: 7px;
      padding: 6px 8px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .inp:focus {
      border-color: var(--violeta);
      box-shadow: 0 0 0 2px rgba(108,79,199,.12);
    }
    .inp[readonly] { background: #fcfbff; }
    .inp.num { text-align: right; font-weight: 700; color: var(--violeta); }
    .inp.alias-pick {
      cursor: pointer;
      font-weight: 600;
    }

    .btn-add {
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--violeta);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    .btn-comp {
      border: 1px solid var(--borde);
      background: #fff;
      color: #555;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-comp.ok {
      background: #eefcf3;
      border-color: #93d7aa;
      color: #257a44;
    }

    .totales {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 56px;
      background: #fff;
      border-top: 2px solid var(--borde);
      padding: 10px 14px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
      box-shadow: 0 -2px 12px rgba(108,79,199,.1);
    }
    .totales-label {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .totales-valor {
      font-size: 26px;
      font-weight: 900;
      color: var(--violeta);
    }

    .franja {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56px;
      background: linear-gradient(135deg, var(--rojo), var(--rojo2));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 10px;
      border-radius: 26px 26px 0 0;
    }
    .btn-f {
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      background: rgba(255,255,255,.95);
      color: var(--rojo2);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
    }

    .picker-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }
    .picker-bg.open { display: flex; }
    .picker-box {
      width: min(94vw, 420px);
      max-height: 75vh;
      overflow: hidden;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      display: flex;
      flex-direction: column;
    }
    .picker-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--borde);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      color: var(--violeta);
    }
    .picker-list {
      overflow-y: auto;
      padding: 8px;
    }
    .picker-item {
      width: 100%;
      border: none;
      background: #f7f5ff;
      color: var(--texto-dark);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .picker-item:hover { background: #ece8ff; }
    .picker-empty {
      padding: 20px;
      color: #888;
      text-align: center;
      font-size: 14px;
    }

    .confirm-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 130;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }
    .confirm-bg.open { display: flex; }
    .confirm-box {
      width: min(94vw, 430px);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      overflow: hidden;
    }
    .confirm-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--borde);
      color: var(--violeta);
      font-size: 16px;
      font-weight: 700;
    }
    .confirm-body {
      padding: 14px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }
    .confirm-actions {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-cancel {
      border: 1px solid var(--borde);
      background: #fff;
      color: #666;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-ok {
      border: none;
      background: var(--violeta);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .alias-box {
        grid-template-columns: 1fr;
      }
      .alias-box .btn {
        width: 100%;
      }
    }

    @media (max-width: 760px) {
      html, body {
        overflow: auto;
      }
      #panelResumen {
        align-items: stretch;
        width: 100%;
        background: #fff;
      }
      #panelResumen .resumen-nav,
      #panelResumen .resumen-wrap {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
      }
      .header {
        padding: 7px 10px;
      }
      .header-title {
        font-size: 16px;
      }
      .tabs .tab {
        padding: 8px 7px;
        font-size: 13px;
      }

      .tabla-header {
        display: none;
      }
      .lista {
        padding-bottom: 126px;
      }
      .fila, .fila-agregar {
        min-width: 0;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, .95fr) auto;
        grid-template-areas:
          "cliente boleta monto"
          "alias fecha hora"
          "comp comp accion";
        gap: 4px 6px;
        padding: 6px 8px;
      }
      .fila .inp, .fila-agregar .inp {
        font-size: 13px;
        min-height: 28px;
        padding: 2px 4px;
      }
      .inp.alias-pick { padding: 4px 6px; }
      .fila > :nth-child(1),
      .fila-agregar > :nth-child(1) {
        grid-area: cliente;
        font-size: 13px;
        font-weight: 600;
      }
      .fila > :nth-child(2),
      .fila-agregar > :nth-child(2) {
        grid-area: boleta;
      }
      .fila > :nth-child(3),
      .fila-agregar > :nth-child(3) {
        grid-area: monto;
        text-align: right;
      }
      .fila > :nth-child(4),
      .fila-agregar > :nth-child(4) {
        grid-area: alias;
        padding: 4px 6px;
      }
      .fila > :nth-child(5),
      .fila-agregar > :nth-child(5) {
        grid-area: fecha;
        font-size: 11px;
        color: #767676;
      }
      .fila > :nth-child(6),
      .fila-agregar > :nth-child(6) {
        grid-area: hora;
        font-size: 11px;
        color: #767676;
        text-align: right;
      }
      .fila > :nth-child(7),
      .fila-agregar > :nth-child(7),
      .fila > :nth-child(8),
      .fila-agregar > :nth-child(8) {
        min-height: 30px;
      }
      .fila > :nth-child(8),
      .fila-agregar > :nth-child(8) {
        grid-area: comp;
        width: 100%;
      }
      .fila > :nth-child(7),
      .fila-agregar > :nth-child(7) {
        grid-area: accion;
        width: 64px;
        min-height: 30px;
        justify-self: end;
      }
      .btn-add {
        width: 64px;
        height: 30px;
        font-size: 16px;
      }
      .btn-del {
        width: 64px;
        height: 30px;
        border-radius: 8px;
        font-size: 18px;
      }
      .btn-comp {
        width: 100%;
        text-align: center;
        padding: 5px 6px;
        font-size: 11px;
      }

      .resumen-row {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .resumen-left { align-items: flex-start; }
      .resumen-right { align-items: flex-end; }

      .totales {
        bottom: 52px;
        padding: 4px 8px;
      }
      .totales-label {
        font-size: 11px;
      }
      .totales-valor {
        font-size: 19px;
      }
      .franja {
        height: 52px;
        padding: 0 4px;
      }
      .btn-f {
        flex: 1;
        min-width: 0;
        text-align: center;
        padding: 6px 4px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Comprobantes</div>
  </div>

  <div class="tabs">
    <button class="tab" id="tabAlias">Alias</button>
    <button class="tab active" id="tabComp">Comprobantes</button>
    <button class="tab" id="tabResumen">Resumen</button>
  </div>

  <section class="panel" id="panelAlias">
    <div class="alias-box">
      <input class="alias-input" id="aliasNombreInput" placeholder="Nombre (ej: Proveedor 1)" />
      <input class="alias-input" id="aliasAliasInput" placeholder="Alias (ej: alias.mp)" />
      <input class="alias-input" id="aliasCuitInput" placeholder="CUIT (ej: 20-12345678-9)" />
      <button class="btn" id="btnAliasAdd">+ Agregar</button>
    </div>
    <div class="alias-list" id="aliasList"></div>
  </section>

  <section class="panel" id="panelResumen">
    <div class="resumen-nav">
      <button class="btn-dia" id="btnDiaPrev">← Día anterior</button>
      <div class="resumen-fecha" id="resumenFechaLabel">-</div>
      <button class="btn-dia" id="btnDiaNext">Día siguiente →</button>
    </div>
    <div class="resumen-wrap" id="resumenBody"></div>
  </section>

  <section class="panel active" id="panelComp">
    <div class="tabla-header">
      <div>Cliente</div>
      <div>Nª de maquina</div>
      <div>Monto $</div>
      <div>Trasferencia a</div>
      <div>Fecha</div>
      <div>Hora</div>
      <div></div>
      <div>Comprobante</div>
    </div>

    <div class="lista" id="lista">
      <div id="rows"></div>
      <div class="fila-agregar">
        <input class="inp" id="nCliente" placeholder="PUSCAMA" />
        <input class="inp" id="nMaquina" placeholder="0004-00014164" />
        <input class="inp num" id="nMonto" placeholder="0" inputmode="decimal" />
        <input class="inp alias-pick" id="nTransfer" placeholder="Elegir alias" readonly />
        <input class="inp" id="nFecha" placeholder="10/04/2026" />
        <input class="inp" id="nHora" placeholder="08:11" />
        <button class="btn-add" id="btnAdd" title="Agregar">+</button>
        <button class="btn-comp" id="btnNuevoComp" type="button" data-new="1">Subir</button>
      </div>
    </div>
  </section>

  <div class="totales">
    <div class="totales-label">Total monto</div>
    <div class="totales-valor" id="totalMonto">$ 0</div>
  </div>

  <div class="franja">
    <button class="btn-f" id="btnGuardarNuevo">Guardar y nuevo</button>
    <button class="btn-f" id="btnLimpiar">Limpiar</button>
  </div>

  <div class="picker-bg" id="pickerBg">
    <div class="picker-box">
      <div class="picker-head">
        <span>Elegir alias</span>
        <button class="btn-del" id="pickerClose">x</button>
      </div>
      <div class="picker-list" id="pickerList"></div>
    </div>
  </div>

  <div class="confirm-bg" id="confirmBg">
    <div class="confirm-box">
      <div class="confirm-head" id="confirmHead">Confirmación</div>
      <div class="confirm-body" id="confirmBody"></div>
      <div class="confirm-actions">
        <button class="btn-cancel" id="confirmCancel">Cancelar</button>
        <button class="btn-ok" id="confirmOk">Continuar</button>
      </div>
    </div>
  </div>

  <input id="compFileInput" type="file" accept="image/*,.pdf" capture="environment" style="display:none" />

    <script src="comprobantes.sync.js"></script>
</body>
</html>
