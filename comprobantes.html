<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Corralon Progreso - Comprobantes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rojo: #e50000;
      --rojo2: #c0392b;
      --violeta: #6c4fc7;
      --borde: #c8c0e8;
      --fila-header: #d0c8f0;
      --fila-body: #e8e4f8;
      --texto-dark: #1a1a2e;
      --sombra: 0 2px 12px rgba(108,79,199,0.13);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: #f0ece8;
      color: var(--texto-dark);
    }

    .header {
      background: #fff;
      border-bottom: 2px solid var(--borde);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--sombra);
      z-index: 5;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--rojo);
      letter-spacing: .4px;
      text-transform: uppercase;
      flex: 1;
    }

    .tabs {
      background: #fff;
      border-bottom: 1px solid var(--borde);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }
    .tab {
      border: none;
      background: transparent;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: 700;
      color: #7a7a8a;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab.active {
      color: var(--violeta);
      border-bottom-color: var(--violeta);
    }

    .panel { display: none; flex: 1; min-height: 0; }
    .panel.active { display: flex; flex-direction: column; }
    #panelResumen {
      align-items: center;
      width: 100%;
      background: #fff;
    }
    #panelResumen .resumen-nav,
    #panelResumen .resumen-wrap {
      width: 33.3333vw;
      min-width: 33.3333vw;
      max-width: 33.3333vw;
      margin-left: auto;
      margin-right: auto;
    }

    .resumen-wrap {
      flex: 1;
      overflow: auto;
      background: #fff;
      padding: 10px 12px 130px;
    }
    .resumen-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
      border-bottom: none;
    }
    .resumen-nav::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100vw;
      height: 1px;
      background: var(--borde);
    }
    .resumen-fecha {
      font-weight: 800;
      color: var(--violeta);
      font-size: 14px;
    }
    .btn-dia {
      border: 1px solid var(--borde);
      background: #fff;
      color: var(--violeta);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-dia:disabled {
      opacity: .45;
      cursor: default;
    }
    .resumen-card {
      border: 1px solid var(--borde);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--sombra);
    }
    .resumen-head {
      background: var(--fila-header);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .resumen-alias {
      font-size: 15px;
      font-weight: 700;
      color: var(--violeta);
    }
    .resumen-total-alias {
      font-size: 15px;
      font-weight: 900;
      color: var(--texto-dark);
    }
    .resumen-row {
      display: grid;
      grid-template-columns: 90px 1fr 190px;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--borde);
      font-size: 13px;
      align-items: center;
    }
    .resumen-row:nth-child(even) { background: var(--fila-body); }
    .resumen-row:last-child { border-bottom: none; }
    .resumen-hora { font-weight: 700; color: #555; }
    .resumen-cli { color: var(--texto-dark); font-weight: 700; }
    .resumen-comp {
      text-align: right;
      color: var(--violeta);
      font-weight: 700;
    }
    .resumen-comp-link {
      border: none;
      background: transparent;
      color: var(--violeta);
      font-weight: 700;
      cursor: pointer;
      text-decoration: underline;
      font-size: 13px;
    }
    .resumen-comp-link:disabled {
      color: #999;
      cursor: default;
      text-decoration: none;
    }
    .resumen-vacio {
      text-align: center;
      color: #888;
      padding: 40px 16px;
      font-size: 14px;
    }

    .alias-box {
      padding: 14px;
      border-bottom: 1px solid var(--borde);
      background: #fff;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 8px;
    }
    .alias-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--borde);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    .alias-input:focus { border-color: var(--violeta); }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: var(--violeta);
      color: #fff;
    }

    .alias-list {
      flex: 1;
      overflow-y: auto;
      background: #fff;
      padding: 0 0 120px;
    }
    .alias-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid var(--borde);
    }
    .alias-row:nth-child(even) { background: var(--fila-body); }
    .alias-name { font-size: 14px; font-weight: 700; }
    .alias-meta { font-size: 12px; color: #666; margin-top: 2px; line-height: 1.3; }
    .btn-del {
      border: none;
      background: #fff0f0;
      color: var(--rojo);
      border-radius: 8px;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .tabla-header {
      background: var(--fila-header);
      border-bottom: 2px solid var(--borde);
      padding: 7px 10px;
      display: grid;
      grid-template-columns: 110px 170px 190px 120px 110px 1fr 34px 120px;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--violeta);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .lista {
      flex: 1;
      overflow: auto;
      padding-bottom: 128px;
      background: #fff;
    }

    .fila, .fila-agregar {
      min-width: 0;
      border-bottom: 1px solid var(--borde);
      padding: 6px 10px;
      display: grid;
      grid-template-columns: 110px 170px 190px 120px 110px 1fr 34px 120px;
      gap: 6px;
      align-items: center;
      background: #fff;
    }
    .fila:nth-child(even) { background: var(--fila-body); }
    .fila-agregar {
      position: static;
      background: rgba(108,79,199,.05);
      border-top: 1px dashed var(--borde);
    }

    .inp {
      width: 100%;
      border: 1px solid #bcb4df;
      background: #fff;
      outline: none;
      font-size: 14px;
      color: var(--texto-dark);
      border-radius: 7px;
      padding: 6px 8px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .inp:focus {
      border-color: var(--violeta);
      box-shadow: 0 0 0 2px rgba(108,79,199,.12);
    }
    .inp[readonly] { background: #fcfbff; }
    .inp.num { text-align: right; font-weight: 700; color: var(--violeta); }
    .inp.alias-pick {
      cursor: pointer;
      font-weight: 600;
    }

    .btn-add {
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--violeta);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }
    .btn-comp {
      border: 1px solid var(--borde);
      background: #fff;
      color: #555;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-comp.ok {
      background: #eefcf3;
      border-color: #93d7aa;
      color: #257a44;
    }

    .totales {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 56px;
      background: #fff;
      border-top: 2px solid var(--borde);
      padding: 10px 14px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 14px;
      box-shadow: 0 -2px 12px rgba(108,79,199,.1);
    }
    .totales-label {
      font-size: 14px;
      color: #888;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: .5px;
    }
    .totales-valor {
      font-size: 26px;
      font-weight: 900;
      color: var(--violeta);
    }

    .franja {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56px;
      background: linear-gradient(135deg, var(--rojo), var(--rojo2));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 10px;
      border-radius: 26px 26px 0 0;
    }
    .btn-f {
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      background: rgba(255,255,255,.95);
      color: var(--rojo2);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
    }

    .picker-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }
    .picker-bg.open { display: flex; }
    .picker-box {
      width: min(94vw, 420px);
      max-height: 75vh;
      overflow: hidden;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      display: flex;
      flex-direction: column;
    }
    .picker-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--borde);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      color: var(--violeta);
    }
    .picker-list {
      overflow-y: auto;
      padding: 8px;
    }
    .picker-item {
      width: 100%;
      border: none;
      background: #f7f5ff;
      color: var(--texto-dark);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .picker-item:hover { background: #ece8ff; }
    .picker-empty {
      padding: 20px;
      color: #888;
      text-align: center;
      font-size: 14px;
    }

    .confirm-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 130;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }
    .confirm-bg.open { display: flex; }
    .confirm-box {
      width: min(94vw, 430px);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      overflow: hidden;
    }
    .confirm-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--borde);
      color: var(--violeta);
      font-size: 16px;
      font-weight: 700;
    }
    .confirm-body {
      padding: 14px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }
    .confirm-actions {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .btn-cancel {
      border: 1px solid var(--borde);
      background: #fff;
      color: #666;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-ok {
      border: none;
      background: var(--violeta);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .alias-box {
        grid-template-columns: 1fr;
      }
      .alias-box .btn {
        width: 100%;
      }
    }

    @media (max-width: 760px) {
      html, body {
        overflow: auto;
      }
      #panelResumen {
        align-items: stretch;
        width: 100%;
        background: #fff;
      }
      #panelResumen .resumen-nav,
      #panelResumen .resumen-wrap {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
      }
      .header {
        padding: 7px 10px;
      }
      .header-title {
        font-size: 16px;
      }
      .tabs .tab {
        padding: 8px 7px;
        font-size: 13px;
      }

      .tabla-header {
        display: none;
      }
      .lista {
        padding-bottom: 126px;
      }
      .fila, .fila-agregar {
        min-width: 0;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, .95fr) auto;
        grid-template-areas:
          "cliente boleta monto"
          "alias fecha hora"
          "comp comp accion";
        gap: 4px 6px;
        padding: 6px 8px;
      }
      .fila .inp, .fila-agregar .inp {
        font-size: 13px;
        min-height: 28px;
        padding: 2px 4px;
      }
      .inp.alias-pick { padding: 4px 6px; }
      .fila > :nth-child(1),
      .fila-agregar > :nth-child(1) {
        grid-area: monto;
        text-align: right;
      }
      .fila > :nth-child(2),
      .fila-agregar > :nth-child(2) {
        grid-area: boleta;
      }
      .fila > :nth-child(3),
      .fila-agregar > :nth-child(3) {
        grid-area: alias;
      }
      .fila > :nth-child(4),
      .fila-agregar > :nth-child(4) {
        grid-area: fecha;
        font-size: 11px;
        color: #767676;
      }
      .fila > :nth-child(5),
      .fila-agregar > :nth-child(5) {
        grid-area: hora;
        font-size: 11px;
        color: #767676;
        text-align: right;
      }
      .fila > :nth-child(6),
      .fila-agregar > :nth-child(6) {
        grid-area: cliente;
        font-size: 13px;
        font-weight: 600;
      }
      .fila > :nth-child(7),
      .fila-agregar > :nth-child(7),
      .fila > :nth-child(8),
      .fila-agregar > :nth-child(8) {
        min-height: 30px;
      }
      .fila > :nth-child(8),
      .fila-agregar > :nth-child(8) {
        grid-area: comp;
        width: 100%;
      }
      .fila > :nth-child(7),
      .fila-agregar > :nth-child(7) {
        grid-area: accion;
        width: 64px;
        min-height: 30px;
        justify-self: end;
      }
      .btn-add {
        width: 64px;
        height: 30px;
        font-size: 16px;
      }
      .btn-del {
        width: 64px;
        height: 30px;
        border-radius: 8px;
        font-size: 18px;
      }
      .btn-comp {
        width: 100%;
        text-align: center;
        padding: 5px 6px;
        font-size: 11px;
      }

      .resumen-row {
        grid-template-columns: 72px 1fr;
        gap: 6px;
      }
      .resumen-comp {
        grid-column: 1 / -1;
        text-align: left;
      }

      .totales {
        bottom: 52px;
        padding: 4px 8px;
      }
      .totales-label {
        font-size: 11px;
      }
      .totales-valor {
        font-size: 19px;
      }
      .franja {
        height: 52px;
        padding: 0 4px;
      }
      .btn-f {
        flex: 1;
        min-width: 0;
        text-align: center;
        padding: 6px 4px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Comprobantes</div>
  </div>

  <div class="tabs">
    <button class="tab" id="tabAlias">Alias</button>
    <button class="tab active" id="tabComp">Comprobantes</button>
    <button class="tab" id="tabResumen">Resumen</button>
  </div>

  <section class="panel" id="panelAlias">
    <div class="alias-box">
      <input class="alias-input" id="aliasNombreInput" placeholder="Nombre (ej: Proveedor 1)" />
      <input class="alias-input" id="aliasAliasInput" placeholder="Alias (ej: alias.mp)" />
      <input class="alias-input" id="aliasCuitInput" placeholder="CUIT (ej: 20-12345678-9)" />
      <button class="btn" id="btnAliasAdd">+ Agregar</button>
    </div>
    <div class="alias-list" id="aliasList"></div>
  </section>

  <section class="panel" id="panelResumen">
    <div class="resumen-nav">
      <button class="btn-dia" id="btnDiaPrev">← Día anterior</button>
      <div class="resumen-fecha" id="resumenFechaLabel">-</div>
      <button class="btn-dia" id="btnDiaNext">Día siguiente →</button>
    </div>
    <div class="resumen-wrap" id="resumenBody"></div>
  </section>

  <section class="panel active" id="panelComp">
    <div class="tabla-header">
      <div>Monto $</div>
      <div>Nª de maquina</div>
      <div>Trasferencia a</div>
      <div>Fecha</div>
      <div>Hora</div>
      <div>Cliente</div>
      <div></div>
      <div>Comprobante</div>
    </div>

    <div class="lista" id="lista">
      <div id="rows"></div>
      <div class="fila-agregar">
        <input class="inp num" id="nMonto" placeholder="0" inputmode="decimal" />
        <input class="inp" id="nMaquina" placeholder="0004-00014164" />
        <input class="inp alias-pick" id="nTransfer" placeholder="Elegir alias" readonly />
        <input class="inp" id="nFecha" placeholder="10/04/2026" />
        <input class="inp" id="nHora" placeholder="08:11" />
        <input class="inp" id="nCliente" placeholder="PUSCAMA" />
        <button class="btn-add" id="btnAdd" title="Agregar">+</button>
        <button class="btn-comp" id="btnNuevoComp" type="button" data-new="1">Subir</button>
      </div>
    </div>
  </section>

  <div class="totales">
    <div class="totales-label">Total monto</div>
    <div class="totales-valor" id="totalMonto">$ 0</div>
  </div>

  <div class="franja">
    <button class="btn-f" id="btnGuardarNuevo">Guardar y nuevo</button>
    <button class="btn-f" id="btnLimpiar">Limpiar</button>
  </div>

  <div class="picker-bg" id="pickerBg">
    <div class="picker-box">
      <div class="picker-head">
        <span>Elegir alias</span>
        <button class="btn-del" id="pickerClose">x</button>
      </div>
      <div class="picker-list" id="pickerList"></div>
    </div>
  </div>

  <div class="confirm-bg" id="confirmBg">
    <div class="confirm-box">
      <div class="confirm-head" id="confirmHead">Confirmación</div>
      <div class="confirm-body" id="confirmBody"></div>
      <div class="confirm-actions">
        <button class="btn-cancel" id="confirmCancel">Cancelar</button>
        <button class="btn-ok" id="confirmOk">Continuar</button>
      </div>
    </div>
  </div>

      totalMonto: document.getElementById('totalMonto'),
      nMonto: document.getElementById('nMonto'),
      nMaquina: document.getElementById('nMaquina'),
      nTransfer: document.getElementById('nTransfer'),
      nFecha: document.getElementById('nFecha'),
      nHora: document.getElementById('nHora'),
      nCliente: document.getElementById('nCliente'),
      pickerBg: document.getElementById('pickerBg'),
      pickerList: document.getElementById('pickerList'),
      confirmBg: document.getElementById('confirmBg'),
      confirmHead: document.getElementById('confirmHead'),
      confirmBody: document.getElementById('confirmBody'),
      confirmOk: document.getElementById('confirmOk'),
      confirmCancel: document.getElementById('confirmCancel'),
      btnGuardarNuevo: document.getElementById('btnGuardarNuevo'),
      btnLimpiar: document.getElementById('btnLimpiar'),
      btnNuevoComp: document.getElementById('btnNuevoComp'),
      compFileInput: document.getElementById('compFileInput')
    };

    function sbHeaders(withJson) {
      const base = {
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'apikey': SUPABASE_KEY
      };
      if (withJson) base['Content-Type'] = 'application/json';
      return base;
    }

    async function sbRequest(path, options = {}) {
      const method = options.method || 'GET';
      const headers = { ...sbHeaders(!!options.body && !options.rawBody), ...(options.headers || {}) };
      const req = {
        method,
        headers
      };
      if (options.rawBody !== undefined) req.body = options.rawBody;
      else if (options.body !== undefined) req.body = JSON.stringify(options.body);

      const res = await fetch(`${SUPABASE_URL}${path}`, req);
      const text = await res.text();
      if (!res.ok) {
        throw new Error(text || `Error ${res.status}`);
      }
      if (!text) return null;
      try { return JSON.parse(text); } catch (_) { return text; }
    }

    function encodeStoragePath(path) {
      return String(path || '')
        .split('/')
        .map(encodeURIComponent)
        .join('/');
    }

    function draftObjectApiPath() {
      return `/storage/v1/object/${SUPABASE_BUCKET}/${encodeStoragePath(DRAFT_OBJECT_PATH)}`;
    }

    function isoHoy() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function fechaHoy() {
      const d = new Date();
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      return `${dd}/${mm}/${yyyy}`;
    }

    function fechaDesdeIso(iso) {
      const m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return fechaHoy();
      return `${m[3]}/${m[2]}/${m[1]}`;
    }

    function isoDesdeFecha(fechaTxt) {
      const s = String(fechaTxt || '').trim();
      let m = s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
      if (m) {
        const dd = String(Number(m[1]) || 0).padStart(2, '0');
        const mm = String(Number(m[2]) || 0).padStart(2, '0');
        const yyyy = m[3];
        return `${yyyy}-${mm}-${dd}`;
      }
      m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (m) {
        const yyyy = m[1];
        const mm = String(Number(m[2]) || 0).padStart(2, '0');
        const dd = String(Number(m[3]) || 0).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      }
      return isoHoy();
    }

    function horaAhora() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return `${hh}:${mi}`;
    }

    function fmtMonto(n) {
      return '$ ' + Number(n || 0).toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function fmtMontoCampo(v) {
      const t = String(v || '').trim();
      if (!t) return '';
      const n = parseMonto(t);
      if (!Number.isFinite(n)) return '';
      return '$ ' + n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtMontoCampo(v) {
      const txt = String(v ?? '').trim();
      if (!txt) return '';
      const n = parseMonto(txt);
      if (!Number.isFinite(n)) return '';
      return '$ ' + n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function parseMonto(s) {
      if (s == null) return 0;
      const cleaned = String(s).replace(/\./g, '').replace(',', '.').replace(/[^0-9.-]/g, '');
      const n = Number(cleaned);
      return Number.isFinite(n) ? n : 0;
    }

    function formatearMaquina(valor) {
      const raw = String(valor || '').trim();
      if (!raw) return '';
      const grupos = raw.match(/\d+/g) || [];
      if (grupos.length >= 2) {
        const suc = String(Number(grupos[0]) || 0).padStart(4, '0');
        const nro = String(Number(grupos[1]) || 0).padStart(8, '0');
        return `${suc}-${nro}`;
      }
      return raw;
    }

    function autocompletarFechaHora() {
      if (!els.nFecha.value.trim()) els.nFecha.value = fechaHoy();
      if (!els.nHora.value.trim()) els.nHora.value = horaAhora();
    }

    function recalcTotal() {
      const total = rows.reduce((acc, r) => acc + parseMonto(r.monto), 0);
      els.totalMonto.textContent = fmtMonto(total);
    }

    function setGuardandoState(on) {
      guardando = !!on;
      els.btnGuardarNuevo.disabled = on;
      els.btnLimpiar.disabled = on;
      els.confirmOk.disabled = on;
      if (on) {
        els.btnGuardarNuevo.textContent = 'Guardando...';
      } else {
        els.btnGuardarNuevo.textContent = 'Guardar y nuevo';
      }
    }

    function safeRevoke(url) {
      if (typeof url === 'string' && url.startsWith('blob:')) URL.revokeObjectURL(url);
    }

    function normalizarRowDraft(r) {
      return {
        monto: String(r?.monto || ''),
        maquina: String(r?.maquina || ''),
        transfer: String(r?.transfer || ''),
        fecha: String(r?.fecha || ''),
        hora: String(r?.hora || ''),
        cliente: String(r?.cliente || ''),
        comprobante: r?.comprobante && r.comprobante.url && !String(r.comprobante.url).startsWith('blob:')
          ? {
              name: String(r.comprobante.name || ''),
              url: String(r.comprobante.url || ''),
              type: String(r.comprobante.type || '')
            }
          : null
      };
    }

    function buildDraftPayload() {
      return {
        rows: rows.map(normalizarRowDraft),
        newRow: {
          monto: String(els.nMonto?.value || ''),
          maquina: String(els.nMaquina?.value || ''),
          transfer: String(els.nTransfer?.value || ''),
          fecha: String(els.nFecha?.value || ''),
          hora: String(els.nHora?.value || ''),
          cliente: String(els.nCliente?.value || '')
        },
        updated_at: new Date().toISOString()
      };
    }

    async function persistDraftSupabase() {
      const draft = buildDraftPayload();
      await sbRequest(draftObjectApiPath(), {
        method: 'POST',
        rawBody: JSON.stringify(draft),
        headers: {
          'x-upsert': 'true',
          'Content-Type': 'application/json'
        }
      });
    }

    async function persistDraftSupabaseSafe() {
      if (loadingDraftFromSupabase) return;
      if (draftSaving) {
        draftSavePending = true;
        return;
      }
      draftSaving = true;
      try {
        await persistDraftSupabase();
      } finally {
        draftSaving = false;
        if (draftSavePending) {
          draftSavePending = false;
          await persistDraftSupabaseSafe();
        }
      }
    }

    async function saveDraftNow() {
      if (loadingDraftFromSupabase) return;
      await persistDraftSupabaseSafe();
    }

    function syncAfterUpdate() {
      saveDraftNow().catch((e) => {
        console.error('[COMPROBANTES] Sync afterupdate falló', e);
      });
    }

    async function loadDraft() {
      loadingDraftFromSupabase = true;
      try {
        const d = await sbRequest(draftObjectApiPath());
        if (!d || typeof d !== 'object') return;
        const loadedRows = Array.isArray(d?.rows) ? d.rows.map(normalizarRowDraft) : [];
        rows.length = 0;
        loadedRows.forEach((r) => rows.push(r));
        if (d?.newRow) {
          els.nMonto.value = fmtMontoCampo(String(d.newRow.monto || ''));
          els.nMaquina.value = String(d.newRow.maquina || '');
          els.nTransfer.value = String(d.newRow.transfer || '');
          els.nFecha.value = String(d.newRow.fecha || '');
          els.nHora.value = String(d.newRow.hora || '');
          els.nCliente.value = String(d.newRow.cliente || '');
        }
      } catch (e) {
        const msg = String(e?.message || e || '');
        if (!/404|not found|NoSuchKey|Object not found/i.test(msg)) {
          console.error('[COMPROBANTES] Error cargando borrador desde Supabase', e);
        }
      } finally {
        loadingDraftFromSupabase = false;
      }
    }

    function activarTab(tab) {
      const isAlias = tab === 'alias';
      const isComp = tab === 'comp';
      const isResumen = tab === 'resumen';
      els.tabAlias.classList.toggle('active', isAlias);
      els.tabComp.classList.toggle('active', isComp);
      els.tabResumen.classList.toggle('active', isResumen);
      els.panelAlias.classList.toggle('active', isAlias);
      els.panelComp.classList.toggle('active', isComp);
      els.panelResumen.classList.toggle('active', isResumen);
      try { localStorage.setItem(LAST_TAB_KEY, tab); } catch (_) {}
      if (isResumen) refrescarResumen().catch(console.error);
    }

    function cargarAliases() {
      try {
        const raw = localStorage.getItem(ALIAS_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        aliases = Array.isArray(arr)
          ? arr.map((a) => {
              if (!a) return null;
              if (typeof a === 'string') {
                const nombre = a.trim();
                return nombre ? { nombre, alias: '', cuit: '' } : null;
              }
              const nombre = String(a.nombre || a.name || '').trim();
              const aliasTxt = String(a.alias || '').trim();
              const cuit = String(a.cuit || '').trim();
              return nombre ? { nombre, alias: aliasTxt, cuit } : null;
            }).filter(Boolean)
          : [];
      } catch (_) {
        aliases = [];
      }
      renderAliases();
    }

    function guardarAliases() {
      localStorage.setItem(ALIAS_KEY, JSON.stringify(aliases));
    }

    function normTxt(v) {
      return String(v || '').trim().toLowerCase();
    }

    function proveedorNombreDesdeValor(v) {
      const raw = String(v || '').trim();
      if (!raw) return '';
      const nraw = normTxt(raw);
      const found = aliases.find((a) => normTxt(a.alias) === nraw || normTxt(a.nombre) === nraw);
      return found?.nombre || raw;
    }

    function renderAliases() {
      if (!aliases.length) {
        els.aliasList.innerHTML = '<div class="alias-row"><div class="alias-name" style="color:#888;font-weight:400">Sin alias cargados</div></div>';
        return;
      }
      els.aliasList.innerHTML = aliases.map((a, i) => `
        <div class="alias-row">
          <div>
            <div class="alias-name">${a.nombre}</div>
            <div class="alias-meta">${a.alias ? `Alias: ${a.alias}` : 'Alias: -'} | ${a.cuit ? `CUIT: ${a.cuit}` : 'CUIT: -'}</div>
          </div>
          <button class="btn-del" onclick="delAlias(${i})">x</button>
        </div>
      `).join('');
    }

    window.delAlias = (i) => {
      aliases.splice(i, 1);
      guardarAliases();
      renderAliases();
    };

    function addAlias() {
      const nombre = els.aliasNombreInput.value.trim();
      const aliasTxt = els.aliasAliasInput.value.trim();
      const cuit = els.aliasCuitInput.value.trim();
      if (!nombre) return;
      const exists = aliases.some((a) =>
        String(a.nombre || '').trim().toLowerCase() === nombre.toLowerCase() ||
        (aliasTxt && String(a.alias || '').trim().toLowerCase() === aliasTxt.toLowerCase())
      );
      if (!exists) aliases.push({ nombre, alias: aliasTxt, cuit });
      els.aliasNombreInput.value = '';
      els.aliasAliasInput.value = '';
      els.aliasCuitInput.value = '';
      guardarAliases();
      renderAliases();
      els.aliasNombreInput.focus();
    }

    function abrirPicker(onPick) {
      onPickAlias = onPick;
      if (!aliases.length) {
        els.pickerList.innerHTML = '<div class="picker-empty">No hay alias cargados. Agregá uno en la pestaña Alias.</div>';
      } else {
        els.pickerList.innerHTML = aliases.map((a) => {
          const valor = a.alias || a.nombre;
          const detalle = [a.nombre, a.alias ? `Alias: ${a.alias}` : '', a.cuit ? `CUIT: ${a.cuit}` : '']
            .filter(Boolean)
            .join(' - ');
          return `<button class="picker-item" data-alias="${valor}">${detalle}</button>`;
        }).join('');
      }
      els.pickerBg.classList.add('open');
    }

    function cerrarPicker() {
      els.pickerBg.classList.remove('open');
      onPickAlias = null;
    }

    function horaToKey(hora) {
      const m = String(hora || '').trim().match(/^(\d{1,2}):(\d{2})/);
      if (!m) return Number.MAX_SAFE_INTEGER;
      const hh = Number(m[1]);
      const mm = Number(m[2]);
      if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return Number.MAX_SAFE_INTEGER;
      return hh * 60 + mm;
    }

    function rowHasDraftData(r) {
      return !!(
        String(r?.monto || '').trim() ||
        String(r?.maquina || '').trim() ||
        String(r?.transfer || r?.transferencia || '').trim() ||
        String(r?.cliente || '').trim() ||
        (r?.comprobante && (r.comprobante.url || r.comprobante_name || r.comprobante_nombre))
      );
    }

    function mapDraftRowToResumen(r) {
      const fechaTxt = String(r?.fecha || r?.fecha_texto || '').trim();
      const fechaIso = isoDesdeFecha(fechaTxt || fechaHoy());
      const compUrl = r?.comprobante_url || r?.comprobante?.url || null;
      const compName = r?.comprobante_nombre || r?.comprobante?.name || null;
      const compType = r?.comprobante_tipo || r?.comprobante?.type || null;
      return {
        id: r?.id || null,
        fecha_iso: fechaIso,
        fecha_texto: fechaTxt || fechaDesdeIso(fechaIso),
        hora: String(r?.hora || '').trim(),
        cliente: String(r?.cliente || '').trim(),
        maquina: String(r?.maquina || '').trim(),
        transferencia: String(r?.transferencia || r?.transfer || '').trim(),
        monto: parseMonto(r?.monto),
        comprobante_url: compUrl,
        comprobante_nombre: compName,
        comprobante_tipo: compType
      };
    }

    async function cargarDraftResumenDesdeSupabase() {
      const d = await sbRequest(draftObjectApiPath());
      const draftRows = [];
      if (Array.isArray(d?.rows)) {
        d.rows.forEach((r) => {
          if (rowHasDraftData(r)) draftRows.push(mapDraftRowToResumen(r));
        });
      }
      if (d?.newRow && rowHasDraftData(d.newRow)) {
        draftRows.push(mapDraftRowToResumen(d.newRow));
      }
      resumenDraftRows = draftRows;
      return draftRows;
    }

    function renderResumen() {
      if (!els.resumenBody) return;
      if (!resumenRows.length) {
        els.resumenBody.innerHTML = '<div class="resumen-vacio">Sin comprobantes guardados para ese día.</div>';
        return;
      }

      const grupos = new Map();
      resumenRows.forEach((r, idx) => {
        const alias = proveedorNombreDesdeValor(r.transferencia) || 'Sin proveedor';
        if (!grupos.has(alias)) grupos.set(alias, []);
        grupos.get(alias).push({ ...r, __idx: idx });
      });

      const aliasesOrdenados = [...grupos.entries()]
        .sort((a, b) => (a[1][0]?.__idx ?? 0) - (b[1][0]?.__idx ?? 0))
        .map(([alias]) => alias);

      let totalDia = 0;
      const html = aliasesOrdenados.map((alias) => {
        const items = grupos.get(alias).slice().sort((a, b) => {
          const ka = horaToKey(a.hora);
          const kb = horaToKey(b.hora);
          if (ka !== kb) return ka - kb;
          return (a.__idx ?? 0) - (b.__idx ?? 0);
        });
        const totalAlias = items.reduce((acc, it) => acc + Number(it.monto || 0), 0);
        totalDia += totalAlias;

        return `
          <div class="resumen-card">
            <div class="resumen-head">
              <div class="resumen-alias">${alias}</div>
              <div class="resumen-total-alias">Total: ${fmtMonto(totalAlias)}</div>
            </div>
            ${items.map((it) => {
              const compCell = it.comprobante_url
                ? `<button class="resumen-comp-link" onclick="abrirComprobanteDesdeResumen(${it.__idx})">${it.maquina || 'Ver comprobante'}</button>`
                : `<button class="resumen-comp-link" disabled>${it.maquina || '-'}</button>`;
              return `
                <div class="resumen-row">
                  <div class="resumen-hora">${it.hora || '-'}</div>
                  <div class="resumen-cli">${it.cliente || '-'}</div>
                  <div class="resumen-comp">${compCell}</div>
                </div>`;
            }).join('')}
          </div>`;
      }).join('');

      els.resumenBody.innerHTML = html + `<div class="resumen-card"><div class="resumen-head"><div class="resumen-alias">Total del día</div><div class="resumen-total-alias">${fmtMonto(totalDia)}</div></div></div>`;
    }

    function updateResumenNav() {
      if (!resumenDias.length) {
        els.resumenFechaLabel.textContent = 'Sin datos';
        els.btnDiaPrev.disabled = true;
        els.btnDiaNext.disabled = true;
        return;
      }
      const idx = resumenDias.indexOf(resumenFechaIso);
      const cur = idx >= 0 ? resumenDias[idx] : resumenDias[resumenDias.length - 1];
      resumenFechaIso = cur;
      els.resumenFechaLabel.textContent = `${fechaDesdeIso(cur)}${resumenSource === 'draft' ? ' (borrador)' : ''}`;
      els.btnDiaPrev.disabled = idx <= 0;
      els.btnDiaNext.disabled = idx < 0 || idx >= resumenDias.length - 1;
    }

    async function cargarDiasResumen() {
      const data = await sbRequest(`/rest/v1/${COMPROBANTES_TABLE}?select=fecha_iso&order=fecha_iso.asc`);
      const uniq = new Set();
      (data || []).forEach((r) => {
        const iso = String(r.fecha_iso || '').trim();
        if (iso) uniq.add(iso);
      });
      const diasTabla = [...uniq];

      if (diasTabla.length) {
        resumenSource = 'table';
        resumenDraftRows = [];
        resumenDias = diasTabla;
      } else {
        const draftRows = await cargarDraftResumenDesdeSupabase();
        const diasDraft = [...new Set(draftRows.map((r) => String(r.fecha_iso || '').trim()).filter(Boolean))].sort();
        resumenSource = diasDraft.length ? 'draft' : 'table';
        resumenDias = diasDraft;
      }

      if (!resumenDias.includes(resumenFechaIso)) {
        resumenFechaIso = resumenDias.length ? resumenDias[resumenDias.length - 1] : isoHoy();
      }
      updateResumenNav();
    }

    async function cargarResumenDia(iso) {
      if (resumenSource === 'draft') {
        resumenRows = resumenDraftRows
          .filter((r) => String(r.fecha_iso || '') === String(iso || ''))
          .sort((a, b) => {
            const ka = horaToKey(a.hora);
            const kb = horaToKey(b.hora);
            if (ka !== kb) return ka - kb;
            return 0;
          });
      } else {
        const q = encodeURIComponent(iso);
        const data = await sbRequest(`/rest/v1/${COMPROBANTES_TABLE}?select=id,fecha_iso,fecha_texto,hora,cliente,maquina,transferencia,monto,comprobante_url,comprobante_nombre,comprobante_tipo&fecha_iso=eq.${q}&order=hora.asc.nullslast,id.asc`);
        resumenRows = Array.isArray(data) ? data : [];
      }
      renderResumen();
    }

    async function refrescarResumen() {
      try {
        await cargarDiasResumen();
        if (!resumenDias.length) {
          resumenRows = [];
          renderResumen();
          return;
        }
        await cargarResumenDia(resumenFechaIso);
      } catch (e) {
        console.error(e);
        els.resumenBody.innerHTML = `<div class="resumen-vacio">No se pudo cargar resumen: ${String(e.message || e)}</div>`;
      }
    }

    function moverDia(delta) {
      if (!resumenDias.length) return;
      const idx = resumenDias.indexOf(resumenFechaIso);
      if (idx < 0) return;
      const next = idx + delta;
      if (next < 0 || next >= resumenDias.length) return;
      resumenFechaIso = resumenDias[next];
      updateResumenNav();
      cargarResumenDia(resumenFechaIso).catch(console.error);
    }

    function render() {
      els.rows.innerHTML = rows.map((r, i) => `
        <div class="fila">
          <input class="inp num" value="${fmtMontoCampo(r.monto)}" onchange="upd(${i}, 'monto', this.value)">
          <input class="inp" value="${r.maquina}" onchange="upd(${i}, 'maquina', this.value)">
          <input class="inp alias-pick" value="${proveedorNombreDesdeValor(r.transfer)}" readonly onclick="pickRowAlias(${i})" placeholder="Elegir alias">
          <input class="inp" value="${r.fecha}" onchange="upd(${i}, 'fecha', this.value)">
          <input class="inp" value="${r.hora}" onchange="upd(${i}, 'hora', this.value)">
          <input class="inp" value="${r.cliente}" onchange="upd(${i}, 'cliente', this.value)">
          <button class="btn-del" onclick="delRow(${i})" title="Eliminar">x</button>
          <button class="btn-comp ${r.comprobante ? 'ok' : ''}" data-row="${i}" onclick="subirCompFila(${i})" title="${r.comprobante ? r.comprobante.name : 'Sin comprobante'}">${r.comprobante ? 'Comprobante ✓' : 'Subir'}</button>
        </div>
      `).join('');
      recalcTotal();
    }

    window.upd = (idx, key, val) => {
      rows[idx][key] = key === 'maquina'
        ? formatearMaquina(val)
        : key === 'monto'
          ? fmtMontoCampo(val)
          : val;
      recalcTotal();
      syncAfterUpdate();
      if (key === 'maquina') render();
    };

    window.delRow = (idx) => {
      safeRevoke(rows[idx]?.comprobante?.url);
      rows.splice(idx, 1);
      render();
      syncAfterUpdate();
    };

    window.pickRowAlias = (idx) => {
      abrirPicker((alias) => {
        rows[idx].transfer = proveedorNombreDesdeValor(alias);
        render();
        syncAfterUpdate();
        if (isMobileView()) {
          els.nCliente.focus();
        }
      });
    };

    window.abrirComprobanteDesdeResumen = (idx) => {
      const r = resumenRows[idx];
      if (!r?.comprobante_url) return;
      window.open(r.comprobante_url, '_blank');
    };

    function actualizarBotonNuevoComp() {
      if (!els.btnNuevoComp) return;
      if (nuevoComprobante) {
        els.btnNuevoComp.textContent = 'Comprobante ✓';
        els.btnNuevoComp.classList.add('ok');
        els.btnNuevoComp.title = nuevoComprobante.name || 'Comprobante';
      } else {
        els.btnNuevoComp.textContent = 'Subir';
        els.btnNuevoComp.classList.remove('ok');
        els.btnNuevoComp.title = 'Sin comprobante';
      }
    }

    function abrirSelectorComprobante(target) {
      fileTarget = target;
      els.compFileInput.value = '';
      els.compFileInput.click();
    }

    window.subirCompFila = (idx) => abrirSelectorComprobante({ type: 'row', idx });

    function aplicarComprobanteATarget(file, target) {
      if (!file || !target) return;
      const comp = {
        name: file.name,
        url: URL.createObjectURL(file),
        type: file.type || '',
        file
      };
      if (target.type === 'new') {
        safeRevoke(nuevoComprobante?.url);
        nuevoComprobante = comp;
        actualizarBotonNuevoComp();
        syncAfterUpdate();
        return;
      }
      if (target.type === 'row') {
        const idx = Number(target.idx);
        if (Number.isInteger(idx) && rows[idx]) {
          safeRevoke(rows[idx].comprobante?.url);
          rows[idx].comprobante = comp;
          render();
          syncAfterUpdate();
        }
      }
    }

    function targetDesdeElemento(el) {
      const compBtn = el?.closest?.('.btn-comp');
      if (compBtn?.dataset?.row !== undefined) {
        return { type: 'row', idx: Number(compBtn.dataset.row) };
      }
      if (compBtn?.dataset?.new === '1') {
        return { type: 'new' };
      }
      const fila = el?.closest?.('.fila');
      if (fila) {
        const idx = [...document.querySelectorAll('#rows .fila')].indexOf(fila);
        if (idx >= 0) return { type: 'row', idx };
      }
      return { type: 'new' };
    }

    function primerArchivoDataTransfer(dt) {
      if (!dt?.files || !dt.files.length) return null;
      return dt.files[0];
    }

    function primerArchivoClipboard(data) {
      const items = data?.items || [];
      for (const item of items) {
        if (item.kind === 'file') {
          const file = item.getAsFile();
          if (file) return file;
        }
      }
      return null;
    }

    function addRow() {
      const r = buildRowFromInputs();
      if (!rowHasMeaningfulData(r)) return;

      rows.push(r);
      limpiarInputsNuevaFila();
      render();
      syncAfterUpdate();
      els.nMonto.focus();
    }

    function buildRowFromInputs() {
      const r = {
        monto: fmtMontoCampo(els.nMonto.value.trim()),
        maquina: formatearMaquina(els.nMaquina.value.trim()),
        transfer: els.nTransfer.value.trim(),
        fecha: els.nFecha.value.trim() || fechaHoy(),
        hora: els.nHora.value.trim() || horaAhora(),
        cliente: els.nCliente.value.trim(),
        comprobante: nuevoComprobante ? { ...nuevoComprobante } : null
      };
      return r;
    }

    function rowHasMeaningfulData(r) {
      return !!(
        String(r?.monto || '').trim() ||
        String(r?.maquina || '').trim() ||
        String(r?.transfer || '').trim() ||
        String(r?.cliente || '').trim() ||
        r?.comprobante
      );
    }

    function limpiarInputsNuevaFila() {
      els.nMonto.value = '';
      els.nMaquina.value = '';
      els.nTransfer.value = '';
      els.nFecha.value = fechaHoy();
      els.nHora.value = horaAhora();
      els.nCliente.value = '';
      nuevoComprobante = null;
      actualizarBotonNuevoComp();
    }

    function appendPendingNewRowIfAny() {
      const r = buildRowFromInputs();
      if (!rowHasMeaningfulData(r)) return false;
      rows.push(r);
      limpiarInputsNuevaFila();
      render();
      syncAfterUpdate();
      return true;
    }

    function limpiarBorrador() {
      rows.forEach((r) => safeRevoke(r?.comprobante?.url));
      rows.length = 0;
      safeRevoke(nuevoComprobante?.url);
      nuevoComprobante = null;
      actualizarBotonNuevoComp();
      render();
      syncAfterUpdate();
      els.nMonto.focus();
    }

    function getConfirmText(action, step) {
      if (action === 'limpiar') {
        if (step === 1) return { h: 'Confirmación 1/3', b: '¿Seguro que querés limpiar todos los comprobantes cargados?', ok: 'Continuar' };
        if (step === 2) return { h: 'Confirmación 2/3', b: 'Se va a borrar toda la grilla sin guardar. ¿Seguimos?', ok: 'Continuar' };
        if (step === 3) return { h: 'Confirmación 3/3', b: 'Último paso: ¿borrar TODO ahora?', ok: 'Sí, borrar' };
      }
      if (action === 'guardarNuevo') {
        if (step === 1) return { h: 'Confirmación 1/3', b: '¿Querés guardar todo en Supabase y arrancar una grilla nueva?', ok: 'Continuar' };
        if (step === 2) return { h: 'Confirmación 2/3', b: 'Se subirán los datos y comprobantes. ¿Seguimos?', ok: 'Continuar' };
        if (step === 3) return { h: 'Confirmación 3/3', b: 'Último paso: confirmar guardado y limpiar grilla.', ok: 'Sí, guardar' };
      }
      return null;
    }

    function abrirConfirm(action) {
      confirmAction = action;
      confirmStep = 0;
      avanzarConfirm().catch(console.error);
    }

    function cerrarConfirm() {
      els.confirmBg.classList.remove('open');
      confirmStep = 0;
      confirmAction = null;
    }

    async function subirComprobanteASupabase(comp, idx) {
      if (!comp?.file) {
        if (comp?.url && !String(comp.url).startsWith('blob:')) return comp.url;
        return null;
      }

      const cleanName = String(comp.name || `comp_${idx + 1}`).replace(/[^a-zA-Z0-9._-]/g, '_');
      const objectPath = `comprobantes/${Date.now()}_${idx + 1}_${cleanName}`;
      const encodedPath = objectPath.split('/').map(encodeURIComponent).join('/');

      await sbRequest(`/storage/v1/object/${SUPABASE_BUCKET}/${encodedPath}`, {
        method: 'POST',
        rawBody: comp.file,
        headers: {
          ...sbHeaders(false),
          'x-upsert': 'true',
          'Content-Type': comp.type || 'application/octet-stream'
        }
      });

      return `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${encodedPath}`;
    }

    async function guardarRowsSupabase() {
      if (!rows.length) throw new Error('No hay comprobantes para guardar.');

      const payload = [];
      const erroresAdjuntos = [];
      for (let i = 0; i < rows.length; i += 1) {
        const r = rows[i];
        let compUrl = null;
        try {
          compUrl = await subirComprobanteASupabase(r.comprobante, i);
        } catch (e) {
          console.error('[COMPROBANTES] Fallo subida adjunto fila', i + 1, e);
          erroresAdjuntos.push({
            fila: i + 1,
            maquina: r.maquina || '',
            motivo: String(e?.message || e || 'Error de subida')
          });
          compUrl = null;
        }
        const fechaIso = isoDesdeFecha(r.fecha);
        payload.push({
          fecha_iso: fechaIso,
          fecha_texto: r.fecha || fechaDesdeIso(fechaIso),
          hora: r.hora || '',
          cliente: r.cliente || '',
          maquina: r.maquina || '',
          transferencia: r.transfer || '',
          monto: parseMonto(r.monto),
          comprobante_nombre: r.comprobante?.name || null,
          comprobante_url: compUrl || null,
          comprobante_tipo: r.comprobante?.type || null
        });
      }

      await sbRequest(`/rest/v1/${COMPROBANTES_TABLE}`, {
        method: 'POST',
        body: payload,
        headers: { Prefer: 'return=minimal' }
      });

      return { total: payload.length, erroresAdjuntos };
    }

    async function confirmarGuardarYNuevo() {
      setGuardandoState(true);
      try {
        appendPendingNewRowIfAny();
        const result = await guardarRowsSupabase();
        limpiarBorrador();
        await refrescarResumen();
        if (result.erroresAdjuntos.length) {
          const detalle = result.erroresAdjuntos
            .slice(0, 3)
            .map((e) => `Fila ${e.fila}${e.maquina ? ` (${e.maquina})` : ''}`)
            .join(', ');
          alert(`Guardado OK (${result.total} filas). ${result.erroresAdjuntos.length} comprobante(s) no se pudieron subir: ${detalle}.`);
        } else {
          alert(`Comprobantes guardados en Supabase (${result.total} filas).`);
        }
      } finally {
        setGuardandoState(false);
      }
    }

    async function avanzarConfirm() {
      if (!confirmAction || guardando) return;
      confirmStep += 1;
      const text = getConfirmText(confirmAction, confirmStep);
      if (text) {
        els.confirmHead.textContent = text.h;
        els.confirmBody.textContent = text.b;
        els.confirmOk.textContent = text.ok;
        els.confirmBg.classList.add('open');
        return;
      }

      try {
        if (confirmAction === 'limpiar') {
          limpiarBorrador();
        } else if (confirmAction === 'guardarNuevo') {
          await confirmarGuardarYNuevo();
        }
      } catch (e) {
        alert(`Error: ${String(e.message || e)}`);
      } finally {
        cerrarConfirm();
      }
    }

    els.tabAlias.addEventListener('click', () => activarTab('alias'));
    els.tabComp.addEventListener('click', () => activarTab('comp'));
    els.tabResumen.addEventListener('click', () => activarTab('resumen'));

    document.getElementById('btnAliasAdd').addEventListener('click', addAlias);
    [els.aliasNombreInput, els.aliasAliasInput, els.aliasCuitInput].forEach((inp) => inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addAlias();
      }
    }));

    document.getElementById('btnAdd').addEventListener('click', addRow);
    els.btnGuardarNuevo.addEventListener('click', () => {
      if (!rows.length) return;
      abrirConfirm('guardarNuevo');
    });
    els.btnLimpiar.addEventListener('click', () => {
      if (!rows.length) return;
      abrirConfirm('limpiar');
    });
    els.btnNuevoComp.addEventListener('click', () => abrirSelectorComprobante({ type: 'new' }));
    els.btnDiaPrev.addEventListener('click', () => moverDia(-1));
    els.btnDiaNext.addEventListener('click', () => moverDia(1));

    const addInputs = [els.nMonto, els.nMaquina, els.nTransfer, els.nFecha, els.nHora, els.nCliente];
    const COLS = addInputs.length;

    function getRowsInputs() {
      return [...document.querySelectorAll('#rows .fila')].map((f) => [...f.querySelectorAll('input.inp')]);
    }

    function focusAdd(col) {
      const idx = Math.max(0, Math.min(COLS - 1, col));
      addInputs[idx]?.focus();
    }

    function focusRow(rowIdx, col) {
      const rowsInputs = getRowsInputs();
      const r = rowsInputs[rowIdx];
      const idx = Math.max(0, Math.min(COLS - 1, col));
      if (r && r[idx]) {
        r[idx].focus();
        return true;
      }
      return false;
    }

    function isMobileView() {
      return window.matchMedia('(max-width: 760px)').matches;
    }

    function getMobileAddOrder() {
      return [els.nCliente, els.nMaquina, els.nMonto, els.nTransfer];
    }

    function getMobileRowOrder(rowInputs) {
      if (!rowInputs || !rowInputs.length) return [];
      return [rowInputs[5], rowInputs[1], rowInputs[0], rowInputs[2]].filter(Boolean);
    }

    function focusNextOnEnterMobile(isAdd, rowIdx, target) {
      if (isAdd) {
        const order = getMobileAddOrder();
        const idx = order.indexOf(target);
        if (idx < 0) return false;

        if (target === els.nMaquina || target === els.nTransfer) {
          abrirPickerNuevoConFoco();
          return true;
        }

        const next = order[idx + 1];
        if (next) {
          next.focus();
          return true;
        }
        addRow();
        return true;
      }

      const rowsInputs = getRowsInputs();
      const row = rowsInputs[rowIdx];
      const order = getMobileRowOrder(row);
      const idx = order.indexOf(target);
      if (idx < 0) return false;

      if (row && target === row[2]) {
        window.pickRowAlias(rowIdx);
        return true;
      }

      const next = order[idx + 1];
      if (next) {
        next.focus();
        return true;
      }

      const nextRowFirst = getMobileRowOrder(rowsInputs[rowIdx + 1])[0];
      if (nextRowFirst) {
        nextRowFirst.focus();
        return true;
      }

      const addFirst = getMobileAddOrder()[0];
      if (addFirst) {
        addFirst.focus();
        return true;
      }
      return true;
    }

    function abrirPickerNuevoConFoco() {
      abrirPicker((alias) => {
        els.nTransfer.value = proveedorNombreDesdeValor(alias);
        syncAfterUpdate();
        if (isMobileView()) {
          const r = buildRowFromInputs();
          const hasCoreData = !!(
            String(r?.cliente || '').trim() ||
            String(r?.maquina || '').trim() ||
            String(r?.monto || '').trim()
          );
          if (hasCoreData) {
            addRow();
            return;
          }
        }
        els.nCliente.focus();
      });
    }

    document.addEventListener('keydown', (e) => {
      const target = e.target;
      if (!(target instanceof HTMLInputElement)) return;
      if (!target.classList.contains('inp')) return;
      if (!els.panelComp.classList.contains('active')) return;

      const filaAgregar = target.closest('.fila-agregar');
      const fila = target.closest('.fila');
      const isAdd = !!filaAgregar;
      const rowsInputs = getRowsInputs();

      let colIdx = -1;
      let rowIdx = -1;
      if (isAdd) {
        colIdx = addInputs.indexOf(target);
      } else if (fila) {
        rowIdx = [...document.querySelectorAll('#rows .fila')].indexOf(fila);
        colIdx = rowsInputs[rowIdx] ? rowsInputs[rowIdx].indexOf(target) : -1;
      }
      if (colIdx < 0) return;

      const atStart = target.selectionStart === 0;
      const atEnd = target.selectionStart === target.value.length;

      if (e.key === 'Enter') {
        e.preventDefault();
        saveDraftNow().catch((err) => console.error('[COMPROBANTES] Sync en Enter falló', err));
        if (isMobileView() && focusNextOnEnterMobile(isAdd, rowIdx, target)) return;
        if (isAdd) {
          if (target === els.nMaquina) {
            abrirPickerNuevoConFoco();
            return;
          }
          if (target === els.nTransfer) {
            abrirPickerNuevoConFoco();
            return;
          }
          if (colIdx < COLS - 1) focusAdd(colIdx + 1);
          else addRow();
        } else {
          if (colIdx < COLS - 1) {
            focusRow(rowIdx, colIdx + 1);
          } else {
            if (!focusRow(rowIdx + 1, 0)) focusAdd(0);
          }
        }
        return;
      }

      if (e.key === 'ArrowRight' && atEnd) {
        e.preventDefault();
        if (isAdd) {
          if (colIdx < COLS - 1) focusAdd(colIdx + 1);
        } else {
          if (colIdx < COLS - 1) focusRow(rowIdx, colIdx + 1);
          else if (!focusRow(rowIdx + 1, 0)) focusAdd(0);
        }
        return;
      }

      if (e.key === 'ArrowLeft' && atStart) {
        e.preventDefault();
        if (isAdd) {
          if (colIdx > 0) focusAdd(colIdx - 1);
        } else {
          if (colIdx > 0) focusRow(rowIdx, colIdx - 1);
          else if (rowIdx > 0) focusRow(rowIdx - 1, COLS - 1);
          else focusAdd(COLS - 1);
        }
        return;
      }

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isAdd) {
          focusRow(0, colIdx);
        } else if (!focusRow(rowIdx + 1, colIdx)) {
          focusAdd(colIdx);
        }
        return;
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isAdd) return;
        if (rowIdx > 0) focusRow(rowIdx - 1, colIdx);
        else focusAdd(colIdx);
      }
    });

    els.nMonto.addEventListener('blur', () => {
      els.nMonto.value = fmtMontoCampo(els.nMonto.value);
      syncAfterUpdate();
    });

    els.nMaquina.addEventListener('blur', () => {
      els.nMaquina.value = formatearMaquina(els.nMaquina.value);
      syncAfterUpdate();
    });
    els.nTransfer.addEventListener('click', abrirPickerNuevoConFoco);

    [els.nMonto, els.nMaquina, els.nTransfer, els.nFecha, els.nHora, els.nCliente].forEach((inp) => {
      inp.addEventListener('change', syncAfterUpdate);
      inp.addEventListener('blur', syncAfterUpdate);
    });

    els.pickerList.addEventListener('click', (e) => {
      const btn = e.target.closest('.picker-item');
      if (!btn) return;
      const alias = btn.getAttribute('data-alias') || '';
      if (onPickAlias) onPickAlias(alias);
      cerrarPicker();
    });

    document.getElementById('pickerClose').addEventListener('click', cerrarPicker);
    els.pickerBg.addEventListener('click', (e) => {
      if (e.target === els.pickerBg) cerrarPicker();
    });

    els.confirmOk.addEventListener('click', () => {
      avanzarConfirm().catch(console.error);
    });
    els.confirmCancel.addEventListener('click', cerrarConfirm);
    els.confirmBg.addEventListener('click', (e) => {
      if (e.target === els.confirmBg) cerrarConfirm();
    });

    els.compFileInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file || !fileTarget) return;
      aplicarComprobanteATarget(file, fileTarget);
      fileTarget = null;
    });

    els.panelComp.addEventListener('dragover', (e) => {
      const file = primerArchivoDataTransfer(e.dataTransfer);
      if (!file) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    els.panelComp.addEventListener('drop', (e) => {
      const file = primerArchivoDataTransfer(e.dataTransfer);
      if (!file) return;
      e.preventDefault();
      const target = targetDesdeElemento(e.target);
      aplicarComprobanteATarget(file, target);
    });

    document.addEventListener('paste', (e) => {
      if (!els.panelComp.classList.contains('active')) return;
      const file = primerArchivoClipboard(e.clipboardData);
      if (!file) return;
      e.preventDefault();
      const target = targetDesdeElemento(document.activeElement);
      aplicarComprobanteATarget(file, target);
    });

    async function init() {
      cargarAliases();
      await loadDraft();
      autocompletarFechaHora();
      setInterval(autocompletarFechaHora, 30000);
      actualizarBotonNuevoComp();
      render();
      let lastTab = 'comp';
      try {
        const saved = localStorage.getItem(LAST_TAB_KEY);
        if (saved === 'alias' || saved === 'comp' || saved === 'resumen') lastTab = saved;
      } catch (_) {}
      activarTab(lastTab);
      if (lastTab !== 'resumen') await refrescarResumen();
    }

    init().catch((e) => {
      console.error(e);
      alert(`Error inicializando: ${String(e.message || e)}`);
    });
  </script>
</body>
</html>
