<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Comprobantes - Corralon Progreso</title>
  <link rel="icon" type="image/x-icon" href="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/icono-corralon-Photoroom.ico">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f4efe9;
      --panel: #ffffff;
      --panel-soft: #f7f5ff;
      --line: #d6ccef;
      --line-strong: #b8abd9;
      --purple: #6c4fc7;
      --purple-dark: #4d35a0;
      --red: #de3328;
      --text: #1f2233;
      --muted: #767b8d;
      --ok: #1f8f53;
      --shadow: 0 8px 22px rgba(58, 35, 120, .1);
      --radius: 12px;
      --radius-sm: 9px;
      --content: 780px;
    }

    html, body { min-height: 100%; margin: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #faf8f4 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 4px 18px rgba(0,0,0,.04);
    }

    .topbar-inner {
      max-width: var(--content);
      margin: 0 auto;
      padding: 14px 14px 10px;
    }

    .title {
      margin: 0;
      color: var(--red);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      height: 34px;
      width: auto;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }

    .tab.active {
      color: var(--purple);
      border-color: var(--purple);
      box-shadow: inset 0 0 0 1px var(--purple);
    }

    .content {
      width: 100%;
      max-width: var(--content);
      margin: 0 auto;
      padding: 14px 14px 118px;
      flex: 1;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .section-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #faf8ff 0%, #f4efff 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
      color: var(--purple-dark);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .alias-form {
      display: grid;
      grid-template-columns: 1.2fr 1fr .9fr auto;
      gap: 9px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .alias-list {
      display: grid;
    }

    .alias-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
    }

    .alias-row:nth-child(even),
    .record-card:nth-child(even),
    .summary-row:nth-child(even) {
      background: var(--panel-soft);
    }

    .alias-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }

    .alias-meta {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .field-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .input,
    .pick-btn,
    .file-btn,
    .action-btn,
    .danger-btn,
    .ghost-btn,
    .nav-btn {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      min-height: 36px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: .18s ease;
    }

    .input:focus,
    .pick-btn:focus,
    .file-btn:focus,
    .action-btn:focus,
    .danger-btn:focus,
    .ghost-btn:focus,
    .nav-btn:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(108,79,199,.14);
    }

    .input[readonly] {
      background: #fcfbff;
    }

    .money {
      text-align: right;
      font-weight: 800;
      color: var(--purple-dark);
    }

    .pick-btn,
    .file-btn,
    .action-btn,
    .danger-btn,
    .ghost-btn,
    .nav-btn {
      cursor: pointer;
      font-weight: 800;
    }

    .pick-btn {
      text-align: left;
    }

    .action-btn {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .action-btn.ok,
    .file-btn.ok {
      background: #ebfff3;
      border-color: #8fdbac;
      color: var(--ok);
    }

    .danger-btn {
      background: #fff1f1;
      border-color: #f1c5c5;
      color: var(--red);
    }

    .ghost-btn,
    .nav-btn {
      color: var(--purple);
      background: #fff;
    }

    .records {
      display: grid;
      gap: 9px;
      margin-top: 10px;
    }

    #saved-records {
      display: none;
    }

    .record-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .record-body {
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: 1.4fr 1fr .9fr;
      gap: 8px;
    }

    .grid-middle {
      display: grid;
      grid-template-columns: 1.2fr auto auto;
      gap: 8px;
      align-items: end;
    }

    .meta-box {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      min-height: 36px;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }

    .meta-box span {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .meta-box strong {
      font-size: 12px;
      color: var(--text);
    }

    .grid-bottom {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .save-loading {
      display: none;
      margin-top: 8px;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      color: var(--purple-dark);
    }

    .save-loading.active {
      display: inline-flex;
    }

    .save-loading .spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(108,79,199,.25);
      border-top-color: var(--purple);
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .record-link {
      color: var(--purple);
      font-size: 11px;
      font-weight: 800;
      text-decoration: underline;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      width: auto;
      min-height: auto;
    }

    .record-link:disabled {
      cursor: default;
      text-decoration: none;
      color: var(--muted);
    }

    .summary-nav {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .summary-view-tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .summary-view-chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 12px;
      min-height: 34px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: .18s ease;
    }

    .summary-view-chip.active {
      color: var(--purple);
      border-color: var(--purple);
      box-shadow: inset 0 0 0 1px var(--purple);
      background: #faf8ff;
    }

    .summary-date {
      text-align: center;
      font-size: 17px;
      font-weight: 900;
      color: var(--purple-dark);
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .summary-head {
      padding: 10px 12px;
      background: #efe9ff;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .summary-alias {
      font-size: 15px;
      font-weight: 900;
      color: var(--purple);
    }

    .summary-total {
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
    }

    .summary-row {
      padding: 9px 12px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 72px 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .summary-time {
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
    }

    .summary-main {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .summary-client {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }

    .summary-machine {
      font-size: 11px;
      color: var(--purple);
      background: transparent;
      border: none;
      padding: 0;
      text-align: left;
      text-decoration: underline;
      cursor: pointer;
    }

    .summary-machine:disabled {
      text-decoration: none;
      cursor: default;
      color: var(--muted);
    }

    .summary-amount {
      font-size: 15px;
      font-weight: 900;
      color: var(--purple-dark);
      text-align: right;
    }

    .summary-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      align-items: center;
    }

    .summary-icon-btn {
      width: 30px;
      min-width: 30px;
      min-height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
    }

    .summary-day-total {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #efe9ff;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 15px;
      font-weight: 900;
    }

    .summary-subsection {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .summary-subhead {
      padding: 10px 12px;
      background: #f5f0ff;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .summary-subtitle {
      font-size: 13px;
      font-weight: 900;
      color: var(--purple-dark);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .summary-submeta {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    /* Layout for alias and arrow icon */
    .summary-alias-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Style for the arrow that indicates collapsible state */
    .summary-toggle-icon {
      font-size: 12px;
      color: var(--muted);
      transition: transform .2s ease;
    }

    /* When a summary section is collapsed, rotate the arrow 180 degrees */
    .summary-card.collapsed .summary-toggle-icon {
      transform: rotate(180deg);
    }

    /* Hide detail rows and remove bottom border when a summary-card is collapsed */
    .summary-card.collapsed .summary-row {
      display: none !important;
    }
    .summary-card.collapsed .summary-head {
      border-bottom: none !important;
    }

    /* Prevent the currency value from wrapping to the next line so that the $ sign stays next to the number */
    .total-value,
    .summary-day-total strong {
      white-space: nowrap;
    }

    .empty {
      padding: 22px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .footer-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
      box-shadow: 0 -8px 24px rgba(0,0,0,.08);
    }

    .footer-inner {
      max-width: var(--content);
      margin: 0 auto;
      padding: 9px 14px 10px;
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 10px;
      align-items: center;
    }

    .total-box {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .total-label {
      font-size: 10px;
      font-weight: 900;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .total-value {
      font-size: 22px;
      font-weight: 900;
      color: var(--purple-dark);
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(21, 17, 40, .45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-bg.open { display: flex; }

    .modal {
      width: min(100%, 420px);
      max-height: 82vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.22);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      color: var(--purple-dark);
      font-size: 15px;
      font-weight: 900;
    }

    .modal-body {
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .picker-item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      padding: 9px 10px;
      cursor: pointer;
    }

    .picker-item strong {
      display: block;
      font-size: 13px;
      color: var(--text);
    }

    .picker-item span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .confirm-copy {
      padding: 14px;
      display: grid;
      gap: 8px;
      color: var(--text);
      line-height: 1.45;
    }

    .confirm-actions {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .viewer-modal {
      width: auto;
      max-width: calc(100vw - 16px);
      max-height: min(88vh, 920px);
    }

    .viewer-modal.pdf-mode {
      width: min(100%, 980px);
    }

    .viewer-modal .modal-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      /* Ensure the header (and the close button) stays above the viewer content */
      position: relative;
      z-index: 2;
    }

    .viewer-modal .modal-head > div {
      min-width: 0;
    }

    .viewer-modal .modal-title,
    .viewer-modal .viewer-hint {
      overflow-wrap: anywhere;
    }

    .viewer-modal.image-mode {
      width: min(100%, 560px);
      max-width: calc(100vw - 16px);
    }

    .viewer-body {
      min-height: 0;
      padding: 14px;
      display: grid;
      gap: 10px;
      background: #fcfbff;
    }

    .viewer-hint {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .viewer-loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      color: var(--purple-dark);
    }

    .viewer-loading[hidden] {
      display: none;
    }

    .viewer-spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(108,79,199,.25);
      border-top-color: var(--purple);
      animation: spin 0.75s linear infinite;
    }

    .viewer-stage {
      min-height: min(68vh, 760px);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .viewer-stage iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .viewer-stage img {
      display: block;
      object-fit: contain;
    }

    .viewer-modal.image-mode .viewer-body {
      justify-items: center;
      align-items: start;
    }

    .viewer-modal.image-mode .viewer-stage {
      width: 100%;
      min-height: 0;
      max-width: 520px;
      max-height: calc(100vh - 190px);
      justify-self: center;
      align-self: start;
    }

    .viewer-modal.image-mode .viewer-stage img {
      width: auto !important;
      height: auto !important;
      max-width: 100%;
      max-height: calc(100vh - 200px);
      margin: auto;
      object-position: center;
      cursor: zoom-in;
    }

    .viewer-full-bg {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(15, 12, 26, .95);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .viewer-full-bg.open {
      display: flex;
    }

    .viewer-full-tools {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .viewer-full-tool {
      width: 38px;
      min-width: 38px;
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(215, 206, 242, .85);
      background: rgba(255,255,255,.9);
      color: #4d35a0;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      line-height: 1;
    }

    .viewer-full-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      min-width: 42px;
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid #f1c5c5;
      background: rgba(255, 241, 241, .92);
      color: #b33535;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      z-index: 3;
    }

    .viewer-full-img {
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 32px);
      width: auto;
      height: auto;
      display: block;
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(0,0,0,.38);
      background: #fff;
      transform-origin: center center;
      transition: transform .08s ease-out;
      touch-action: none;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 900px) {
      .alias-form,
      .grid-top,
      .grid-middle,
      .grid-bottom {
        grid-template-columns: 1fr;
      }

      .summary-row {
        grid-template-columns: 1fr auto auto;
        align-items: center;
        row-gap: 4px;
      }

      .summary-main {
        grid-column: 1;
      }

      .summary-amount {
        grid-column: 2;
        text-align: right;
        white-space: nowrap;
      }

      .summary-actions {
        grid-column: 3;
        justify-content: flex-end;
        flex-wrap: nowrap;
      }

      .summary-time {
        grid-column: 1 / -1;
        order: 10;
        font-size: 10px;
      }
    }

    @media (max-width: 640px) {
      .topbar-inner,
      .content,
      .footer-inner {
        padding-left: 12px;
        padding-right: 12px;
      }

      .title {
        font-size: 22px;
      }

      .brand-logo {
        height: 30px;
      }

      .tabs {
        gap: 8px;
      }

      .tab {
        padding: 10px 12px;
        font-size: 13px;
      }

      .record-body,
      .alias-form,
      .section-head,

      };

      const state = {

        unsubRecords: null,

        attachmentPreloading: new Set(),

      function createDraft() {
        return {
          client: "",
          machine: "",
          amountInput: "",
          amountNumber: 0,
          transfer: null,
          dateIso: todayIso(),
          dateText: formatDate(todayIso()),
          timeText: currentTime(),
          attachment: null
        };
      }

      function saveDraftToStorage() {
        try {
          if (!state.editingId && !hasDraftData()) {
            localStorage.removeItem(DRAFT_STORAGE_KEY);
            return;
          }
          const payload = {
            editingId: state.editingId ? String(state.editingId) : "",
            draft: {
              client: String(state.draft.client || ""),
              machine: String(state.draft.machine || ""),
              amountInput: String(state.draft.amountInput || ""),
              amountNumber: Number(state.draft.amountNumber || 0),
              transfer: state.draft.transfer ? {
                id: String(state.draft.transfer.id || ""),
                nombre: String(state.draft.transfer.nombre || ""),
                alias: String(state.draft.transfer.alias || ""),
                cuit: String(state.draft.transfer.cuit || "")
              } : null,
              dateIso: String(state.draft.dateIso || todayIso()),
              dateText: String(state.draft.dateText || formatDate(todayIso())),
              timeText: String(state.draft.timeText || currentTime()),
              attachment: (state.draft.attachment && isUsableRemoteUrl(state.draft.attachment.url)) ? {
                url: String(state.draft.attachment.url || ""),
                name: String(state.draft.attachment.name || "Comprobante"),
                type: String(state.draft.attachment.type || "")
              } : null
            }
          };
          localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(payload));
        } catch (error) {
          console.warn("No se pudo guardar borrador local", error);
        }
      }

      function clearDraftStorage() {
        try {
          localStorage.removeItem(DRAFT_STORAGE_KEY);
        } catch (error) {
          console.warn("No se pudo limpiar borrador local", error);
        }
      }

      function restoreDraftFromStorage() {
        try {
          const raw = localStorage.getItem(DRAFT_STORAGE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return;
          const draft = parsed.draft && typeof parsed.draft === "object" ? parsed.draft : null;
          if (!draft) return;
          state.editingId = parsed.editingId ? String(parsed.editingId) : null;
          state.draft = createDraft();
          state.draft.client = String(draft.client || "").trim();
          state.draft.machine = formatMachine(draft.machine || "");
          state.draft.amountInput = formatAmountInput(draft.amountInput || "");
          state.draft.amountNumber = Number(draft.amountNumber || parseAmount(draft.amountInput || "")) || 0;
          state.draft.transfer = (draft.transfer && draft.transfer.nombre)
            ? {
                id: String(draft.transfer.id || ""),
                nombre: String(draft.transfer.nombre || ""),
                alias: String(draft.transfer.alias || ""),
                cuit: String(draft.transfer.cuit || "")
              }
            : null;
          const restoredIso = parseDateToIso(draft.dateIso || "");
          state.draft.dateIso = restoredIso || todayIso();
          state.draft.dateText = formatDate(state.draft.dateIso);
          state.draft.timeText = String(draft.timeText || currentTime());
          state.draft.attachment = (draft.attachment && isUsableRemoteUrl(draft.attachment.url))
            ? {
                file: null,
                url: String(draft.attachment.url || ""),
                name: String(draft.attachment.name || "Comprobante"),
                type: String(draft.attachment.type || "")
              }
            : null;

          console.warn("No se pudo restaurar borrador local", error);

      function todayIso() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function currentTime() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
      }

      function formatDate(iso) {
        const m = String(iso || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
        return m ? `${m[3]}/${m[2]}/${m[1]}` : "";
      }

      function parseDateToIso(value) {
        const raw = String(value || "").trim();
        let match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (match) return `${match[1]}-${match[2]}-${match[3]}`;
        match = raw.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})$/);
        if (match) {
          return `${match[3]}-${String(Number(match[2]) || 0).padStart(2, "0")}-${String(Number(match[1]) || 0).padStart(2, "0")}`;
        }
        return "";
      }

      function parseAmount(value) {
        const cleaned = String(value || "").replace(/\./g, "").replace(",", ".").replace(/[^0-9.-]/g, "");
        const parsed = Number(cleaned);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function formatAmount(number, forceDecimals) {
        return "$ " + Number(number || 0).toLocaleString("es-AR", {
          minimumFractionDigits: forceDecimals ? 2 : 0,
          maximumFractionDigits: 2
        });
      }

      function formatAmountInput(value) {
        const parsed = parseAmount(value);
        return parsed ? formatAmount(parsed, true) : "";
      }

      function formatMachine(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const groups = raw.match(/\d+/g) || [];
        if (groups.length >= 2) {
          return `${String(Number(groups[0]) || 0).padStart(4, "0")}-${String(Number(groups[1]) || 0).padStart(8, "0")}`;
        }
        if (groups.length === 1 && groups[0].length > 4) {
          return `${String(Number(groups[0].slice(0, 4)) || 0).padStart(4, "0")}-${String(Number(groups[0].slice(4)) || 0).padStart(8, "0")}`;
        }
        return raw;
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function normalize(value) {
        return String(value || "").trim().toLowerCase();
      }

      function resolveAliasName(value) {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const match = state.aliases.find((item) => normalize(item.nombre) === normalize(raw) || normalize(item.alias) === normalize(raw));
        return match ? match.nombre : raw;
      }

      function throttleError(prefix, error) {
        console.error(prefix, error);
        const now = Date.now();
        if (now - state.lastErrorAt > 2500) {
          state.lastErrorAt = now;
          alert(`${prefix}: ${String(error && error.message ? error.message : error)}`);

      }

      function hasDraftData() {
        const draft = state.draft;
        return !!(draft.client.trim() || draft.machine.trim() || draft.amountNumber || draft.transfer || draft.attachment);
      }

      function syncDraftFromInputs() {
        state.draft.client = String(el.draftClient.value || "").trim();
        state.draft.machine = formatMachine(el.draftMachine.value || "");

      function syncDraftToInputs() {
