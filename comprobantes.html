        el.draftUpload.textContent = state.isUploadingDraftAttachment
          ? "Subiendo comprobante..."
          : (state.draft.attachment ? "Cambiar comprobante" : "Subir comprobante");
        el.draftUpload.classList.toggle("ok", !!state.draft.attachment);
        el.draftUpload.disabled = state.isUploadingDraftAttachment || state.isSavingDraft;
        el.draftOpenFile.disabled = state.isUploadingDraftAttachment || !(state.draft.attachment && state.draft.attachment.url);
        el.draftTitle.textContent = state.editingId ? "Editar movimiento" : "Cargar movimiento";
        el.draftAdd.textContent = state.isSavingDraft
          ? "Guardando..."
          : (state.editingId ? "Guardar cambios" : "+ Guardar movimiento");
        el.saveNew.textContent = state.editingId ? "Guardar y cerrar" : "Guardar y nuevo";
        saveDraftToStorage();
      }

      function setDraftSaving(isSaving) {
        state.isSavingDraft = !!isSaving;
        el.draftAdd.disabled = !!isSaving;
        el.saveNew.disabled = !!isSaving;
        el.draftClear.disabled = !!isSaving;
        el.draftUpload.disabled = !!isSaving;
        el.draftTransfer.disabled = !!isSaving;
        el.draftSavingIndicator.classList.toggle("active", !!isSaving);
        syncDraftToInputs();
      }

      function resetDraft() {
        state.draft = createDraft();
        state.editingId = null;
        clearDraftStorage();
        syncDraftToInputs();
      }

      function activateTab(name) {
        el.tabs.forEach((button) => button.classList.toggle("active", button.dataset.tab === name));
        Object.keys(el.panels).forEach((key) => {
          el.panels[key].classList.toggle("active", key === name);
        });
      }

      function syncSummaryViewTabs() {
        el.summaryViewTabs.forEach((button) => {
          button.classList.toggle("active", button.dataset.summaryView === state.summaryView);
        });
      }

      function recordSort(a, b) {
        const timeA = String(a.timeText || "");
        const timeB = String(b.timeText || "");
        if (timeA !== timeB) return timeA.localeCompare(timeB);
        return Number(a.createdClientMs || 0) - Number(b.createdClientMs || 0);
      }

      function hasVisibleRecordData(item) {
        return !!(
          String(item.client || "").trim() ||
          String(item.machine || "").trim() ||
          Number(item.amountNumber || 0) > 0 ||
          String(item.attachmentUrl || "").trim()
        );
      }

      function refreshDerivedRecords() {
        const all = state.allRecords
          .filter(hasVisibleRecordData)
          .slice()
          .sort(recordSort);
        const today = todayIso();
        state.todayRecords = all.filter((item) => item.dateIso === today);
        state.summaryDates = Array.from(new Set(all.map((item) => item.dateIso).filter(Boolean))).sort();
        if (!state.summaryDates.includes(state.summaryDateIso)) {
          state.summaryDateIso = state.summaryDates[state.summaryDates.length - 1] || today;
        }
        state.summaryRecords = all.filter((item) => item.dateIso === state.summaryDateIso);
        preloadTodayAttachments();
        renderTodayRecords();
        renderSummaryDate();
        renderSummary();
      }

      function renderAliases() {
        if (!state.aliases.length) {
          el.aliasList.innerHTML = '<div class="empty">Todavía no hay alias cargados.</div>';
          return;
        }
        el.aliasList.innerHTML = state.aliases.map((item) => `
          <div class="alias-row">
            <div>
              <div class="alias-name">${esc(item.nombre)}</div>
              <div class="alias-meta">Alias: ${esc(item.alias || "-")} | CUIT: ${esc(item.cuit || "-")}</div>
            </div>
            <button class="danger-btn" type="button" data-action="delete-alias" data-id="${esc(item.id)}">Eliminar</button>
          </div>
        `).join("");
      }

      function renderTodayRecords() {
        const items = state.todayRecords.slice().sort(recordSort);
        if (!items.length) {
          el.savedRecords.innerHTML = '<div class="section-card"><div class="empty">Todavía no hay comprobantes guardados para hoy.</div></div>';
          el.dayTotal.textContent = formatAmount(0, false);
          return;
        }
        el.savedRecords.innerHTML = items.map((item) => `
          <article class="record-card" data-id="${esc(item.id)}">
            <div class="record-body">
              <div class="grid-top">
                <label class="field">
                  <span class="field-label">Cliente</span>
                  <input class="input js-record-input" data-field="client" value="${esc(item.client || "")}">
                </label>
                <label class="field">
                  <span class="field-label">N° máquina</span>
                  <input class="input js-record-input" data-field="machine" value="${esc(item.machine || "")}">
                </label>
                <label class="field">
                  <span class="field-label">Monto</span>
                  <input class="input money js-record-input" data-field="amount" value="${esc(formatAmount(item.amountNumber || 0, true))}">
                </label>
              </div>
              <div class="grid-middle">
                <div class="field">
                  <span class="field-label">Transferencia a</span>
                  <button class="pick-btn ${item.transferName ? "ok" : ""}" type="button" data-action="pick-row-alias">${esc(item.transferName || "Elegir alias")}</button>
                </div>
                <div class="meta-box">
                  <span>Fecha</span>
                  <strong>${esc(item.dateText || "")}</strong>
                </div>
                <div class="meta-box">
                  <span>Hora</span>
                  <strong>${esc(item.timeText || "")}</strong>
                </div>
              </div>
              <div class="grid-bottom">
                <div class="field">
                  <span class="field-label">Comprobante</span>
                  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                    <button class="file-btn ${item.attachmentUrl ? "ok" : ""}" type="button" data-action="upload-row-file">${item.attachmentUrl ? "Cambiar comprobante" : "Subir comprobante"}</button>
                    <button class="record-link" type="button" data-action="open-row-file" ${item.attachmentUrl ? "" : "disabled"}>Ver archivo</button>
                  </div>
                </div>
                <div></div>
                <button class="danger-btn" type="button" data-action="delete-row">Eliminar</button>
              </div>
            </div>
          </article>
        `).join("");

        const total = items.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
        el.dayTotal.textContent = formatAmount(total, false);
      }

      function renderSummary() {
        const items = state.summaryRecords.slice().sort(recordSort);
        syncSummaryViewTabs();
        if (!items.length) {
          el.summaryList.innerHTML = '<div class="section-card"><div class="empty">Sin comprobantes para ese día.</div></div>';
          return;
        }

        const groups = new Map();
        items.forEach((item) => {
          const key = item.transferName || "Sin proveedor";
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(item);
        });

        // Load collapsed mapping once and reuse for each group. Each key corresponds to an encoded alias name.
        const collapsedMapping = loadSummaryCollapsed();

        let dayTotal = 0;
        const groupedHtml = Array.from(groups.entries()).map(([name, group]) => {
          const total = group.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
          dayTotal += total;
          // Create a safe key for use as a dataset attribute and in localStorage.
          const aliasKey = encodeURIComponent(String(name));
          // Determine if this group should start collapsed based on persisted state.
          const isCollapsed = collapsedMapping && collapsedMapping[aliasKey];
          return `
            <section class="summary-card${isCollapsed ? " collapsed" : ""}" data-alias="${aliasKey}">
              <div class="summary-head">
                <div class="summary-alias-wrapper">
                  <div class="summary-alias">${esc(name)}</div>
                  <span class="summary-toggle-icon">▼</span>
                </div>
                <div class="summary-total">${formatAmount(total, false)}</div>
              </div>
              ${group.map((item) => `
                <div class="summary-row">
                  <div class="summary-time">${esc(item.timeText || "--:--")}</div>
                  <div class="summary-main">
                    <div class="summary-client">${esc(item.client || "Sin cliente")}</div>
                    <button class="summary-machine" type="button" data-action="open-summary-file" data-id="${esc(item.id)}" ${item.attachmentUrl ? "" : "disabled"}>${esc(item.machine || item.attachmentName || (item.attachmentUrl ? "Ver comprobante" : "Sin comprobante"))}</button>
                  </div>
                  <div class="summary-amount">${formatAmount(item.amountNumber || 0, false)}</div>
                  <div class="summary-actions">
                    <button class="ghost-btn summary-icon-btn" type="button" title="Editar" aria-label="Editar" data-action="edit-summary" data-id="${esc(item.id)}">✎</button>
                    <button class="danger-btn summary-icon-btn" type="button" title="Eliminar" aria-label="Eliminar" data-action="delete-summary" data-id="${esc(item.id)}">✕</button>
                  </div>
                </div>
              `).join("")}
            </section>
          `;
        }).join("");

        const timelineHtml = `
          <section class="summary-card">
            <div class="summary-head">
              <div class="summary-alias">Ordenado por hora</div>
              <div class="summary-submeta">De la más vieja a la más nueva</div>
            </div>
            ${items.map((item) => `
              <div class="summary-row">
                <div class="summary-time">${esc(item.timeText || "--:--")}</div>
                <div class="summary-main">
                  <div class="summary-client">${esc(item.client || "Sin cliente")}</div>
                  <button class="summary-machine" type="button" data-action="open-summary-file" data-id="${esc(item.id)}" ${item.attachmentUrl ? "" : "disabled"}>${esc(item.machine || item.attachmentName || (item.attachmentUrl ? "Ver comprobante" : "Sin comprobante"))}</button>
                </div>
                <div class="summary-amount">${formatAmount(item.amountNumber || 0, false)}</div>
                <div class="summary-actions">
                  <button class="ghost-btn summary-icon-btn" type="button" title="Editar" aria-label="Editar" data-action="edit-summary" data-id="${esc(item.id)}">✎</button>
                  <button class="danger-btn summary-icon-btn" type="button" title="Eliminar" aria-label="Eliminar" data-action="delete-summary" data-id="${esc(item.id)}">✕</button>
                </div>
              </div>
            `).join("")}
          </section>
        `;

        const currentViewHtml = state.summaryView === "time" ? timelineHtml : groupedHtml;

        el.summaryList.innerHTML = currentViewHtml + `
          <div class="summary-day-total">
            <span>Total del día</span>
            <strong>${formatAmount(dayTotal, false)}</strong>
          </div>
        `;
      }

      function renderSummaryDate() {
        if (!state.summaryDates.length) {
          el.summaryDate.textContent = "Sin datos";
          el.summaryPrev.disabled = true;
          el.summaryNext.disabled = true;
          return;
        }
        const index = state.summaryDates.indexOf(state.summaryDateIso);
        const safeIndex = index >= 0 ? index : state.summaryDates.length - 1;
        state.summaryDateIso = state.summaryDates[safeIndex];
        el.summaryDate.textContent = formatDate(state.summaryDateIso);
        el.summaryPrev.disabled = safeIndex <= 0;
        el.summaryNext.disabled = safeIndex >= state.summaryDates.length - 1;
      }

      function buildPdfRowsByAlias(items) {
        const groups = new Map();
        items.forEach((item) => {
          const key = String(item.transferName || "Sin proveedor");
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(item);
        });
        return Array.from(groups.entries()).map(([aliasName, group]) => ({
          aliasName,
          total: group.reduce((sum, entry) => sum + Number(entry.amountNumber || 0), 0),
          rows: group
        }));
      }

      function drawPdfHeader(doc, title, subtitle) {
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text(title, 14, 14);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.text(subtitle, 14, 20);
      }

      function ensurePdfSpace(doc, y, needed) {
        if (y + needed <= 285) return y;
        doc.addPage();
        return 16;
      }

      function drawPdfRow(doc, y, item) {
        const time = String(item.timeText || "--:--");
        const client = String(item.client || "Sin cliente");
        const fact = String(item.machine || item.attachmentName || "Sin comprobante");
        const amount = formatAmount(item.amountNumber || 0, false);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.text(time, 14, y);
        doc.text(client.slice(0, 56), 34, y);
        if (item.attachmentUrl) {
          doc.setTextColor(36, 83, 200);
          doc.textWithLink(fact.slice(0, 34), 112, y, { url: item.attachmentUrl });
          doc.setTextColor(0, 0, 0);
        } else {
          doc.text(fact.slice(0, 34), 112, y);
        }
        doc.text(amount, 196, y, { align: "right" });
        return y + 6;
      }

      function createSummaryPdfDoc() {
        const items = state.summaryRecords.slice().sort(recordSort);
        if (!items.length) return null;
        const jsPdfCtor = window.jspdf && window.jspdf.jsPDF;
        if (!jsPdfCtor) throw new Error("No se pudo cargar la librería de PDF.");
        const doc = new jsPdfCtor({ unit: "mm", format: "a4" });
        const subtitle = `Fecha: ${formatDate(state.summaryDateIso)} | Generado: ${new Date().toLocaleString("es-AR")}`;

        drawPdfHeader(doc, "Comprobantes - Hoja 1 (por alias)", subtitle);
        let y = 28;
        const aliasSections = buildPdfRowsByAlias(items);
        aliasSections.forEach((section) => {
          y = ensurePdfSpace(doc, y, 12);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(10);
          doc.text(`${section.aliasName}  |  ${formatAmount(section.total, false)}`, 14, y);
          y += 4;
          doc.setFont("helvetica", "bold");
          doc.setFontSize(8);
          doc.text("Hora", 14, y);
          doc.text("Cliente", 34, y);
          doc.text("N° fact/comprobante", 112, y);
          doc.text("Monto", 196, y, { align: "right" });
          y += 4;
          section.rows.forEach((item) => {
            y = ensurePdfSpace(doc, y, 8);
            y = drawPdfRow(doc, y, item);
          });
          y += 2;
        });
        const dayTotalAlias = items.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
        y = ensurePdfSpace(doc, y, 10);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.text(`TOTAL DEL DÍA: ${formatAmount(dayTotalAlias, false)}`, 196, y, { align: "right" });

        doc.addPage();
        drawPdfHeader(doc, "Comprobantes - Hoja 2 (por hora)", subtitle);
        y = 28;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(8);
        doc.text("Hora", 14, y);
        doc.text("Alias", 34, y);
        doc.text("Cliente", 84, y);
        doc.text("N° fact/comprobante", 132, y);
        doc.text("Monto", 196, y, { align: "right" });
        y += 5;
        items.forEach((item) => {
          y = ensurePdfSpace(doc, y, 8);
          const time = String(item.timeText || "--:--");
          const alias = String(item.transferName || "Sin proveedor");
          const client = String(item.client || "Sin cliente");
          const fact = String(item.machine || item.attachmentName || "Sin comprobante");
          doc.setFont("helvetica", "normal");
          doc.setFontSize(9);
          doc.text(time, 14, y);
          doc.text(alias.slice(0, 28), 34, y);
          doc.text(client.slice(0, 28), 84, y);
          if (item.attachmentUrl) {
            doc.setTextColor(36, 83, 200);
            doc.textWithLink(fact.slice(0, 24), 132, y, { url: item.attachmentUrl });
            doc.setTextColor(0, 0, 0);
          } else {
            doc.text(fact.slice(0, 24), 132, y);
          }
          doc.text(formatAmount(item.amountNumber || 0, false), 196, y, { align: "right" });
          y += 6;
        });
        const dayTotalTime = items.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
        y = ensurePdfSpace(doc, y, 10);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.text(`TOTAL DEL DÍA: ${formatAmount(dayTotalTime, false)}`, 196, y, { align: "right" });

        return doc;
      }

      function downloadSummaryPdf() {
        const doc = createSummaryPdfDoc();
        if (!doc) {
          alert("No hay comprobantes para exportar en esta fecha.");
          return;
        }
        const fileDate = String(state.summaryDateIso || todayIso()).replace(/-/g, "");
        doc.save(`comprobantes_${fileDate}.pdf`);
      }

      function buildExcelAliasSheet(items) {
        const rows = [["RESUMEN POR ALIAS", "", "", "", ""], [`Fecha: ${formatDate(state.summaryDateIso)}`, "", "", "", ""], ["", "", "", "", ""]];
        const sections = buildPdfRowsByAlias(items);
        sections.forEach((section) => {
          rows.push([section.aliasName, "", "", "", formatAmount(section.total, false)]);
          rows.push(["Hora", "Cliente", "N° fact/comprobante", "URL", "Monto"]);
          section.rows.forEach((item) => {
            rows.push([
              String(item.timeText || "--:--"),
              String(item.client || "Sin cliente"),
              String(item.machine || item.attachmentName || "Sin comprobante"),
              String(item.attachmentUrl || ""),
              formatAmount(item.amountNumber || 0, false)
            ]);
          });
          rows.push(["", "", "", "", ""]);
        });
        const dayTotal = items.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
        rows.push(["TOTAL DEL DÍA", "", "", "", formatAmount(dayTotal, false)]);
        return rows;
      }

      function buildExcelTimeSheet(items) {
        const rows = [["RESUMEN POR HORA", "", "", "", "", ""], [`Fecha: ${formatDate(state.summaryDateIso)}`, "", "", "", "", ""], ["", "", "", "", "", ""]];
        rows.push(["Hora", "Alias", "Cliente", "N° fact/comprobante", "URL", "Monto"]);
        items.forEach((item) => {
          rows.push([
            String(item.timeText || "--:--"),
            String(item.transferName || "Sin proveedor"),
            String(item.client || "Sin cliente"),
            String(item.machine || item.attachmentName || "Sin comprobante"),
            String(item.attachmentUrl || ""),
            formatAmount(item.amountNumber || 0, false)
          ]);
        });
        rows.push(["", "", "", "", "", ""]);
        const dayTotal = items.reduce((sum, item) => sum + Number(item.amountNumber || 0), 0);
        rows.push(["TOTAL DEL DÍA", "", "", "", "", formatAmount(dayTotal, false)]);
        return rows;
      }

      function addExcelLinks(sheet, rows, urlColumnIndex) {
        for (let row = 0; row < rows.length; row += 1) {
          const url = String(rows[row][urlColumnIndex] || "").trim();
          if (!url) continue;
          const linkTextCol = urlColumnIndex - 1;
          const cellAddress = window.XLSX.utils.encode_cell({ r: row, c: linkTextCol });
          if (sheet[cellAddress]) {
            sheet[cellAddress].l = { Target: url, Tooltip: "Abrir comprobante" };
          }
        }
      }

      function downloadSummaryExcel() {
        const items = state.summaryRecords.slice().sort(recordSort);
        if (!items.length) {
          alert("No hay comprobantes para exportar en esta fecha.");
          return;
        }
        if (!window.XLSX) throw new Error("No se pudo cargar la librería de Excel.");
        const wb = window.XLSX.utils.book_new();
        const aliasRows = buildExcelAliasSheet(items);
        const timeRows = buildExcelTimeSheet(items);
        const aliasSheet = window.XLSX.utils.aoa_to_sheet(aliasRows);
        const timeSheet = window.XLSX.utils.aoa_to_sheet(timeRows);
        addExcelLinks(aliasSheet, aliasRows, 3);
        addExcelLinks(timeSheet, timeRows, 4);
        aliasSheet["!cols"] = [{ wch: 10 }, { wch: 30 }, { wch: 26 }, { wch: 50 }, { wch: 16 }];
        timeSheet["!cols"] = [{ wch: 10 }, { wch: 24 }, { wch: 24 }, { wch: 24 }, { wch: 50 }, { wch: 16 }];
        window.XLSX.utils.book_append_sheet(wb, aliasSheet, "Por alias");
        window.XLSX.utils.book_append_sheet(wb, timeSheet, "Por hora");
        const fileDate = String(state.summaryDateIso || todayIso()).replace(/-/g, "");
        window.XLSX.writeFile(wb, `comprobantes_${fileDate}.xlsx`);
      }

      function findRecord(id, source) {
        return source.find((item) => String(item.id) === String(id)) || null;
      }

      function firstText() {
        for (let i = 0; i < arguments.length; i += 1) {
          const value = arguments[i];
          if (value !== undefined && value !== null && String(value).trim() !== "") return String(value).trim();
        }
        return "";
      }

      function firstNumber() {
        for (let i = 0; i < arguments.length; i += 1) {
          const value = arguments[i];
          const parsed = parseAmount(value);
          if (parsed) return parsed;
        }
        return 0;
      }

      function isUsableRemoteUrl(value) {
        const raw = String(value || "").trim();
        return /^https?:\/\//i.test(raw);
      }

      function sanitizeAttachmentUrl(value) {
        const raw = String(value || "").trim();
        if (!raw || raw === "[object Object]") return "";
        if (isUsableRemoteUrl(raw)) return raw;
        return "";
      }

      function pickAttachmentUrl(data) {
        return sanitizeAttachmentUrl(
          firstText(
            data.attachmentUrl,
            data.comprobante_url,
            data.comprobanteUrl,
            data.attachment_url,
            data.urlComprobante,
            data.url_comprobante,
            data.archivo_url,
            data.archivoUrl,
            data.attachment && data.attachment.url,
            data.comprobante && data.comprobante.url,
            data.archivo && data.archivo.url
          )
        );
      }

      function getAttachmentKind(source) {
        const type = String((source && (source.attachmentType || source.type)) || "").toLowerCase();
        const url = sanitizeAttachmentUrl(source && (source.attachmentUrl || source.url || source));
        const cleanPath = url ? String(url).split("?")[0].toLowerCase() : "";
        if (type.includes("pdf") || cleanPath.endsWith(".pdf")) return "pdf";
        if (type.startsWith("image/") || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(cleanPath)) return "image";
        return "image";
      }

      function getAttachmentPayload(source) {
        if (!source) return null;
        if (typeof source === "string") {
          const url = sanitizeAttachmentUrl(source);
          if (!url) return null;
          return {
            url,
            name: "Comprobante",
            kind: getAttachmentKind({ url }),
            type: ""
          };
        }
        const url = sanitizeAttachmentUrl(source.attachmentUrl || source.url);
        if (!url) return null;
        return {
          url,
          name: firstText(source.attachmentName, source.name, source.machine, "Comprobante"),
          kind: getAttachmentKind(source),
          type: String(source.attachmentType || source.type || "")
        };
      }

      function setViewerLoading(isLoading, text) {
        el.viewerLoading.hidden = !isLoading;
        if (text) el.viewerLoadingText.textContent = text;
      }

      function syncImageModalWidth() {
        if (!el.viewerModal.classList.contains("image-mode") || el.viewerImage.hidden) return;
        el.viewerStage.style.width = "";
        el.viewerModal.style.width = "";
      }

      function applyViewerFullscreenZoom(zoom) {
        const clamped = Math.min(4, Math.max(1, Number(zoom) || 1));
        state.viewerFullZoom = clamped;
        el.viewerFullImage.style.transform = `scale(${clamped})`;
      }

      function openViewerFullscreen(src) {
        const raw = String(src || "").trim();
        if (!raw) return;
        el.viewerFullImage.src = raw;
        applyViewerFullscreenZoom(1);
        el.viewerFullBg.classList.add("open");
      }

      function closeViewerFullscreen() {
        el.viewerFullBg.classList.remove("open");
        el.viewerFullImage.removeAttribute("src");
      }

      function resetAttachmentViewer() {
        state.viewerUrl = "";
        el.viewerModal.classList.remove("image-mode", "pdf-mode");
        el.viewerModal.style.width = "";
        el.viewerStage.style.width = "";
        el.viewerImage.hidden = true;
        el.viewerImage.style.cursor = "";
        el.viewerImage.removeAttribute("src");
        el.viewerFrame.hidden = true;
        el.viewerFrame.removeAttribute("src");
        el.viewerFrame.onload = null;
        setViewerLoading(true, "Cargando comprobante...");
      }

      function closeAttachmentViewer() {
        closeViewerFullscreen();
        resetAttachmentViewer();
        el.viewerModalBg.classList.remove("open");
      }

      function primeAttachmentPreview(source) {
        const payload = getAttachmentPayload(source);
        if (!payload || payload.kind !== "image") return;
        if (state.attachmentPreviewCache.has(payload.url) || state.attachmentPreloading.has(payload.url)) return;
        state.attachmentPreloading.add(payload.url);
        const img = new Image();
        img.decoding = "async";
        img.onload = () => {
          state.attachmentPreviewCache.set(payload.url, { kind: "image", image: img });
          state.attachmentPreloading.delete(payload.url);
        };
        img.onerror = () => {
          state.attachmentPreloading.delete(payload.url);
        };
        img.src = payload.url;
      }

      function preloadTodayAttachments() {
        state.todayRecords.forEach((item) => {
          if (item && item.attachmentUrl) primeAttachmentPreview(item);
        });
      }

      function mapDoc(doc) {
        const data = doc.data() || {};
        const createdAtMs = data.createdAt && typeof data.createdAt.toMillis === "function"
          ? data.createdAt.toMillis()
          : Number(data.createdAt || data.created_at || 0);
        const dateIso = firstText(
          data.dateIso,
          data.fecha_iso,
          parseDateToIso(data.dateText),
          parseDateToIso(data.fecha_texto),
          parseDateToIso(data.fecha),
          todayIso()
        );
        const amountNumber = firstNumber(
          data.amountNumber,
          data.monto,
          data.monto_total,
          data.montoTotal
        );
        return {
          id: doc.id,
          client: firstText(data.client, data.cliente, data.nombreCliente),
          machine: firstText(data.machine, data.maquina, data.numeroMaquina, data.maquina_texto),
          amountNumber,
          transferName: firstText(data.transferName, data.transferencia, data.transfer, data.aliasNombre, data.alias, data.alias_mp),
          transferAlias: firstText(data.transferAlias, data.alias, data.alias_mp),
          transferCuit: firstText(data.transferCuit, data.cuit),
          dateIso,
          dateText: firstText(data.dateText, data.fecha_texto, data.fecha, formatDate(dateIso)),
          timeText: firstText(
            data.timeText,
            data.hora,
            data.hora_texto,
            createdAtMs ? new Date(createdAtMs).toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", hour12: false }) : ""
          ),
          attachmentUrl: pickAttachmentUrl(data),
          attachmentName: firstText(data.attachmentName, data.comprobante_nombre, data.comprobanteNombre),
          attachmentType: firstText(data.attachmentType, data.comprobante_tipo, data.comprobanteTipo),
          createdClientMs: Number(data.createdClientMs || data.created_client_ms || data.timestamp || createdAtMs || 0)
        };
      }

      async function uploadFileToSupabase(file, keyPart) {
        const cleanName = String(file.name || `comprobante_${keyPart}`).replace(/[^a-zA-Z0-9._-]/g, "_");
        const path = `comprobantes/${todayIso()}/${Date.now()}_${keyPart}_${cleanName}`;
        const encodedPath = path.split("/").map(encodeURIComponent).join("/");
        const response = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${encodedPath}`, {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "x-upsert": "true",
            "Content-Type": file.type || "application/octet-stream"
          },
          body: file
        });
        const text = await response.text();
        if (!response.ok) throw new Error(text || `Error ${response.status}`);
        return {
          url: `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${encodedPath}`,
          name: file.name || cleanName,
          type: file.type || ""
        };
      }

      function buildDraftPayload() {
        syncDraftFromInputs();
        return {
          client: state.draft.client,
          machine: state.draft.machine,
          amountNumber: state.draft.amountNumber,
          transferName: state.draft.transfer ? state.draft.transfer.nombre : "",
          transferAlias: state.draft.transfer ? state.draft.transfer.alias : "",
          transferCuit: state.draft.transfer ? state.draft.transfer.cuit : "",
          dateIso: state.draft.dateIso,
          dateText: state.draft.dateText,
          timeText: state.draft.timeText,
          createdClientMs: Date.now(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
      }

      function recordRef(id) {
        return state.db.collection(COMPROBANTES_COLLECTION).doc(String(id));
      }

      function aliasRef(id) {
        return state.db.collection(ALIASES_COLLECTION).doc(String(id));
      }

      async function saveAlias() {
        const nombre = String(el.aliasName.value || "").trim();
        const alias = String(el.aliasAlias.value || "").trim();
        const cuit = String(el.aliasCuit.value || "").trim();
        if (!nombre) {
          el.aliasName.focus();
          return;
        }
        await state.db.collection(ALIASES_COLLECTION).add({
          nombre,
          alias,
          cuit,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        el.aliasName.value = "";
        el.aliasAlias.value = "";
        el.aliasCuit.value = "";
        el.aliasName.focus();
      }

      async function deleteAlias(id) {
        await aliasRef(id).delete();
      }

      async function saveDraft() {
        if (state.isSavingDraft) return;
        syncDraftFromInputs();
        if (!hasDraftData()) {
          el.draftClient.focus();
          return;
        }
        if (!state.draft.client.trim()) {
          alert("Completá cliente.");
          el.draftClient.focus();
          return;
        }
        if (!state.draft.machine.trim()) {
          alert("Completá N° de máquina.");
          el.draftMachine.focus();
          return;
        }
        if (!(Number(state.draft.amountNumber || 0) > 0)) {
          alert("Completá monto.");
          el.draftAmount.focus();
          return;
        }
        if (!state.draft.transfer) {
          alert("Elegí alias.");
          openAliasModal({ type: "draft" });
          return;
        }
        setDraftSaving(true);
        try {
          const payload = buildDraftPayload();
          if (state.draft.attachment && state.draft.attachment.file) {
            const uploaded = await uploadFileToSupabase(state.draft.attachment.file, state.draft.machine || "draft");
            payload.attachmentUrl = uploaded.url;
            payload.attachmentName = uploaded.name;
            payload.attachmentType = uploaded.type;
          } else if (state.draft.attachment && isUsableRemoteUrl(state.draft.attachment.url)) {
            payload.attachmentUrl = state.draft.attachment.url;
            payload.attachmentName = state.draft.attachment.name || "";
            payload.attachmentType = state.draft.attachment.type || "";
          } else {
            payload.attachmentUrl = "";
            payload.attachmentName = "";
            payload.attachmentType = "";
          }
          if (state.editingId) {
            await recordRef(state.editingId).update(payload);
          } else {
            payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await state.db.collection(COMPROBANTES_COLLECTION).add(payload);
          }
          resetDraft();
          activateTab("resumen");
        } finally {
          setDraftSaving(false);
        }
      }

      async function updateRecordField(id, field, value) {
        const payload = { updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
        if (field === "client") payload.client = String(value || "").trim();
        if (field === "machine") payload.machine = formatMachine(value);
        if (field === "amount") payload.amountNumber = parseAmount(value);
        await recordRef(id).update(payload);
      }

      async function updateRecordAlias(id, aliasDoc) {
        await recordRef(id).update({
          transferName: aliasDoc ? aliasDoc.nombre : "",
          transferAlias: aliasDoc ? aliasDoc.alias : "",
          transferCuit: aliasDoc ? aliasDoc.cuit : "",
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }

      async function updateRecordAttachment(id, file) {
        const uploaded = await uploadFileToSupabase(file, id);
        await recordRef(id).update({
          attachmentUrl: uploaded.url,
          attachmentName: uploaded.name,
          attachmentType: uploaded.type,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }

      async function deleteRecord(id) {
        await recordRef(id).delete();
      }

      function loadRecordIntoDraft(record) {
        if (!record) return;
        state.editingId = record.id;
        state.draft = createDraft();
        state.draft.client = record.client || "";
        state.draft.machine = record.machine || "";
        state.draft.amountNumber = Number(record.amountNumber || 0);
        state.draft.amountInput = record.amountNumber ? formatAmount(record.amountNumber, true) : "";
        state.draft.transfer = record.transferName ? {
          id: "",
          nombre: record.transferName || "",
          alias: record.transferAlias || "",
          cuit: record.transferCuit || ""
        } : null;
        state.draft.dateIso = record.dateIso || todayIso();
        state.draft.dateText = record.dateText || formatDate(state.draft.dateIso);
        state.draft.timeText = record.timeText || currentTime();
        state.draft.attachment = record.attachmentUrl ? {
          file: null,
          url: record.attachmentUrl,
          name: record.attachmentName || "Comprobante",
          type: record.attachmentType || ""
        } : null;
        syncDraftToInputs();
        activateTab("comp");
        el.draftClient.focus();
      }

      function openAliasModal(target) {
        state.aliasPickerTarget = target;
        el.aliasModalList.innerHTML = state.aliases.length
          ? state.aliases.map((item) => `
              <button class="picker-item" type="button" data-action="pick-alias" data-id="${esc(item.id)}">
                <strong>${esc(item.nombre)}</strong>
                <span>Alias: ${esc(item.alias || "-")} | CUIT: ${esc(item.cuit || "-")}</span>
              </button>
            `).join("")
          : '<div class="empty">No hay alias cargados.</div>';
        el.aliasModalBg.classList.add("open");
      }

      function closeAliasModal() {
        state.aliasPickerTarget = null;
        el.aliasModalBg.classList.remove("open");
      }

      function openConfirm(action) {
        state.confirm = { action, step: 1 };
        renderConfirm();
      }

      function closeConfirm() {
        state.confirm = null;
        el.confirmModalBg.classList.remove("open");
      }

      function renderConfirm() {
        if (!state.confirm) return;
        const matrix = {
          clear: [
            ["Confirmación 1/3", "Vas a borrar los comprobantes visibles del día actual."],
            ["Confirmación 2/3", "La eliminación impacta en Firebase y no usa nada local."],
            ["Confirmación 3/3", "Último paso: confirmar borrado total del día."]
          ],
          saveNew: [
            ["Confirmación 1/3", "Se guarda la fila nueva actual."],
            ["Confirmación 2/3", "Después se limpia la fila para arrancar otra."],
            ["Confirmación 3/3", "Último paso: confirmar guardar y nuevo."]
          ]
        };
        const info = matrix[state.confirm.action][state.confirm.step - 1];
        el.confirmTitle.textContent = info[0];
        el.confirmCopy.textContent = info[1];
        el.confirmOk.textContent = state.confirm.step === 3 ? "Confirmar" : "Continuar";
        el.confirmModalBg.classList.add("open");
      }

      async function continueConfirm() {
        if (!state.confirm) return;
        if (state.confirm.step < 3) {
          state.confirm.step += 1;
          renderConfirm();
          return;
        }
        const action = state.confirm.action;
        closeConfirm();
        if (action === "saveNew") {
          await saveDraft();
          return;
        }
        const ids = state.todayRecords.map((item) => item.id);
        for (const id of ids) {
          await deleteRecord(id);
        }
        resetDraft();
      }

      function openFileFromDraft() {
        const attachment = state.draft.attachment;
        if (attachment && attachment.url) openAttachmentViewer(attachment);
      }

      function openAttachmentViewer(source) {
        const payload = getAttachmentPayload(source);
        if (!payload || !payload.url) return;
        if (!isUsableRemoteUrl(payload.url)) {
          alert("Este comprobante tiene una URL inválida o local. Volvé a subir el comprobante.");
          return;
        }
        if (payload.kind === "pdf") {
          const anchor = document.createElement("a");
          anchor.href = payload.url;
          anchor.target = "_blank";
          anchor.rel = "noopener noreferrer";
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          return;
        }
        resetAttachmentViewer();
        state.viewerUrl = payload.url;
        el.viewerModal.classList.add("image-mode");
        el.viewerTitle.textContent = "Comprobante";
        el.viewerHint.textContent = "Imagen abierta dentro de la página";
        el.viewerModalBg.classList.add("open");

        const cached = state.attachmentPreviewCache.get(payload.url);
        if (cached && cached.image && cached.image.src) {
          el.viewerImage.src = cached.image.src;
          el.viewerImage.style.cursor = "zoom-in";
          el.viewerImage.hidden = false;
          setViewerLoading(false);
          requestAnimationFrame(() => requestAnimationFrame(syncImageModalWidth));
          return;
        }

        const img = new Image();
        img.decoding = "async";
        img.onload = () => {
          state.attachmentPreviewCache.set(payload.url, { kind: "image", image: img });
          if (state.viewerUrl !== payload.url) return;
          el.viewerImage.src = img.src;
          el.viewerImage.style.cursor = "zoom-in";
          el.viewerImage.hidden = false;
          setViewerLoading(false);
          requestAnimationFrame(() => requestAnimationFrame(syncImageModalWidth));
        };
        img.onerror = () => {
          if (state.viewerUrl !== payload.url) return;
          closeAttachmentViewer();
          alert("No se pudo abrir el comprobante. Probá subirlo de nuevo.");
        };
        img.src = payload.url;
      }

      function handlePickedAlias(aliasId) {
        const aliasDoc = findRecord(aliasId, state.aliases);
        if (!aliasDoc || !state.aliasPickerTarget) return;
        const target = state.aliasPickerTarget;
        closeAliasModal();
        if (target.type === "draft") {
          // Preserve what the user already typed before writing back to the UI.
          syncDraftFromInputs();
          state.draft.transfer = aliasDoc;
          syncDraftToInputs();
          openFilePicker({ type: "draft" });
          return;
        }
        updateRecordAlias(target.id, aliasDoc).then(() => {
          openFilePicker({ type: "record", id: target.id });
        }).catch((error) => throttleError("No se pudo actualizar alias", error));
      }

      function openFilePicker(target) {
        if (target && target.type === "draft") {
          // Keep draft state aligned with inputs before opening/canceling the picker.
          syncDraftFromInputs();
        }
        state.fileTarget = target;
        el.fileInput.value = "";
        el.fileInput.click();
      }

      function applySelectedFile(file, target) {
        if (!file || !target) return Promise.resolve();
        if (target.type === "draft") {
          state.isUploadingDraftAttachment = true;
          syncDraftToInputs();
          return uploadFileToSupabase(file, state.draft.machine || "draft").then((uploaded) => {
            state.draft.attachment = {
              file: null,
              url: uploaded.url,
              name: uploaded.name || file.name || "Comprobante",
              type: uploaded.type || file.type || ""
            };
            el.draftAdd.focus();
          }).finally(() => {
            state.isUploadingDraftAttachment = false;
            syncDraftToInputs();
          });
        }
        return updateRecordAttachment(target.id, file);
      }

      function subscribeAliases() {
        if (state.unsubAliases) state.unsubAliases();
        state.unsubAliases = state.db.collection(ALIASES_COLLECTION).orderBy("nombre", "asc").onSnapshot((snapshot) => {
          state.aliases = snapshot.docs.map((doc) => ({
            id: doc.id,
            nombre: String(doc.data().nombre || ""),
            alias: String(doc.data().alias || ""),
            cuit: String(doc.data().cuit || "")
          }));
          renderAliases();
          syncDraftToInputs();
          renderTodayRecords();
          renderSummary();
        }, (error) => throttleError("No se pudieron leer alias", error));
      }

      function subscribeTodayRecords() {
        if (state.unsubRecords) state.unsubRecords();
        state.unsubRecords = state.db.collection(COMPROBANTES_COLLECTION).onSnapshot((snapshot) => {
          state.allRecords = snapshot.docs.map(mapDoc);
          refreshDerivedRecords();
        }, (error) => throttleError("No se pudieron leer comprobantes", error));
      }

      function subscribeSummaryDates() {
        refreshDerivedRecords();
      }

      function subscribeSummaryRecords() {
        refreshDerivedRecords();
      }

      function bindTabs() {
        el.tabs.forEach((button) => {
          button.addEventListener("click", () => activateTab(button.dataset.tab));
        });
      }

      function bindAliasSection() {
        el.aliasAdd.addEventListener("click", () => {
          saveAlias().catch((error) => throttleError("No se pudo guardar alias", error));
        });
        [el.aliasName, el.aliasAlias, el.aliasCuit].forEach((input) => {
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              event.preventDefault();
              saveAlias().catch((error) => throttleError("No se pudo guardar alias", error));
            }
          });
        });
        el.aliasList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-action='delete-alias']");
          if (!button) return;
          deleteAlias(button.dataset.id).catch((error) => throttleError("No se pudo borrar alias", error));
        });
      }

      function bindDraftSection() {
        el.draftClient.addEventListener("input", () => {
          syncDraftFromInputs();
        });
        el.draftClient.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.draftMachine.focus();
          }
        });
        el.draftMachine.addEventListener("input", () => {
          syncDraftFromInputs();
        });
        el.draftMachine.addEventListener("blur", () => {
          el.draftMachine.value = formatMachine(el.draftMachine.value);
          syncDraftFromInputs();
        });
        el.draftMachine.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.draftMachine.value = formatMachine(el.draftMachine.value);
            syncDraftFromInputs();
            el.draftAmount.focus();
          }
        });
        el.draftAmount.addEventListener("input", () => {
          syncDraftFromInputs();
        });
        el.draftAmount.addEventListener("blur", () => {
          el.draftAmount.value = formatAmountInput(el.draftAmount.value);
          syncDraftFromInputs();
        });
        el.draftAmount.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            el.draftAmount.value = formatAmountInput(el.draftAmount.value);
            syncDraftFromInputs();
            openAliasModal({ type: "draft" });
          }
        });
        el.draftTransfer.addEventListener("click", () => openAliasModal({ type: "draft" }));
        el.draftUpload.addEventListener("click", () => openFilePicker({ type: "draft" }));
        el.draftOpenFile.addEventListener("click", openFileFromDraft);
        el.draftClear.addEventListener("click", resetDraft);
        el.draftAdd.addEventListener("click", () => {
          saveDraft().catch((error) => throttleError("No se pudo guardar la fila", error));
        });
      }

      function bindRecords() {
        el.savedRecords.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") return;
          const input = event.target.closest(".js-record-input");
          if (!input) return;
          event.preventDefault();
          const card = input.closest(".record-card");
          const id = card && card.dataset.id;
          if (!id) return;
          if (input.dataset.field === "client") {
            card.querySelector('[data-field="machine"]').focus();
            return;
          }
          if (input.dataset.field === "machine") {
            input.value = formatMachine(input.value);
            card.querySelector('[data-field="amount"]').focus();
            return;
          }
          if (input.dataset.field === "amount") {
            input.value = formatAmountInput(input.value);
            openAliasModal({ type: "record", id });
          }
        });

        el.savedRecords.addEventListener("focusout", (event) => {
          const input = event.target.closest(".js-record-input");
          if (!input) return;
          const card = input.closest(".record-card");
          const id = card && card.dataset.id;
          if (!id) return;
          if (input.dataset.field === "machine") input.value = formatMachine(input.value);
          if (input.dataset.field === "amount") input.value = formatAmountInput(input.value);
          updateRecordField(id, input.dataset.field, input.value).catch((error) => throttleError("No se pudo actualizar", error));
        });

        el.savedRecords.addEventListener("click", (event) => {
          const card = event.target.closest(".record-card");
          const id = card && card.dataset.id;
          if (!id) return;
          const action = event.target.dataset.action;
          if (action === "pick-row-alias") openAliasModal({ type: "record", id });
          if (action === "upload-row-file") openFilePicker({ type: "record", id });
          if (action === "open-row-file") {
            const item = findRecord(id, state.todayRecords);
            if (item && item.attachmentUrl) openAttachmentViewer(item);
          }
          if (action === "delete-row") {
            deleteRecord(id).catch((error) => throttleError("No se pudo borrar comprobante", error));
          }
        });
      }

      function bindSummary() {
        el.summaryPrev.addEventListener("click", () => {
          const index = state.summaryDates.indexOf(state.summaryDateIso);
          if (index > 0) {
            state.summaryDateIso = state.summaryDates[index - 1];
            subscribeSummaryRecords();
          }
        });
        el.summaryNext.addEventListener("click", () => {
          const index = state.summaryDates.indexOf(state.summaryDateIso);
          if (index >= 0 && index < state.summaryDates.length - 1) {
            state.summaryDateIso = state.summaryDates[index + 1];
            subscribeSummaryRecords();
          }
        });
        el.summaryViewTabs.forEach((button) => {
          button.addEventListener("click", () => {
            state.summaryView = button.dataset.summaryView === "time" ? "time" : "alias";
            renderSummary();
          });
        });
        el.summaryList.addEventListener("click", (event) => {
          // First handle clicks on summary headers to toggle collapse/expand in alias view
          const head = event.target.closest(".summary-head");
          if (head && state.summaryView !== "time") {
            const card = head.closest(".summary-card");
            if (card) {
              const aliasName = card.dataset.alias;
              const collapsedMapping = loadSummaryCollapsed();
              // Toggle collapsed class on the card
              const isCollapsed = card.classList.toggle("collapsed");
              if (aliasName) {
                collapsedMapping[aliasName] = isCollapsed;
                saveSummaryCollapsed(collapsedMapping);
              }
            }
            return;
          }
          const button = event.target.closest("[data-action]");
          if (!button) return;
          const action = button.dataset.action;
          const item = findRecord(button.dataset.id, state.summaryRecords);
          if (!item) return;
          if (action === "open-summary-file" && item.attachmentUrl) {
            openAttachmentViewer(item);
            return;
          }
          if (action === "edit-summary") {
            loadRecordIntoDraft(item);
            return;
          }
          if (action === "delete-summary") {
            if (!window.confirm("¿Borrar este movimiento?")) return;
            if (!window.confirm("Confirmación final: este movimiento se va a eliminar.")) return;
            deleteRecord(item.id).catch((error) => throttleError("No se pudo borrar comprobante", error));
          }
        });
      }

      function bindModals() {
        el.aliasModalClose.addEventListener("click", closeAliasModal);
        el.aliasModalBg.addEventListener("click", (event) => {
          if (event.target === el.aliasModalBg) closeAliasModal();
        });
        el.viewerClose.addEventListener("click", closeAttachmentViewer);
        el.viewerModalBg.addEventListener("click", (event) => {
          if (event.target === el.viewerModalBg) closeAttachmentViewer();
        });
        el.viewerImage.addEventListener("click", () => {
          if (el.viewerImage.hidden || !el.viewerImage.src) return;
          openViewerFullscreen(el.viewerImage.src);
        });
        el.viewerFullClose.addEventListener("click", closeViewerFullscreen);
        el.viewerZoomOut.addEventListener("click", () => applyViewerFullscreenZoom(state.viewerFullZoom - 0.2));
        el.viewerZoomReset.addEventListener("click", () => applyViewerFullscreenZoom(1));
        el.viewerZoomIn.addEventListener("click", () => applyViewerFullscreenZoom(state.viewerFullZoom + 0.2));
        el.viewerFullImage.addEventListener("wheel", (event) => {
          if (!el.viewerFullBg.classList.contains("open")) return;
          event.preventDefault();
          const delta = event.deltaY < 0 ? 0.12 : -0.12;
          applyViewerFullscreenZoom(state.viewerFullZoom + delta);
        }, { passive: false });
        el.viewerFullImage.addEventListener("touchstart", (event) => {
          if (event.touches.length !== 2) return;
          const dx = event.touches[0].clientX - event.touches[1].clientX;
          const dy = event.touches[0].clientY - event.touches[1].clientY;
          state.viewerPinchStartDistance = Math.hypot(dx, dy);
          state.viewerPinchBaseZoom = state.viewerFullZoom;
        }, { passive: true });
        el.viewerFullImage.addEventListener("touchmove", (event) => {
          if (event.touches.length !== 2 || !state.viewerPinchStartDistance) return;
          event.preventDefault();
          const dx = event.touches[0].clientX - event.touches[1].clientX;
          const dy = event.touches[0].clientY - event.touches[1].clientY;
          const distance = Math.hypot(dx, dy);
          const ratio = distance / state.viewerPinchStartDistance;
          applyViewerFullscreenZoom(state.viewerPinchBaseZoom * ratio);
        }, { passive: false });
        el.viewerFullImage.addEventListener("touchend", () => {
          state.viewerPinchStartDistance = 0;
        }, { passive: true });
        el.viewerFullBg.addEventListener("click", (event) => {
          if (event.target === el.viewerFullBg) closeViewerFullscreen();
        });
        el.aliasModalList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-action='pick-alias']");
          if (!button) return;
          handlePickedAlias(button.dataset.id);
        });

        el.confirmCancel.addEventListener("click", closeConfirm);
        el.confirmOk.addEventListener("click", () => {
          continueConfirm().catch((error) => throttleError("No se pudo completar la acción", error));
        });
        el.confirmModalBg.addEventListener("click", (event) => {
          if (event.target === el.confirmModalBg) closeConfirm();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key !== "Escape") return;
          if (el.viewerFullBg.classList.contains("open")) {
            closeViewerFullscreen();
            return;
          }
          if (el.viewerModalBg.classList.contains("open")) closeAttachmentViewer();
        });
        window.addEventListener("resize", () => {
          if (el.viewerModalBg.classList.contains("open")) {
            requestAnimationFrame(syncImageModalWidth);
          }
        });
      }

      function bindFooter() {
        el.excelDownload.addEventListener("click", () => {
          try {
            downloadSummaryExcel();
          } catch (error) {
            throttleError("No se pudo generar Excel", error);
          }
        });
        el.pdfDownload.addEventListener("click", () => {
          try {
            downloadSummaryPdf();
          } catch (error) {
            throttleError("No se pudo generar PDF", error);
          }
        });
        el.saveNew.addEventListener("click", () => openConfirm("saveNew"));
        el.clearAll.addEventListener("click", () => openConfirm("clear"));
      }

      function bindFileInput() {
        el.fileInput.addEventListener("change", (event) => {
          const file = event.target.files && event.target.files[0];
          const target = state.fileTarget || { type: "draft" };
          state.fileTarget = null;
          if (!file) return;
          applySelectedFile(file, target).catch((error) => throttleError("No se pudo subir archivo", error));
        });
      }

      function bindPasteAndDrop() {
        window.addEventListener("paste", (event) => {
          const item = Array.from(event.clipboardData && event.clipboardData.items || []).find((entry) => entry.kind === "file");
          const file = item && item.getAsFile ? item.getAsFile() : null;
          if (!file || !el.panels.comp.classList.contains("active")) return;
          event.preventDefault();
          const target = state.fileTarget || { type: "draft" };
          state.fileTarget = null;
          applySelectedFile(file, target).catch((error) => throttleError("No se pudo pegar archivo", error));
        });
        window.addEventListener("dragover", (event) => {
          if (!el.panels.comp.classList.contains("active")) return;
          event.preventDefault();
        });
        window.addEventListener("drop", (event) => {
          if (!el.panels.comp.classList.contains("active")) return;
          const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
          if (!file) return;
          event.preventDefault();
          const target = state.fileTarget || { type: "draft" };
          state.fileTarget = null;
          applySelectedFile(file, target).catch((error) => throttleError("No se pudo arrastrar archivo", error));
        });
      }

      function initStaticUi() {
        restoreDraftFromStorage();
        activateTab("comp");
        syncDraftToInputs();
        renderAliases();
        renderTodayRecords();
        renderSummaryDate();
        renderSummary();
        bindTabs();
        bindAliasSection();
        bindDraftSection();
        bindRecords();
        bindSummary();
        bindModals();
        bindFooter();
        bindFileInput();
        bindPasteAndDrop();
      }

      function initFirebase() {
        if (!window.firebase || !window.firebase.firestore) throw new Error("Firebase no cargó correctamente");
        if (!window.firebase.apps.length) {
          window.firebase.initializeApp(firebaseConfig);
        }
        state.db = window.firebase.firestore();
        subscribeAliases();
        subscribeTodayRecords();
        subscribeSummaryDates();
      }

      initStaticUi();
      try {
        initFirebase();
      } catch (error) {
        throttleError("Error inicializando Firebase", error);
      }
    })();
</script>
