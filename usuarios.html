<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios - Corralon Progreso</title>
<link rel="icon" type="image/x-icon" href="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/icono-corralon-Photoroom.ico">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4efe9;
    --panel: #ffffff;
    --line: #d8cfee;
    --purple: #6c4fc7;
    --purple-dark: #4d35a0;
    --red: #e50000;
    --text: #1f2233;
    --muted: #7b8090;
    --shadow: 0 10px 30px rgba(58, 35, 120, .12);
  }
  body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.95) 0%, transparent 35%),
      radial-gradient(circle at 85% 8%, rgba(108,79,199,.09) 0%, transparent 30%),
      var(--bg);
    padding: 18px;
  }
  .wrap { width: min(100%, 920px); margin: 0 auto; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .head {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, #faf8ff 0%, #f5f0ff 100%);
  }
  .head img { height: 34px; width: auto; mix-blend-mode: multiply; }
  h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .back {
    margin-left: auto;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
    background: #fff;
    color: var(--purple-dark);
    text-decoration: none;
    font-size: 12px;
    font-weight: 800;
  }
  .body { padding: 16px; }
  .form {
    display: grid;
    grid-template-columns: minmax(160px, 1fr) 150px 150px 170px auto;
    gap: 10px;
    align-items: end;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  label {
    display: block;
    color: var(--purple-dark);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  input, select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-weight: 800;
    background: #fff;
    outline: none;
  }
  input:focus, select:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(108,79,199,.14);
  }
  .btn {
    border: 1px solid var(--purple);
    border-radius: 10px;
    padding: 10px 14px;
    background: var(--purple);
    color: #fff;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn.light {
    background: #fff;
    color: var(--purple-dark);
    border-color: var(--line);
  }
  .btn.danger {
    background: #fff0f0;
    color: var(--red);
    border-color: #ffcaca;
  }
  .guard-note {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #f7f4ff;
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
    line-height: 1.35;
    padding: 10px 12px;
    margin-bottom: 14px;
  }
  .guard-note code {
    color: var(--purple-dark);
    font-weight: 900;
  }
  .users { display: grid; gap: 10px; }
  .user-row {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    background: #fff;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
  }
  .user-title { font-weight: 900; color: var(--text); }
  .user-meta { margin-top: 4px; color: var(--muted); font-size: 12px; font-weight: 700; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .empty {
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-weight: 800;
  }
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(20, 18, 32, .42);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 20;
  }
  .modal.show { display: flex; }
  .modal-box {
    width: min(100%, 460px);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .modal-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    background: #f5f0ff;
    color: var(--purple-dark);
    font-weight: 900;
    text-transform: uppercase;
  }
  .checks { padding: 14px 16px; display: grid; gap: 9px; }
  .check {
    display: flex;
    align-items: center;
    gap: 9px;
    color: var(--text);
    font-weight: 800;
  }
  .check input { width: auto; }
  .modal-actions {
    padding: 14px 16px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  @media (max-width: 700px) {
    body { padding: 12px; }
    .form, .user-row { grid-template-columns: 1fr; }
    .actions { justify-content: flex-start; }
    .head { align-items: flex-start; flex-direction: column; }
    .back { margin-left: 0; }
  }
</style>
  <script src="nav-helper.js"></script>
  <script src="menu-auth-guard.js?v=20260708-guard3" data-menu-guard="usuarios"></script>
</head>
<body>
<main class="wrap">
  <section class="card">
    <header class="head">
      <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="Corralon Progreso">
      <h1>Usuarios</h1>
      <a class="back" href="menu.html">Volver al menu</a>
    </header>
    <div class="body">
      <div class="guard-note">
        Para cada HTML nuevo del menú, agregar en el head:
        <code>&lt;script src="menu-auth-guard.js?v=20260708-guard3" data-menu-guard="id_del_boton"&gt;&lt;/script&gt;</code>.
        El <code>data-menu-guard</code> tiene que coincidir con el botón/permisos de este panel.
      </div>
      <div class="form">
        <div>
          <label for="userName">Nombre</label>
          <input id="userName" type="text" placeholder="Ej: Vendedor mostrador">
        </div>
        <div>
          <label for="userLogin">Usuario</label>
          <input id="userLogin" type="text" placeholder="vendedor1" autocomplete="off">
        </div>
        <div>
          <label for="userPass">Contrase&ntilde;a</label>
          <input id="userPass" type="text" placeholder="1234" autocomplete="off">
        </div>
        <div>
          <label for="userLevel">Nivel</label>
          <select id="userLevel">
            <option value="administrador">Administrador</option>
            <option value="vendedor">Vendedor</option>
            <option value="personalizado">Personalizado</option>
          </select>
        </div>
        <button class="btn" id="saveUser" type="button">Guardar</button>
      </div>
      <div id="usersList" class="users"></div>
    </div>
  </section>
</main>

<div id="permissionsModal" class="modal">
  <div class="modal-box">
    <div class="modal-head">Botones visibles</div>
    <div id="permissionChecks" class="checks"></div>
    <div class="modal-actions">
      <button class="btn light" id="cancelPermissions" type="button">Cancelar</button>
      <button class="btn" id="savePermissions" type="button">Guardar permisos</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxwUGX-rVusOI13j7oTfQuAtkeNXdAYH0",
    authDomain: "corralon-progreso.firebaseapp.com",
    projectId: "corralon-progreso",
    storageBucket: "corralon-progreso.firebasestorage.app",
    messagingSenderId: "466583614632",
    appId: "1:466583614632:web:42cb839f83e97475fabe9d"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);
  const MENU_USERS_COLLECTION = 'menuUsuarios';
  const ALL_MENU_IDS = ['lista', 'a_descontar', 'remitos', 'historial', 'comprobantes', 'caja', 'faltantes', 'pedidos', 'actualizar_articulos', 'carga_stock', 'proveedores', 'listas_proveedores', 'diferencias_proveedores', 'admin', 'garantias', 'usuarios', 'calculadoras'];
  const DEFAULT_SELLER_IDS = ['lista', 'remitos', 'admin', 'garantias'];
  const MENU_ITEMS = [
    { id: 'lista', label: 'Lista de precios' },
    { id: 'a_descontar', label: 'A descontar' },
    { id: 'remitos', label: 'Remitos' },
    { id: 'historial', label: 'Historial' },
    { id: 'comprobantes', label: 'Comprobantes' },
    { id: 'caja', label: 'Control de caja' },
    { id: 'faltantes', label: 'Faltantes' },
    { id: 'pedidos', label: 'Pedidos' },
    { id: 'actualizar_articulos', label: 'Actualizar articulos' },
    { id: 'carga_stock', label: 'Carga stock' },
    { id: 'proveedores', label: 'Proveedores' },
    { id: 'listas_proveedores', label: 'Comparar listas' },
    { id: 'diferencias_proveedores', label: 'Diferencias proveedores' },
    { id: 'admin', label: 'Administrar pagina' },
    { id: 'garantias', label: 'Garantias' },
    { id: 'usuarios', label: 'Usuarios' },
    { id: 'calculadoras', label: 'Calculadoras' }
  ];

  const els = {
    name: document.getElementById('userName'),
    login: document.getElementById('userLogin'),
    pass: document.getElementById('userPass'),
    level: document.getElementById('userLevel'),
    save: document.getElementById('saveUser'),
    list: document.getElementById('usersList'),
    modal: document.getElementById('permissionsModal'),
    checks: document.getElementById('permissionChecks'),
    cancelPermissions: document.getElementById('cancelPermissions'),
    savePermissions: document.getElementById('savePermissions')
  };

  let users = [];
  let editingId = '';
  let permissionsEditingId = '';
  let draftPermisos = DEFAULT_SELLER_IDS.slice();

  function defaultUsers() {
    return [
      { id: 'admin', nombre: 'Administrador', usuario: 'admin', password: 'Akashiya2301', nivel: 'administrador', permisos: ALL_MENU_IDS },
      { id: 'vendedor', nombre: 'Vendedor', usuario: 'vendedor', password: '1234', nivel: 'vendedor', permisos: DEFAULT_SELLER_IDS }
    ];
  }

  async function readUsers() {
    try {
      const snap = await getDocs(collection(db, MENU_USERS_COLLECTION));
      const parsed = snap.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
      if (parsed.length) {
        return parsed.map((user) => ({
          ...user,
          usuario: user.usuario || String(user.nombre || '').toLowerCase().replace(/\s+/g, '') || user.id,
          password: user.password || (user.id === 'admin' ? 'Akashiya2301' : '1234')
        }));
      }
    } catch (e) {
      console.error('No se pudieron leer usuarios desde Firebase', e);
    }
    const defaults = defaultUsers();
    await Promise.all(defaults.map((user) => setDoc(doc(db, MENU_USERS_COLLECTION, user.id), user)));
    return defaults;
  }

  async function saveUser(user) {
    await setDoc(doc(db, MENU_USERS_COLLECTION, user.id), user);
  }

  function userPermissions(user) {
    if (user.nivel === 'administrador') return ALL_MENU_IDS;
    if (user.nivel === 'vendedor') return DEFAULT_SELLER_IDS;
    return Array.isArray(user.permisos) ? user.permisos : [];
  }

  function permissionLabels(user) {
    const permisos = new Set(userPermissions(user));
    return MENU_ITEMS.filter((item) => permisos.has(item.id)).map((item) => item.label).join(', ') || 'Sin botones';
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function resetForm() {
    editingId = '';
    draftPermisos = DEFAULT_SELLER_IDS.slice();
    els.name.value = '';
    els.login.value = '';
    els.pass.value = '';
    els.level.value = 'vendedor';
    els.save.textContent = 'Guardar';
  }

  function renderUsers() {
    if (!users.length) {
      els.list.innerHTML = '<div class="empty">No hay usuarios cargados.</div>';
      return;
    }
    els.list.innerHTML = users.map((user) => `
      <div class="user-row">
        <div>
          <div class="user-title">${escapeHtml(user.nombre)}</div>
          <div class="user-meta">Usuario: ${escapeHtml(user.usuario || '-')} · Contraseña: ${escapeHtml(user.password || '-')} · Nivel: ${escapeHtml(user.nivel)} · Botones: ${escapeHtml(permissionLabels(user))}</div>
        </div>
        <div class="actions">
          <button class="btn light" type="button" data-action="edit" data-id="${user.id}">Editar</button>
          <button class="btn light" type="button" data-action="permissions" data-id="${user.id}">Botones</button>
          <button class="btn danger" type="button" data-action="delete" data-id="${user.id}">Eliminar</button>
        </div>
      </div>
    `).join('');
  }

  function currentDefaultPermissions(level) {
    if (level === 'administrador') return ALL_MENU_IDS;
    if (level === 'vendedor') return DEFAULT_SELLER_IDS;
    return DEFAULT_SELLER_IDS;
  }

  async function saveUserFromForm() {
    const nombre = els.name.value.trim();
    const usuario = els.login.value.trim();
    const password = els.pass.value.trim();
    const nivel = els.level.value;
    if (!nombre) {
      els.name.focus();
      return;
    }
    if (!usuario) {
      els.login.focus();
      return;
    }
    if (!password) {
      els.pass.focus();
      return;
    }
    const usuarioDuplicado = users.some((user) => user.id !== editingId && String(user.usuario || '').trim().toLowerCase() === usuario.toLowerCase());
    if (usuarioDuplicado) {
      alert('Ya existe un usuario con ese nombre de acceso.');
      els.login.focus();
      return;
    }
    if (editingId) {
      let updatedUser = null;
      users = users.map((user) => {
        if (user.id !== editingId) return user;
        updatedUser = { ...user, nombre, usuario, password, nivel, permisos: nivel === 'personalizado' ? userPermissions(user) : currentDefaultPermissions(nivel) };
        return updatedUser;
      });
      await saveUser(updatedUser);
    } else {
      const nuevo = {
        id: `user_${Date.now()}`,
        nombre,
        usuario,
        password,
        nivel,
        permisos: nivel === 'personalizado' ? draftPermisos.slice() : currentDefaultPermissions(nivel)
      };
      users.push(nuevo);
      await saveUser(nuevo);
    }
    resetForm();
    renderUsers();
  }

  function editUser(id) {
    const user = users.find((item) => item.id === id);
    if (!user) return;
    editingId = id;
    els.name.value = user.nombre;
    els.login.value = user.usuario || '';
    els.pass.value = user.password || '';
    els.level.value = user.nivel;
    els.save.textContent = 'Actualizar';
    els.name.focus();
  }

  async function deleteUser(id) {
    if (users.length <= 1) return;
    users = users.filter((item) => item.id !== id);
    await deleteDoc(doc(db, MENU_USERS_COLLECTION, id));
    renderUsers();
  }

  function openPermissions(id) {
    const user = users.find((item) => item.id === id);
    if (!user) return;
    permissionsEditingId = id;
    const permisos = new Set(userPermissions(user));
    els.checks.innerHTML = MENU_ITEMS.map((item) => `
      <label class="check">
        <input type="checkbox" value="${item.id}" ${permisos.has(item.id) ? 'checked' : ''}>
        <span>${item.label}</span>
      </label>
    `).join('');
    els.modal.classList.add('show');
  }

  function openDraftPermissions() {
    permissionsEditingId = '__draft__';
    const permisos = new Set(draftPermisos);
    els.checks.innerHTML = MENU_ITEMS.map((item) => `
      <label class="check">
        <input type="checkbox" value="${item.id}" ${permisos.has(item.id) ? 'checked' : ''}>
        <span>${item.label}</span>
      </label>
    `).join('');
    els.modal.classList.add('show');
  }

  async function savePermissions() {
    const permisos = [...els.checks.querySelectorAll('input:checked')].map((input) => input.value);
    if (permissionsEditingId === '__draft__') {
      draftPermisos = permisos;
      permissionsEditingId = '';
      els.modal.classList.remove('show');
      return;
    }
    let updatedUser = null;
    users = users.map((user) => {
      if (user.id !== permissionsEditingId) return user;
      updatedUser = { ...user, nivel: 'personalizado', permisos };
      return updatedUser;
    });
    await saveUser(updatedUser);
    permissionsEditingId = '';
    els.modal.classList.remove('show');
    renderUsers();
  }

  els.save.addEventListener('click', saveUserFromForm);
  els.level.addEventListener('change', () => {
    if (els.level.value === 'personalizado') {
      if (editingId) openPermissions(editingId);
      else openDraftPermissions();
    } else {
      draftPermisos = currentDefaultPermissions(els.level.value).slice();
    }
  });
  els.list.addEventListener('click', (event) => {
    const button = event.target.closest('button[data-action]');
    if (!button) return;
    const { action, id } = button.dataset;
    if (action === 'edit') editUser(id);
    if (action === 'delete') deleteUser(id);
    if (action === 'permissions') openPermissions(id);
  });
  els.cancelPermissions.addEventListener('click', () => els.modal.classList.remove('show'));
  els.savePermissions.addEventListener('click', savePermissions);
  els.modal.addEventListener('click', (event) => {
    if (event.target === els.modal) els.modal.classList.remove('show');
  });

  async function inicializarUsuarios() {
    els.list.innerHTML = '<div class="empty">Cargando usuarios...</div>';
    users = await readUsers();
    renderUsers();
  }

  inicializarUsuarios();
</script>
</body>
</html>
