<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>One Piece</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="shell">
    <section class="player-pane">
      <div class="topbar">
        <div>
          <p class="eyebrow">Corralon Progreso</p>
          <h1>One Piece</h1>
        </div>
        <div class="status-pill" id="authStatus">Cargando</div>
      </div>

      <div class="video-wrap">
        <video id="video" controls playsinline preload="metadata"></video>
        <iframe id="driveFrame" title="Reproductor Drive" allow="autoplay; fullscreen" allowfullscreen hidden></iframe>
      </div>

      <div class="now-playing">
        <div>
          <p class="eyebrow">Reproduciendo</p>
          <h2 id="nowTitle">Elegí un capítulo</h2>
          <p id="nowMeta">Reproducción directa desde Drive con progreso guardado en Firebase.</p>
        </div>
        <div class="actions">
          <button id="playSelected" class="primary">Cargar y reproducir</button>
          <button id="clearCache">Limpiar caché</button>
        </div>
      </div>

      <div class="meters">
        <div>
          <div class="meter-head">
            <span id="downloadLabel">Descarga actual</span>
            <strong id="downloadText">0%</strong>
          </div>
          <div class="bar"><span id="downloadBar"></span></div>
        </div>
        <div>
          <div class="meter-head">
            <span id="preloadLabel">Siguiente capítulo</span>
            <strong id="preloadText">Esperando</strong>
          </div>
          <div class="bar"><span id="preloadBar"></span></div>
        </div>
      </div>
    </section>

    <aside class="catalog-pane">
      <div class="catalog-head">
        <div>
          <p class="eyebrow">Catálogo</p>
          <h2>Capítulos</h2>
        </div>
        <button id="connectDrive">Drive</button>
      </div>
      <div class="setup-warning" id="setupWarning">
        Cargando catálogo y conexión con Firebase...
      </div>
      <div id="episodeList" class="episode-list"></div>
    </aside>
  </main>

  <div class="login-bg" id="loginBg">
    <section class="login-box">
      <h2>Validación de Ingreso</h2>
      <label for="loginUserInput">Usuario</label>
      <input type="text" id="loginUserInput" autocomplete="username">
      <div class="login-users" id="loginUsersList"></div>
      <label for="loginInput">Clave</label>
      <input type="password" id="loginInput" autocomplete="current-password">
      <label class="remember">
        <input type="checkbox" id="rememberLogin" checked>
        <span>Recordar ingreso</span>
      </label>
      <div class="login-actions">
        <button class="primary" id="loginBtn" type="button">Ingresar</button>
      </div>
      <p class="login-error" id="loginError"></p>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../config.js"></script>
  <script src="../episodes.js"></script>
  <script src="../app.js"></script>
</body>
</html>
