<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Corralón Progreso — Remitos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rojo: #e50000; --rojo2: #c0392b; --violeta: #6c4fc7;
  --borde: #c8c0e8; --fila-header: #d0c8f0; --fila-body: #e8e4f8;
  --texto-dark: #1a1a2e; --sombra: 0 2px 12px rgba(108,79,199,0.13);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Barlow', sans-serif; display: flex; flex-direction: column; height: 100dvh; background-color: #f0ece8; position: relative; }
body::before { content: ''; position: fixed; inset: 0; background-color: #f0ece8; background-image: radial-gradient(ellipse at 15% 25%, rgba(255,255,255,0.92) 0%, transparent 55%); z-index: 0; }

/* HEADER */
.header { position: relative; z-index: 5; background: #fff; border-bottom: 2px solid var(--borde); padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; box-shadow: var(--sombra); }
.header img { height: 38px; width: auto; }
.header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; color: var(--rojo); text-transform: uppercase; letter-spacing: 1px; flex: 1; }
.header-sub { font-size: 11px; color: #888; }

/* DATOS */
.remito-datos { position: relative; z-index: 5; background: #fff; border-bottom: 1px solid var(--borde); padding: 10px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex-shrink: 0; }
.dato-field { display: flex; flex-direction: column; gap: 3px; }
.dato-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; }
.dato-input { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--texto-dark); border: none; background: #f5f3ff; border-radius: 8px; padding: 6px 10px; outline: none; width: 100%; border: 1.5px solid transparent; transition: border-color .2s; }
.dato-input:focus { border-color: var(--violeta); }

/* DATE PICKER */
.dp-popup { position: fixed; z-index: 9999; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(108,79,199,0.18); border: 1.5px solid var(--borde); padding: 16px; width: 280px; display: none; }
.dp-popup.open { display: block; }
.dp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.dp-mes { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--violeta); }
.dp-nav { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--violeta); padding: 2px 8px; border-radius: 6px; }
.dp-nav:hover { background: var(--fila-header); }
.dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.dp-day-name { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: #aaa; text-align: center; padding: 4px 0; }
.dp-day { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; text-align: center; padding: 6px 2px; border-radius: 6px; cursor: pointer; color: var(--texto-dark); }
.dp-day:hover { background: var(--fila-header); }
.dp-day.hoy { background: var(--fila-body); font-weight: 700; color: var(--violeta); }
.dp-day.seleccionado { background: var(--violeta); color: #fff; font-weight: 700; }

/* TABLA */
.tabla-header { position: relative; z-index: 5; background: var(--fila-header); border-bottom: 2px solid var(--borde); padding: 7px 10px; display: grid; grid-template-columns: 50px 1fr 80px 80px 32px; gap: 6px; align-items: center; flex-shrink: 0; }
.th { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; color: var(--violeta); text-transform: uppercase; letter-spacing: 0.5px; }

/* LISTA */
.items-list { flex: 1; overflow-y: auto; position: relative; z-index: 1; padding-bottom: 120px; }
.item-row { background: #fff; border-bottom: 1px solid var(--borde); padding: 6px 10px; display: grid; grid-template-columns: 50px 1fr 80px 80px 32px; gap: 6px; align-items: center; }
.item-row:nth-child(even) { background: var(--fila-body); }
.item-input { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; color: var(--texto-dark); border: none; background: transparent; outline: none; width: 100%; padding: 2px 4px; border-radius: 4px; transition: background .15s; }
.item-input:focus { background: rgba(108,79,199,.08); }
.item-input.num { text-align: right; }
.item-subtotal { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--violeta); text-align: right; }
.btn-del-item { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 2px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.btn-del-item:hover { color: var(--rojo); }

/* FILA AGREGAR */
.fila-agregar { background: rgba(108,79,199,.05); border-bottom: 1px dashed var(--borde); padding: 6px 10px; display: grid; grid-template-columns: 50px 1fr 80px 80px 32px; gap: 6px; align-items: center; }
.inp { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: var(--texto-dark); border: none; background: transparent; outline: none; width: 100%; padding: 2px 4px; border-radius: 4px; }
.inp:focus { background: rgba(108,79,199,.08); }
.inp::placeholder { color: #ccc; font-style: italic; }
.inp.num { text-align: right; }
.sub-preview { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: #bbb; text-align: right; }
.btn-add { background: var(--violeta); border: none; color: #fff; font-size: 18px; cursor: pointer; border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.btn-add:hover { opacity: .8; }

/* TOTAL */
.total-bar { position: fixed; bottom: 56px; left: 0; right: 0; z-index: 8; background: #fff; border-top: 2px solid var(--borde); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -2px 12px rgba(108,79,199,.1); }
.total-label { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.total-valor { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; color: var(--violeta); }

/* FRANJA */
.franja-roja { position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: linear-gradient(135deg, var(--rojo) 0%, var(--rojo2) 100%); z-index: 10; border-radius: 26px 26px 0 0; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 10px; }
.btn-f { background: rgba(255,255,255,.18); border: none; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; cursor: pointer; padding: 7px 12px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }
.btn-f:hover { background: rgba(255,255,255,.28); }
.btn-f.prim { background: rgba(255,255,255,.95); color: var(--rojo2); }

/* HISTORIAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: flex-end; }
.modal-bg.open { display: flex; }
.modal-panel { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
.modal-head { padding: 14px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; color: var(--texto-dark); text-transform: uppercase; letter-spacing: 1px; }
.modal-body { overflow-y: auto; flex: 1; }
.h-item { padding: 12px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; gap: 10px; }
.h-item:nth-child(even) { background: var(--fila-body); }
.h-nro { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: var(--violeta); min-width: 90px; }
.h-info { flex: 1; min-width: 0; }
.h-cliente { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--texto-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-meta { font-size: 11px; color: #999; margin-top: 2px; }
.h-total { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--violeta); flex-shrink: 0; }
.btn-pdf { background: var(--violeta); color: #fff; border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; cursor: pointer; flex-shrink: 0; }
.h-empty { text-align: center; padding: 40px 20px; color: #bbb; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; }

/* TOAST */
.toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--texto-dark); color: #fff; padding: 10px 20px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; z-index: 300; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .3s; }
.toast.show { opacity: 1; pointer-events: auto; }

/* CONFIRM POPUP */
.confirm-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 250; display: none; align-items: center; justify-content: center; padding: 20px; }
.confirm-bg.open { display: flex; }
.confirm-box { background: #fff; border-radius: 18px; padding: 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: var(--sombra); }
.confirm-icon { font-size: 36px; margin-bottom: 10px; }
.confirm-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; color: var(--texto-dark); text-transform: uppercase; margin-bottom: 8px; }
.confirm-sub { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; }
.btn-confirm-cancel { flex: 1; padding: 12px; border: 1.5px solid var(--borde); border-radius: 10px; background: transparent; color: #888; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-confirm-ok { flex: 2; padding: 12px; border: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; color: #fff; }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: #f0ece8; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 400; display: none; }
.loading-overlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 4px solid #d0c8f0; border-top-color: var(--violeta); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { color: var(--violeta); font-size: 16px; letter-spacing: 1px; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; }

/* PRINT */
@media print {
  body { background: #fff; }
  body::before { display: none; }
  .franja-roja, .total-bar, .fila-agregar, .btn-del-item { display: none !important; }
  .items-list { overflow: visible; padding-bottom: 0; }
  .dato-input { background: transparent; border: none; }
  .item-input { background: transparent; }
  .print-total { display: flex !important; }
}
.print-total { display: none; border-top: 2px solid #333; margin-top: 8px; padding-top: 8px; justify-content: flex-end; gap: 16px; align-items: center; padding-right: 10px; }
.print-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: #333; }
.print-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--violeta); }
</style>
</head>
<body>

<div class="header">
  <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="Logo">
  <div>
    <div class="header-title">Corralón Progreso</div>

  </div>
</div>

<div class="remito-datos">
  <div class="dato-field" style="grid-column:1/3">
    <div class="dato-label">Cliente</div>

<div class="tabla-header">

</div>

<div class="print-total">

</div>

</div>

<div class="franja-roja">

  <button class="btn-f" onclick="descargarPDF()">⬇ PDF</button>
  <button class="btn-f" onclick="enviarWhatsapp()">💬 WhatsApp</button>

</div>

<!-- HISTORIAL -->
<div class="modal-bg" id="modalHistorial" onclick="if(event.target===this)cerrarHistorial()">
  <div class="modal-panel">
    <div class="modal-head">
      <span class="modal-title">📋 Historial de remitos</span>
      <button onclick="cerrarHistorial()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;">✕</button>

</div>

<!-- CONFIRM POPUP -->
<div class="confirm-bg" id="confirmBg">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">⚠️</div>
    <div class="confirm-title" id="confirmTitle">¿Confirmar?</div>
    <div class="confirm-sub" id="confirmSub">Esta acción dará el remito como terminado.</div>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="cerrarConfirm()">Cancelar</button>

<!-- DATE PICKER -->

</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-txt">Generando remito...</div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL     = 'https://tizyjenayrcdkcodsjnc.supabase.co';
const SUPABASE_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpenlqZW5heXJjZGtjb2Rzam5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE4MDYsImV4cCI6MjA4NzgwNzgwNn0.Xue8zgo8QJiKTErtzfUOgpczMngsAaePJZqLvA8Z7oI';
const SUPABASE_BUCKET  = 'Archivos';
const WA_NUM           = '542645533544';

// ── ESTADO ──────────────────────────────────────────────────────
let items = [];

// ── UTILS ──────────────────────────────────────────────────────
function fmt(n) {
  return '$ ' + Number(n).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function loading(show) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
}

// ── ITEMS ──────────────────────────────────────────────────────
function renderItems() {
  const lista = document.getElementById('itemsList');
  const fila  = document.getElementById('filaAgregar');
  lista.querySelectorAll('.item-row').forEach(r => r.remove());
  items.forEach((it, i) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <input type="text" class="item-input num" value="${it.cant}" inputmode="numeric" pattern="[0-9]*"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        onchange="items[${i}].cant=parseFloat(this.value)||1;recalc()">
      <input type="text" class="item-input" value="${it.desc}"
        onchange="items[${i}].desc=this.value">
      <input type="text" class="item-input num" value="${it.precio}" inputmode="numeric"
        onchange="items[${i}].precio=parseFloat(this.value)||0;recalc()">
      <div class="item-subtotal">${fmt(it.precio*it.cant)}</div>
      <button class="btn-del-item" onclick="items.splice(${i},1);renderItems()">✕</button>`;
    lista.insertBefore(row, fila);
  });
  recalc();
}

// ── NAVEGACIÓN CON FLECHAS ──────────────────────────────────────
document.addEventListener('keydown', e => {
  const KEYS = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
  if(!KEYS.includes(e.key)) return;
  const active = document.activeElement;
  if(!active) return;

  const rows      = [...document.querySelectorAll('.item-row')];
  const agInputs  = [document.getElementById('nCant'), document.getElementById('nDesc'), document.getElementById('nPrecio')];
  const COL_COUNT = 3;

  function focusCell(rowIdx, colIdx) {
    colIdx = Math.max(0, Math.min(COL_COUNT - 1, colIdx));
    if(rowIdx === rows.length) {
      agInputs[colIdx] && agInputs[colIdx].focus();
    } else if(rowIdx >= 0 && rowIdx < rows.length) {
      const ins = [...rows[rowIdx].querySelectorAll('.item-input')];
      ins[colIdx] && ins[colIdx].focus();
    }
  }

  // Navegación en filas de ítems
  if(active.classList.contains('item-input')) {
    const row    = active.closest('.item-row');
    if(!row) return;
    const rowIdx = rows.indexOf(row);
    const colIdx = [...row.querySelectorAll('.item-input')].indexOf(active);

    if(e.key === 'ArrowDown') {
      e.preventDefault();
      focusCell(rowIdx + 1, colIdx);
    } else if(e.key === 'ArrowUp') {
      e.preventDefault();
      if(rowIdx > 0) focusCell(rowIdx - 1, colIdx);
    } else if(e.key === 'ArrowRight' && active.selectionStart === active.value.length) {
      e.preventDefault();
      if(colIdx < COL_COUNT - 1) focusCell(rowIdx, colIdx + 1);
      else focusCell(rowIdx + 1, 0);
    } else if(e.key === 'ArrowLeft' && active.selectionStart === 0) {
      e.preventDefault();
      if(colIdx > 0) focusCell(rowIdx, colIdx - 1);
      else if(rowIdx > 0) focusCell(rowIdx - 1, COL_COUNT - 1);
    }
    return;
  }

  // Navegación desde la fila agregar
  const agIdx = agInputs.indexOf(active);
  if(agIdx === -1) return;

  if(e.key === 'ArrowUp' && rows.length > 0) {
    e.preventDefault();
    focusCell(rows.length - 1, agIdx);
  } else if(e.key === 'ArrowRight' && active.selectionStart === active.value.length && agIdx < COL_COUNT - 1) {
    e.preventDefault();
    agInputs[agIdx + 1].focus();
  } else if(e.key === 'ArrowLeft' && active.selectionStart === 0 && agIdx > 0) {
    e.preventDefault();
    agInputs[agIdx - 1].focus();
  }
});

function recalc() {
  const total = items.reduce((s,it) => s + it.precio * it.cant, 0);
  document.getElementById('totalValor').textContent  = fmt(total);
  document.getElementById('printTotal').textContent  = fmt(total);
  document.querySelectorAll('.item-row').forEach((row, i) => {
    const sub = row.querySelector('.item-subtotal');
    if(sub && items[i]) sub.textContent = fmt(items[i].precio * items[i].cant);
  });
}

function updatePreview() {
  const p = parseFloat(document.getElementById('nPrecio').value) || 0;
  const c = parseFloat(document.getElementById('nCant').value)  || 1;
  const sub = document.getElementById('nSub');
  if(p) { sub.textContent = fmt(p*c); sub.style.color = 'var(--violeta)'; }
  else  { sub.textContent = '—';      sub.style.color = '#bbb'; }
}

function agregarItem() {
  const cant  = parseFloat(document.getElementById('nCant').value)  || 1;
  const desc  = document.getElementById('nDesc').value.trim();
  const precio= parseFloat(document.getElementById('nPrecio').value) || 0;
  if(!desc && !precio) return;
  items.push({cant, desc, precio});
  document.getElementById('nCant').value  = '';
  document.getElementById('nDesc').value  = '';
  document.getElementById('nPrecio').value= '';
  document.getElementById('nSub').textContent = '—';
  document.getElementById('nSub').style.color = '#bbb';
  renderItems();
  setTimeout(() => document.getElementById('nCant').focus(), 30);
}

function navAgregar(e, campo) {
  if(e.key !== 'Enter' && e.key !== 'Tab') return;
  e.preventDefault();
  if(campo === 'nCant')   document.getElementById('nDesc').focus();
  else if(campo === 'nDesc')  document.getElementById('nPrecio').focus();
  else if(campo === 'nPrecio') { updatePreview(); agregarItem(); }
}

// ── DATE PICKER ──────────────────────────────────────────────────
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS  = ['Lu','Ma','Mi','Ju','Vi','Sa','Do'];
let dpY, dpM, dpSel = null;

function initDp() {
  const hoy = new Date();
  dpY = hoy.getFullYear(); dpM = hoy.getMonth();
  document.getElementById('fechaInput').value = '';
  renderDp();
}

function parseFecha(val) {
  if(!val.trim()) return;
  const parts = val.trim().split(/[\s\/\-]/).filter(Boolean);
  if(parts.length < 2) return;
  const d = parseInt(parts[0]), m = parseInt(parts[1]);
  let y = parts[2] ? parseInt(parts[2]) : new Date().getFullYear();
  if(y < 100) y = 2000 + y;
  if(!d||!m||d<1||d>31||m<1||m>12) return;
  dpSel = new Date(y, m-1, d); dpY = y; dpM = m-1;
  document.getElementById('fechaInput').value =
    String(d).padStart(2,'0') + '/' + String(m).padStart(2,'0') + '/' + y;
}

function toggleDp() {
  const popup = document.getElementById('dpPopup');
  const open  = popup.classList.toggle('open');
  if(open) {
    renderDp();
    const btn  = document.querySelector('[onclick="toggleDp()"]');
    const rect = btn.getBoundingClientRect();
    popup.style.top  = (rect.bottom + 4) + 'px';
    popup.style.left = Math.max(4, rect.right - 280) + 'px';
  }
}

function dpNav(dir) {
  dpM += dir;
  if(dpM < 0)  { dpM = 11; dpY--; }
  if(dpM > 11) { dpM = 0;  dpY++; }
  renderDp();
}

function renderDp() {
  document.getElementById('dpMes').textContent = MESES[dpM] + ' ' + dpY;
  const grid = document.getElementById('dpGrid');
  grid.innerHTML = DIAS.map(d => `<div class="dp-day-name">${d}</div>`).join('');
  let inicio = new Date(dpY, dpM, 1).getDay() - 1;
  if(inicio < 0) inicio = 6;
  for(let i=0; i<inicio; i++) grid.innerHTML += `<div></div>`;
  const diasMes = new Date(dpY, dpM+1, 0).getDate();
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  for(let d=1; d<=diasMes; d++) {
    const f = new Date(dpY, dpM, d);
    const esHoy = f.getTime() === hoy.getTime();
    const esSel = dpSel && f.getTime() === new Date(dpSel.getFullYear(), dpSel.getMonth(), dpSel.getDate()).getTime();
    grid.innerHTML += `<div class="dp-day${esHoy?' hoy':''}${esSel?' seleccionado':''}" onclick="selDia(${d})">${d}</div>`;
  }
}

function selDia(d) {
  dpSel = new Date(dpY, dpM, d);
  document.getElementById('fechaInput').value =
    String(d).padStart(2,'0') + '/' + String(dpM+1).padStart(2,'0') + '/' + dpY;
  document.getElementById('dpPopup').classList.remove('open');
}

document.addEventListener('click', e => {
  const popup = document.getElementById('dpPopup');
  const btn   = document.querySelector('[onclick="toggleDp()"]');
  if(!popup.contains(e.target) && e.target !== btn) popup.classList.remove('open');
});

// ── NÚMERO DE REMITO DESDE SUPABASE ─────────────────────────────
async function cargarNroRemito() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/remitos?select=nro&order=id.desc&limit=1`, {
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
    });
    const data = await res.json();
    let nro = 1;
    if(Array.isArray(data) && data.length) {
      const ultimo = parseInt((data[0].nro || '').split('-').pop() || '0');
      nro = ultimo + 1;
    }
    document.getElementById('nroRemito').textContent = String(nro).padStart(5,'0');
    return nro;
  } catch(e) {
    const local = parseInt(localStorage.getItem('nroRemito')||'0') + 1;
    document.getElementById('nroRemito').textContent = String(local).padStart(5,'0');
    return local;
  }
}

// ── HISTORIAL ──────────────────────────────────────────────────
async function abrirHistorial() {
  document.getElementById('modalHistorial').classList.add('open');
  const body = document.getElementById('historialBody');
  body.innerHTML = '<div class="h-empty">Cargando...</div>';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/remitos?select=*&order=id.desc&limit=50`, {
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
    });
    const data = await res.json();
    if(!Array.isArray(data) || !data.length) { body.innerHTML = '<div class="h-empty">Sin remitos todavía</div>'; return; }
    body.innerHTML = data.map(r => `
      <div class="h-item">
        <div class="h-nro">${r.nro||'—'}</div>
        <div class="h-info">
          <div class="h-cliente">${r.cliente||'—'}</div>
          <div class="h-meta">${r.fecha||''}</div>
        </div>
        <div class="h-total">$${Number(r.total||0).toLocaleString('es-AR')}</div>
        ${r.link_pdf ? `<button class="btn-pdf" onclick="window.open('${r.link_pdf}','_blank')">PDF</button>` : ''}
      </div>`).join('');
  } catch(e) { body.innerHTML = '<div class="h-empty">Error cargando historial</div>'; }
}

function cerrarHistorial() {
  document.getElementById('modalHistorial').classList.remove('open');
}

// ── GENERAR PDF ──────────────────────────────────────────────────
function generarPDFDoc(cliente, fecha, nro, total) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  if(window._logo) doc.addImage(window._logo, 'PNG', 15, 10, 40, 16);
  doc.setFontSize(18); doc.setFont(undefined,'bold');
  doc.text('CORRALÓN PROGRESO', 105, 18, {align:'center'});
  doc.setFontSize(11); doc.setFont(undefined,'normal');
  doc.text('Remito de venta', 105, 25, {align:'center'});
  doc.text('Fecha: ' + fecha, 195, 18, {align:'right'});
  doc.text('N° Remito: 0001-' + nro, 195, 25, {align:'right'});
  doc.line(15, 30, 195, 30);
  let y = 40;
  doc.setFontSize(11); doc.setFont(undefined,'bold');
  doc.text('Cliente: ' + cliente, 15, y); y += 12;
  doc.setFillColor(208,200,240); doc.rect(15, y-6, 180, 8, 'F');
  doc.setFontSize(10);
  doc.text('Cant.', 17, y); doc.text('Descripción', 40, y);
  doc.text('Precio unit.', 140, y, {align:'right'}); doc.text('Subtotal', 195, y, {align:'right'});
  y += 4; doc.line(15, y, 195, y); y += 7;
  doc.setFont(undefined,'normal');
  items.forEach((it, i) => {
    if(i%2===0) { doc.setFillColor(232,228,248); doc.rect(15, y-5, 180, 7, 'F'); }
    doc.text(String(it.cant), 17, y);
    doc.text(it.desc.substring(0,55), 40, y);
    doc.text('$' + Number(it.precio).toLocaleString('es-AR'), 140, y, {align:'right'});
    doc.text('$' + Number(it.precio*it.cant).toLocaleString('es-AR'), 195, y, {align:'right'});
    y += 8;
  });
  doc.line(15, y, 195, y); y += 8;
  doc.setFontSize(13); doc.setFont(undefined,'bold');
  doc.text('TOTAL: $' + Number(total).toLocaleString('es-AR'), 195, y, {align:'right'});
  return doc;
}

// ── CONFIRM POPUP ──────────────────────────────────────────────
let _confirmCallback = null;

function pedirConfirm(opts) {
  // opts: { icon, titulo, sub, btnColor, callback }
  document.getElementById('confirmIcon').textContent  = opts.icon  || '⚠️';
  document.getElementById('confirmTitle').textContent = opts.titulo || '¿Confirmar?';
  document.getElementById('confirmSub').textContent   = opts.sub   || 'Esta acción dará el remito como terminado.';
  document.getElementById('confirmOkBtn').style.background = opts.color || 'var(--violeta)';
  document.getElementById('confirmOkBtn').textContent = opts.btnTxt || 'Confirmar';
  _confirmCallback = opts.callback;
  document.getElementById('confirmBg').classList.add('open');
}
function cerrarConfirm() {
  document.getElementById('confirmBg').classList.remove('open');
  _confirmCallback = null;
}
function ejecutarConfirm() {
  const cb = _confirmCallback;
  cerrarConfirm();
  if(cb) cb();
}

// ── GUARDAR EN SUPABASE ───────────────────────────────────────
async function guardarRemito(nro, cliente, fecha, total, linkPdf) {
  await fetch(`${SUPABASE_URL}/rest/v1/remitos`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'apikey': SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ nro: '0001-' + nro, cliente, fecha, total, link_pdf: linkPdf || null })
  });
  localStorage.setItem('nroRemito', parseInt(nro));
}

// ── ACCIONES ──────────────────────────────────────────────────
function _hacerLimpiar(msg) {
  items = [];
  document.getElementById('cliente').value = '';
  initDp();
  renderItems();
  cargarNroRemito();
  toast(msg || '🗑 Remito eliminado');
}
function limpiarTodo() {
  if(!items.length && !document.getElementById('cliente').value.trim()) { _hacerLimpiar(); return; }
  pedirConfirm({ icon:'🗑', titulo:'Nuevo remito', sub:'Esta acción eliminará el remito actual. ¿Continuar?', color:'var(--rojo)', btnTxt:'Eliminar y crear nuevo', callback: _hacerLimpiar });
}

function imprimir() {
  const cliente = document.getElementById('cliente').value.trim();
  if(!cliente) { toast('⚠️ Ingresá el nombre del cliente'); return; }
  if(!items.length) { toast('⚠️ Agregá al menos un artículo'); return; }
  pedirConfirm({ icon:'🖨', titulo:'Imprimir remito', sub:'Esta acción dará el remito como terminado. ¿Imprimimos?', color:'var(--violeta)', btnTxt:'Imprimir', callback: async () => {
    const fecha  = document.getElementById('fechaInput').value || new Date().toLocaleDateString('es-AR');
    const nro    = document.getElementById('nroRemito').textContent || '00001';
    const total  = items.reduce((s,it) => s + it.precio*it.cant, 0);
    window.print();
    try { await guardarRemito(nro, cliente, fecha, total, null); } catch(e) {}
    setTimeout(_hacerLimpiar, 800);
  }});
}

async function _hacerDescargarPDF() {
  const cliente = document.getElementById('cliente').value.trim();
  const fecha   = document.getElementById('fechaInput').value || new Date().toLocaleDateString('es-AR');
  const nro     = document.getElementById('nroRemito').textContent || '00001';
  const total   = items.reduce((s,it) => s + it.precio*it.cant, 0);
  loading(true);
  try {
    const doc = generarPDFDoc(cliente, fecha, nro, total);
    doc.save('Remito-0001-' + nro + '-' + cliente.replace(/\s+/g,'_') + '.pdf');
    await guardarRemito(nro, cliente, fecha, total, null);
  } catch(e) { toast('❌ Error guardando: ' + e.message); }
  loading(false);
  setTimeout(_hacerLimpiar, 400);
}
async function descargarPDF() {
  const cliente = document.getElementById('cliente').value.trim();
  if(!cliente) { toast('⚠️ Ingresá el nombre del cliente'); return; }
  if(!items.length) { toast('⚠️ Agregá al menos un artículo'); return; }
  pedirConfirm({ icon:'⬇️', titulo:'Descargar PDF', sub:'Esta acción dará el remito como terminado. ¿Descargamos el PDF?', color:'var(--rojo)', btnTxt:'Descargar', callback: _hacerDescargarPDF });
}

async function _hacerEnviarWhatsapp() {
  const cliente = document.getElementById('cliente').value.trim();
  const fecha   = document.getElementById('fechaInput').value || new Date().toLocaleDateString('es-AR');
  const nro     = document.getElementById('nroRemito').textContent || '00001';
  loading(true);
  try {
    const total = items.reduce((s,it) => s + it.precio*it.cant, 0);
    const doc = generarPDFDoc(cliente, fecha, nro, total);
    const pdfBlob = doc.output('blob', {type:'application/pdf'});

    const nombreArchivo = 'remitos/Remito-0001-' + nro + '-' + cliente.replace(/\s+/g,'_') + '.pdf';
    const resUp = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${nombreArchivo}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/pdf', 'x-upsert': 'true' },
      body: pdfBlob
    });
    if(!resUp.ok) throw new Error('Error subiendo PDF');
    const linkPDF = `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${nombreArchivo}`;

    await guardarRemito(nro, cliente, fecha, total, linkPDF);

    const msg = '🏗 *Remito N° 0001-' + nro + '*\n📅 ' + fecha + '\n👤 ' + cliente + '\n\n📄 Ver remito:\n' + linkPDF + '\n\n*TOTAL: $' + Number(total).toLocaleString('es-AR') + '*';
    loading(false);
    window.open('https://wa.me/' + WA_NUM + '?text=' + encodeURIComponent(msg), '_blank');
    setTimeout(() => { limpiarTodo(); }, 600);
  } catch(e) {
    loading(false);
    toast('❌ Error: ' + e.message);
  }
}

async function enviarWhatsapp() {
  const cliente = document.getElementById('cliente').value.trim();
  if(!cliente) { toast('⚠️ Ingresá el nombre del cliente'); return; }
  if(!items.length) { toast('⚠️ Agregá al menos un artículo'); return; }
  pedirConfirm({ icon:'💬', titulo:'Enviar por WhatsApp', sub:'Esta acción dará el remito como terminado y lo enviará por WhatsApp.', color:'#25d366', btnTxt:'Enviar', callback: _hacerEnviarWhatsapp });
}
