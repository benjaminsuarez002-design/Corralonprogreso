*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

function fmt(n) {
  return '$ ' + Number(n).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function parseMonto(valor) {
  let texto = String(valor ?? '').trim();
  if(!texto) return 0;
  texto = texto.replace(/\$/g, '').replace(/\s+/g, '');
  const tieneComa = texto.includes(',');
  const tienePunto = texto.includes('.');
  if(tieneComa) {
    texto = texto.replace(/\./g, '').replace(',', '.');
  } else if(tienePunto) {
    const partes = texto.split('.');
    if(partes.length > 2 || partes[partes.length - 1].length === 3) texto = texto.replace(/\./g, '');
  }
  return Number.parseFloat(texto.replace(/[^0-9.-]/g, '')) || 0;
}
function rawMoneyTextFromValue(value) {
  const n = parseMonto(value);
  if(!n) return '';
  return String(n).replace('.', ',').replace(/,00$/, '');
}
function formatMoneyLiveRaw(raw, final = false) {
  raw = String(raw || '').replace(/\./g, ',').replace(/[^0-9,]/g, '');
  const parts = raw.split(',');
  const intDigits = (parts[0] || '').replace(/^0+(?=\d)/, '') || '0';
  const decimals = parts.length > 1 ? parts.slice(1).join('').replace(/\D/g, '').slice(0, 2) : '';
  if(final) return fmt(parseMonto(`${intDigits}${decimals ? ',' + decimals : ''}`));
  return `$ ${Number(intDigits || 0).toLocaleString('es-AR', { maximumFractionDigits: 0 })}${parts.length > 1 ? ',' + decimals : ''}`;
}
function setMoneyLiveValue(input, raw, final = false) {
  input.dataset.moneyRaw = raw;
  input.value = raw ? formatMoneyLiveRaw(raw, final) : '';
}
function handleMoneyLiveKey(event) {
  const input = event.target.closest?.('.money-live');
  if(!input || event.ctrlKey || event.altKey || event.metaKey) return false;
  if(['Tab','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','F2','Escape'].includes(event.key)) return false;
  let raw = input.dataset.moneyRaw ?? rawMoneyTextFromValue(input.value);
  const selected = input.selectionStart === 0 && input.selectionEnd === String(input.value || '').length;
  if(/^\d$/.test(event.key)) {
    event.preventDefault();
    if(selected) raw = '';
    if(raw.includes(',')) {
      const [intPart, decPart = ''] = raw.split(',');
      raw = `${intPart},${(decPart + event.key).slice(0, 2)}`;
    } else {
      raw += event.key;
    }
    setMoneyLiveValue(input, raw);
    return true;
  }
  if(event.key === ',' || event.key === '.') {
    event.preventDefault();
    if(selected) raw = '';
    if(!raw.includes(',')) raw = `${raw || '0'},`;
    setMoneyLiveValue(input, raw);
    return true;
  }
  if(event.key === 'Backspace') {
    event.preventDefault();
    raw = selected ? '' : raw.slice(0, -1);
    setMoneyLiveValue(input, raw);
    return true;
  }
  if(event.key === 'Delete') {
    event.preventDefault();
    setMoneyLiveValue(input, '');
    return true;
  }
  return false;
}
function finalizeMoneyLive(input) {
  if(!input?.classList?.contains('money-live')) return;
  if(!String(input.value || '').trim()) {
    setMoneyLiveValue(input, '');
    return;
  }
  const raw = input.dataset.moneyRaw ?? rawMoneyTextFromValue(input.value);
  setMoneyLiveValue(input, raw, true);
}

// ── NAVEGACIÓN CON ENTER Y FLECHAS ──────────────────────────────
function remitoCamposNavegables() {
  return [
    document.getElementById('cliente'),
    document.getElementById('fechaInput'),
    ...document.querySelectorAll('.item-row .item-input:not([readonly])'),
    document.getElementById('nCant'),
    document.getElementById('nDesc'),
    document.getElementById('nPrecio'),
    document.getElementById('nSub')
  ].filter(Boolean);
}

function esCampoNavegable(el) {
  return el?.matches?.('.dato-input, .item-input, .inp');
}

function seleccionarCampo(el) {
  if(!el) return false;
  el.focus();
  requestAnimationFrame(() => {
    if(typeof el.select === 'function') el.select();
  });
  return true;
}

function campoTodoSeleccionado(el) {
  return !!el && el.selectionStart === 0 && el.selectionEnd === String(el.value || '').length;
}

function moverCampo(actual, delta) {
  const campos = remitoCamposNavegables();
  const idx = campos.indexOf(actual);
  if(idx < 0) return false;
  const target = campos[Math.max(0, Math.min(campos.length - 1, idx + delta))];
  if(!target || target === actual) return false;
  seleccionarCampo(target);
  return true;
}

function moverCampoVertical(actual, delta) {
  const cols = 4;
  const agInputs = [document.getElementById('nCant'), document.getElementById('nDesc'), document.getElementById('nPrecio'), document.getElementById('nSub')];
  const rows = [...document.querySelectorAll('.item-row')];
  const agIdx = agInputs.indexOf(actual);
  if(agIdx >= 0) {
    if(delta < 0 && rows.length) {
      const ins = [...rows[rows.length - 1].querySelectorAll('.item-input')];
      return seleccionarCampo(ins[agIdx]);
    }
    return false;
  }
  const row = actual.closest('.item-row');
  if(!row) return false;
  const rowIdx = rows.indexOf(row);
  const colIdx = [...row.querySelectorAll('.item-input')].indexOf(actual);
  const nextRow = rowIdx + delta;
  if(nextRow >= 0 && nextRow < rows.length) {
    return seleccionarCampo(rows[nextRow].querySelectorAll('.item-input')[colIdx]);
  }
  if(nextRow === rows.length) return seleccionarCampo(agInputs[Math.min(cols - 1, colIdx)]);
  return false;
}

function moverDesdePrecioRemito(precioInput) {
  const row = precioInput?.closest?.('.item-row');
  if(!row) return false;
  const rowInputs = [...row.querySelectorAll('.item-input')];
  const cantidadInput = rowInputs[0];
  const subtotalInput = rowInputs[3];
  const cantidad = parseMonto(cantidadInput?.value);
  const precio = parseMonto(precioInput.value);
  actualizarItemDesdeCampo([...document.querySelectorAll('.item-row')].indexOf(row), 'precio', precioInput);
  if(cantidad && precio) {
    const nextRow = row.nextElementSibling?.classList?.contains('item-row') ? row.nextElementSibling : null;
    const nextCantidad = nextRow ? nextRow.querySelectorAll('.item-input')[0] : document.getElementById('nCant');
    return seleccionarCampo(nextCantidad);
  }
  return seleccionarCampo(subtotalInput);
}

function manejarEnterRemito(event, target) {
  if(!['Enter','Tab'].includes(event.key) || !esCampoNavegable(target)) return false;
  event.preventDefault();
  if(target.id === 'fechaInput') parseFecha(target.value);
  if(target.id === 'nPrecio' && !event.shiftKey) {
    updatePreview('precio');
    if(parseMonto(document.getElementById('nCant')?.value) && parseMonto(target.value)) {
      agregarItem();
      return seleccionarCampo(document.getElementById('nCant'));
    }
    return seleccionarCampo(document.getElementById('nSub'));
  }
  if(target.matches('.item-row .item-input') && [...target.closest('.item-row').querySelectorAll('.item-input')].indexOf(target) === 2 && !event.shiftKey) {
    return moverDesdePrecioRemito(target);
  }
  if(target.id === 'nSub' && !event.shiftKey) {
    updatePreview('subtotal');
    agregarItem();
    return true;
  }
  moverCampo(target, event.shiftKey ? -1 : 1);
  return true;
}

function manejarFlechasRemito(event, target) {
  if(!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(event.key) || !esCampoNavegable(target)) return false;
  const allSelected = campoTodoSeleccionado(target);
  if(event.key === 'ArrowLeft') {
    if(!allSelected) return false;
    event.preventDefault();
    return moverCampo(target, -1);
  }
  if(event.key === 'ArrowRight') {
    if(!allSelected) return false;
    event.preventDefault();
    return moverCampo(target, 1);
  }
  if(!allSelected) return false;
  event.preventDefault();
  return moverCampoVertical(target, event.key === 'ArrowDown' ? 1 : -1);
}

document.addEventListener('keydown', e => {
  const target = document.activeElement;
  if(!target) return;
  if(handleMoneyLiveKey(e)) {
    if(target.id === 'nPrecio') updatePreview('precio');
    return;
  }
  if(e.key === 'F2' && esCampoNavegable(target)) {
    e.preventDefault();
    if(campoTodoSeleccionado(target)) {
      const pos = String(target.value || '').length;
      try { target.setSelectionRange(pos, pos); } catch(_) {}
    } else {
      seleccionarCampo(target);
    }
    return;
  }
  if(manejarEnterRemito(e, target)) return;
  manejarFlechasRemito(e, target);
});
document.addEventListener('focusin', e => {
  if(e.target.matches?.('.money-live')) e.target.dataset.moneyRaw = rawMoneyTextFromValue(e.target.value);

document.addEventListener('focusout', e => {

function recalc() {
  const total = items.reduce((s,it) => s + it.precio * it.cant, 0);
  document.getElementById('totalValor').textContent  = fmt(total);
  document.getElementById('printTotal').textContent  = fmt(total);
  document.querySelectorAll('.item-row').forEach((row, i) => {
    const sub = row.querySelectorAll('.item-input')[3];
    if(sub && items[i] && document.activeElement !== sub) sub.value = fmt(items[i].precio * items[i].cant);
  });
  saveRemitoDraft();
}

function actualizarItemDesdeCampo(i, campo, input) {
  const it = items[i];
  if(!it) return;
  const row = input.closest('.item-row');
  const inputs = row ? [...row.querySelectorAll('.item-input')] : [];
  if(campo === 'cant') it.cant = parseMonto(input.value) || 0;
  if(campo === 'precio') it.precio = parseMonto(input.value);
  if(campo === 'subtotal') {
    const subtotal = parseMonto(input.value);
    if(subtotal && it.cant && !it.precio) it.precio = subtotal / it.cant;
    else if(subtotal && !it.cant && it.precio) it.cant = subtotal / it.precio;
  } else {
    const subtotalInput = inputs[3];
    if(subtotalInput && it.cant && it.precio) subtotalInput.value = fmt(it.cant * it.precio);
  }
  input.value = campo === 'cant' ? (it.cant || '') : fmt(campo === 'subtotal' ? ((it.cant || 0) * (it.precio || 0)) : it.precio);
  if(campo === 'precio') input.dataset.moneyRaw = rawMoneyTextFromValue(input.value);
  renderItems();
}

function updatePreview(campo = 'precio') {
  const cantEl = document.getElementById('nCant');
  const precioEl = document.getElementById('nPrecio');
  const subEl = document.getElementById('nSub');
  let c = parseMonto(cantEl.value);
  let p = parseMonto(precioEl.value);
  let s = parseMonto(subEl.value);
  if(campo === 'subtotal') {
    if(s && c && !p) p = s / c;
    else if(s && !c && p) c = s / p;
    if(c && p) s = c * p;
  } else if(c && p) {
    s = c * p;
  }
  if(campo !== 'cant' && c) cantEl.value = c;
  if(campo !== 'precio' && p) {
    precioEl.value = fmt(p);
    precioEl.dataset.moneyRaw = rawMoneyTextFromValue(precioEl.value);
  }
  if(campo !== 'subtotal') {
    subEl.value = c && p ? fmt(s) : '';
  }
  const bloquearSubtotal = Boolean(c && p);
  subEl.readOnly = bloquearSubtotal;
  subEl.tabIndex = bloquearSubtotal ? -1 : 0;
}

function hayArticuloPendiente() {

function limpiarFilaAgregar() {
  const cantEl = document.getElementById('nCant');
  const descEl = document.getElementById('nDesc');
  const precioEl = document.getElementById('nPrecio');
  const subEl = document.getElementById('nSub');
  cantEl.value = '';
  descEl.value = '';
  precioEl.value = '';
  subEl.value = '';
  delete precioEl.dataset.moneyRaw;
  subEl.readOnly = false;
  subEl.tabIndex = 0;
}

function agregarItem() {
  const subEl = document.getElementById('nSub');
  if(subEl.value.trim() && !subEl.readOnly) updatePreview('subtotal');
  const cant  = parseMonto(document.getElementById('nCant').value)  || 1;
  const desc  = document.getElementById('nDesc').value.trim();
  let precio= parseMonto(document.getElementById('nPrecio').value);
  const subtotal = parseMonto(document.getElementById('nSub').value);
  if(!precio && subtotal) precio = subtotal / cant;
  if(!desc && !precio) return;
  items.push({cant, desc, precio});
  limpiarFilaAgregar();
  renderItems();
  setTimeout(() => document.getElementById('nCant').focus(), 30);
}

const REMITO_DIGITS = 8;
function remitoShort(value) {
  const raw = String(value ?? '').split('-').pop() || '';
  const n = parseInt(raw.replace(/\D/g, ''), 10) || 0;
  return String(n).padStart(REMITO_DIGITS, '0');
}
function remitoFull(value) {
  return '0001-' + remitoShort(value);
}
async function contarRemitosGuardados() {

    headers: {
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'apikey': SUPABASE_KEY
    }
  });
  if(!res.ok) throw new Error(await res.text());
  const data = await res.json();
  return (Array.isArray(data) ? data : []).reduce((max, row) => {
    const n = parseInt(String(row.nro || '').split('-').pop().replace(/\D/g, ''), 10) || 0;
    return n > 0 && n < 10000 ? Math.max(max, n) : max;
  }, 0);
}

async function guardarRemito(nro, cliente, fecha, total, linkPdf, itemsAGuardar) {

  // 1. Guardar remito
  const res = await fetch(`${SUPABASE_URL}/rest/v1/remitos`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'apikey': SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({ nro: remitoFull(nroShort), cliente, fecha, total, link_pdf: linkPdf || null })
  });
  const data = await res.json();
  const remitoId = Array.isArray(data) && data[0] ? data[0].id : null;

  // 2. Guardar ítems si tenemos el id del remito
  if(remitoId && itemsAGuardar && itemsAGuardar.length) {
    const itemsPayload = itemsAGuardar.map(it => ({
      remito_id: remitoId,
      cant: it.cant,
      descripcion: it.desc,
      precio: it.precio
    }));
    await fetch(`${SUPABASE_URL}/rest/v1/items_remito`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(itemsPayload)
    });
  }

  localStorage.setItem('nroRemito', parseInt(nroShort, 10));
  return remitoId;
}

let _confirmCallback = null;

function pedirConfirm(opts) {
  document.getElementById('confirmIcon').textContent  = opts.icon  || '⚠️';
  document.getElementById('confirmTitle').textContent = opts.titulo || '¿Confirmar?';
  document.getElementById('confirmSub').textContent   = opts.sub   || 'Esta acción dará el remito como terminado.';
  document.getElementById('confirmOkBtn').style.background = opts.color || 'var(--violeta)';
  document.getElementById('confirmOkBtn').textContent = opts.btnTxt || 'Confirmar';
  _confirmCallback = opts.callback;
  document.getElementById('confirmBg').classList.add('open');
}
function cerrarConfirm() {
  document.getElementById('confirmBg').classList.remove('open');
  _confirmCallback = null;
}
function ejecutarConfirm() {
  const cb = _confirmCallback;
  cerrarConfirm();
  if(cb) cb();
}

// ── ACCIONES ──────────────────────────────────────────────────
function _hacerLimpiar(msg) {
  const wasDraftReady = remitoDraftReady;
  remitoDraftReady = false;
  items = [];
  document.getElementById('cliente').value = '';
  limpiarFilaAgregar();
  clearRemitoDraft();
  initDp();
  renderItems();
  remitoDraftReady = wasDraftReady;
  cargarNroRemito();
  refrescarNroRemitoSiCorresponde(true).catch(() => {});
  toast(msg || '🗑 Remito eliminado');
}
function limpiarTodo() {
  if(!items.length && !document.getElementById('cliente').value.trim()) { _hacerLimpiar(); return; }
  pedirConfirm({ icon:'🗑', titulo:'Nuevo remito', sub:'Esta acción eliminará el remito actual. ¿Continuar?', color:'var(--rojo)', btnTxt:'Eliminar y crear nuevo', callback: _hacerLimpiar });
}

function nombreArchivoRemito(remito) {
  const cliente = (remito.cliente || 'Cliente').replace(/[\\/:*?"<>|]+/g, '').trim() || 'Cliente';
  const nro = remitoFull(remito.nro).replace(/[\\/:*?"<>|]+/g, '-');
  return `${cliente} - ${nro}`;
}

function escapeHtml(txt) {
  return String(txt ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[ch]));
}

function generarDocRemitoConfirmado(remito) {
  return generarPDFDoc(remito.cliente, remito.fecha, remito.nro, remito.total, remito.items);
}

function prepararRemitoDesdeFormulario() {
  confirmarArticuloPendiente();
  const cliente = document.getElementById('cliente').value.trim();
  if(!cliente) { toast('⚠️ Ingresá el nombre del cliente'); return null; }
  if(!items.length) { toast('⚠️ Agregá al menos un artículo'); return null; }
  const fecha = document.getElementById('fechaInput').value || new Date().toLocaleDateString('es-AR');
  const nro = document.getElementById('nroRemito').textContent || remitoShort(1);
  const itemsSnapshot = items.map(it => ({
    cant: Number(it.cant) || 0,
    desc: it.desc || '',
    precio: Number(it.precio) || 0
  }));
  const total = itemsSnapshot.reduce((s,it) => s + it.precio * it.cant, 0);
  return { cliente, fecha, nro, total, items: itemsSnapshot };
}

function abrirRemitoActions(remito) {
  const info = document.getElementById('remitoActionsInfo');
  info.innerHTML = `
    <strong>Remito:</strong> ${remitoFull(remito.nro)}<br>
    <strong>Cliente:</strong> ${escapeHtml(remito.cliente)}<br>
    <strong>Total:</strong> ${fmt(remito.total)}
  `;
  document.getElementById('remitoActionsBg').classList.add('open');
}

function cerrarRemitoActions() {
  document.getElementById('remitoActionsBg').classList.remove('open');
}

async function confirmarRemitoFinal() {
  await refrescarNroRemitoSiCorresponde(true).catch(() => {});
  const remito = prepararRemitoDesdeFormulario();
  if(!remito) return;
  loading(true);
  try {
    const remitoId = await guardarRemito(remito.nro, remito.cliente, remito.fecha, remito.total, null, remito.items);
    remitoConfirmadoActual = { ...remito, id: remitoId };
    await guardarNotificacionRemito(remitoConfirmadoActual);
    clearRemitoDraft();
    _hacerLimpiar('Remito guardado');
    abrirRemitoActions(remitoConfirmadoActual);
  } catch(e) {
    toast('Error guardando: ' + e.message);
  } finally {
    loading(false);
  }
}

function descargarRemitoConfirmado() {
  if(!remitoConfirmadoActual) { toast('No hay remito confirmado'); return; }
  const doc = generarDocRemitoConfirmado(remitoConfirmadoActual);
  doc.save(nombreArchivoRemito(remitoConfirmadoActual) + '.pdf');
}

function imprimirRemitoConfirmado() {
  if(!remitoConfirmadoActual) { toast('No hay remito confirmado'); return; }
  resolverNotificacionRemito(remitoConfirmadoActual);
  const doc = generarDocRemitoConfirmado(remitoConfirmadoActual);
  const pdfBlob = doc.output('blob', { type: 'application/pdf' });
  const pdfUrl = URL.createObjectURL(pdfBlob);
  const popup = window.open(pdfUrl, '_blank');
  if(!popup) {
    toast('Permití las ventanas emergentes para abrir el PDF');
    URL.revokeObjectURL(pdfUrl);
    return;
  }
  setTimeout(() => URL.revokeObjectURL(pdfUrl), 60000);
}

function whatsappRemitoConfirmado() {
  if(!remitoConfirmadoActual) { toast('No hay remito confirmado'); return; }
  const msg = 'Realice el siguiente remito: ' + remitoFull(remitoConfirmadoActual.nro) + '.';
  window.open('https://wa.me/' + WA_NUM + '?text=' + encodeURIComponent(msg), '_blank');
}

async function _hacerVerPDF() {
  const cliente = document.getElementById('cliente').value.trim();
  const fecha   = document.getElementById('fechaInput').value || new Date().toLocaleDateString('es-AR');
  const nro     = document.getElementById('nroRemito').textContent || remitoShort(1);
  const total   = items.reduce((s,it) => s + it.precio*it.cant, 0);
  loading(true);
  try {
    const doc = generarPDFDoc(cliente, fecha, nro, total);
    window.PresupuestoShared.openPdfPreview(
      doc,
      `${cliente || 'Cliente'} - ${remitoFull(nro)} - ${fecha}`,
      `${cliente || 'Cliente'}-${remitoFull(nro)}-${fecha}`
    );
    await guardarRemito(nro, cliente, fecha, total, null, items);
  } catch(e) { toast('❌ Error guardando: ' + e.message); }
  loading(false);
  setTimeout(_hacerLimpiar, 400);
}
async function verPDF() {
  const cliente = document.getElementById('cliente').value.trim();
  if(!cliente) { toast('⚠️ Ingresá el nombre del cliente'); return; }
  if(!items.length) { toast('⚠️ Agregá al menos un artículo'); return; }
  pedirConfirm({ icon:'📄', titulo:'Ver PDF', sub:'Esta acción dará el remito como terminado. ¿Abrimos el PDF?', color:'var(--rojo)', btnTxt:'Ver PDF', callback: _hacerVerPDF });
}

async function _hacerEnviarWhatsapp() {
  const cliente = document.getElementById('cliente').value.trim();
  const fecha   = document.getElementById('fechaInput').value || new Date().toLocaleDateString('es-AR');
  const nro     = document.getElementById('nroRemito').textContent || remitoShort(1);
  loading(true);
  try {
    const total = items.reduce((s,it) => s + it.precio*it.cant, 0);
    await guardarRemito(nro, cliente, fecha, total, null, items);
    const msg = 'Realice el siguiente remito: ' + remitoFull(nro) + '.';
    loading(false);
    window.open('https://wa.me/' + WA_NUM + '?text=' + encodeURIComponent(msg), '_blank');
    setTimeout(() => { _hacerLimpiar('✅ Remito guardado'); }, 600);
  } catch(e) {
    loading(false);
    toast('❌ Error: ' + e.message);
  }
}

async function enviarWhatsapp() {
  const cliente = document.getElementById('cliente').value.trim();
  if(!cliente) { toast('⚠️ Ingresá el nombre del cliente'); return; }
  if(!items.length) { toast('⚠️ Agregá al menos un artículo'); return; }
  pedirConfirm({ icon:'💬', titulo:'Enviar por WhatsApp', sub:'Esta acción dará el remito como terminado y avisará el número por WhatsApp.', color:'#25d366', btnTxt:'Enviar', callback: _hacerEnviarWhatsapp });
}

// ── INIT ──────────────────────────────────────────────────────
initDp();
renderItems();
restoreRemitoDraft();
remitoDraftReady = true;
saveRemitoDraft();
cargarNroRemito();
iniciarAutoRefreshNroRemito();

// Precargar logo
window.PresupuestoShared.ensureLogoDataUrl(document.querySelector('.header img').src).then(dataUrl => {
  logoCacheData = dataUrl;
});

document.addEventListener('focusin', e => {
  const filaAgregar = document.getElementById('filaAgregar');
  if(!filaAgregar || filaAgregar.contains(e.target)) return;
  confirmarArticuloPendiente();
});
document.addEventListener('input', e => {
  if(e.target.matches?.('#cliente,#fechaInput,#nCant,#nDesc,#nPrecio,#nSub,.item-input')) saveRemitoDraft();
});

document.addEventListener('pointerdown', e => {
  const filaAgregar = document.getElementById('filaAgregar');
  if(!filaAgregar || filaAgregar.contains(e.target)) return;
  confirmarArticuloPendiente();
}, true);
