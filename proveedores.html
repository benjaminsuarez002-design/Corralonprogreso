<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proveedores</title>
  <link rel="icon" type="image/x-icon" href="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/icono-corralon-Photoroom.ico">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;900&family=Barlow:wght@500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="corralon-system.js"></script>
  <style>
    *{box-sizing:border-box}
    :root{--red:#8b7cff;--red2:#5d55c8;--line:#8bc7ff;--soft:#eef8ff;--bg:#f6fcff;--text:#20223a;--muted:#6d7190}
    html,body{margin:0;height:100%;overflow:hidden}
    body{font-family:Barlow,Arial,sans-serif;color:var(--text);background:linear-gradient(135deg,#f7feff,#f5f1ff 72%,#fff)}
    .app{height:100dvh;display:grid;grid-template-rows:52px 1fr}
    header{display:flex;align-items:center;gap:14px;padding:0 24px;background:rgba(255,255,255,.84);color:var(--text);box-shadow:0 12px 34px rgba(81,129,255,.14);border-bottom:1px solid #d8ecff;backdrop-filter:blur(10px)}
    header img{width:34px;background:#fff;border-radius:3px}
    h1{font:900 30px 'Barlow Condensed';margin:0}
    .actions{margin-left:auto;display:flex;gap:10px;align-items:center}
    .status{font-weight:800;font-size:13px;opacity:.9}
    button{height:34px;border:1px solid var(--red2);border-radius:7px;background:#fff;color:var(--red2);font:800 17px 'Barlow Condensed';padding:5px 14px;cursor:pointer;box-shadow:0 2px 5px #0002}
    button.primary{background:linear-gradient(#e84d5b,var(--red));color:#fff}
    main{padding:18px 24px;display:grid;grid-template-rows:auto 1fr;gap:14px;min-height:0}
    .filters{display:grid;grid-template-columns:160px 1fr 180px 180px auto;max-width:1220px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
    .cell{border-right:1px solid #f0c0c6}.cell:last-child{border-right:0}
    .label{height:26px;background:var(--soft);padding:4px 7px;color:var(--muted);font:700 18px 'Barlow Condensed'}
    input{width:100%;height:30px;border:0;outline:0;padding:4px 7px;font:17px 'Barlow Condensed';color:var(--text)}
    .table{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff;display:grid;grid-template-rows:30px 1fr;min-height:0}
    .head,.row{display:grid;grid-template-columns:44px 120px minmax(260px,1fr) 140px 140px 150px 160px 160px}
    .head{background:var(--soft);font:800 17px 'Barlow Condensed';color:var(--red2);padding-right:14px}
    .head div,.row div{padding:4px 7px;border-right:1px solid #f0c0c6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .body{overflow:auto}.row{height:26px;border-bottom:1px solid #eee;font-size:15px}.row:nth-child(even){background:#fff7f8}.row.selected{background:#ffd7dc}
    .money{text-align:right;font-variant-numeric:tabular-nums}.hidden{display:none}
    .edit-btn{width:30px;height:22px;border:0;background:transparent;box-shadow:none;padding:0;color:var(--red2);font-size:17px;line-height:1}
    .new-cell{display:flex;align-items:end;padding:4px;background:#fff}
    .new-provider-btn{height:30px;white-space:nowrap}
    .modal-backdrop{position:fixed;inset:0;background:#0005;display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
    .modal-backdrop.visible{display:flex}
    .modal{width:min(760px,100%);background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 24px 70px #0004;overflow:hidden}
    .modal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--soft);border-bottom:1px solid #f0c0c6;color:var(--red2);font:900 22px 'Barlow Condensed'}
    .modal-grid{display:grid;grid-template-columns:150px 1fr 150px 1fr;gap:10px;padding:16px}
    .modal-grid label{font:800 16px 'Barlow Condensed';color:var(--muted);align-self:center}
    .modal-grid input,.modal-grid textarea{border:1px solid #f0c0c6;border-radius:6px;height:32px}
    .modal-grid input[type="checkbox"]{width:18px;height:18px;padding:0;justify-self:start}
    .modal-grid textarea{grid-column:2 / 5;height:64px;resize:none}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;padding:12px 16px;border-top:1px solid #f0c0c6}
  </style>
  <script src="nav-helper.js"></script>
</head>
<body>
<div class="app">
  <header>
    <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="">
    <h1>Proveedores</h1>
    <div class="actions">
      <span class="status" id="status">Inicializando...</span>
      <button data-nav-url="menu.html">Menu</button>
    </div>
  </header>
  <main>
    <section class="filters">
      <div class="cell"><div class="label">Filtrar ID</div><input id="filterId"></div>
      <div class="cell"><div class="label">Filtrar proveedor</div><input id="filterName"></div>
      <div class="cell"><div class="label">Desc. lista</div><input id="filterDiscount"></div>
      <div class="cell"><div class="label">Ult. actualizacion</div><input id="filterDate"></div>
      <div class="new-cell"><button class="primary new-provider-btn" id="newProviderBtn" type="button">Nuevo proveedor</button></div>
    </section>
    <section class="table">
      <div class="head"><div></div><div>ID</div><div>Proveedor</div><div>Desc. factura</div><div>Desc. lista</div><div>Ultima act.</div><div>Vendedor</div><div>Telefono</div></div>
      <div class="body" id="rows"></div>
    </section>
  </main>
</div>
<div class="modal-backdrop" id="providerModal">
  <form class="modal" id="providerForm">
    <div class="modal-head"><span id="modalTitle">Proveedor</span><button type="button" id="closeModalBtn">×</button></div>
    <div class="modal-grid">
      <label>IDProveedor</label><input id="editId" required>
      <label>Proveedor</label><input id="editName" required>
      <label>Desc. factura</label><input id="editDiscountInvoice" inputmode="decimal">
      <label>Desc. lista</label><input id="editDiscountList" inputmode="decimal">
      <label>Ultima act.</label><input id="editDate" type="date">
      <label>Vendedor</label><input id="editSeller">
      <label>Telefono</label><input id="editPhone">
      <label>Porc. flete</label><input id="editFreightPercent" inputmode="decimal">
      <label>Porc. IVA</label><input id="editIvaPercent" inputmode="decimal">
      <label>Iva incluido?</label><input id="editIvaIncluded" type="checkbox">
      <label>Nota</label><textarea id="editNote"></textarea>
    </div>
    <div class="modal-actions">
      <button type="button" id="cancelModalBtn">Cancelar</button>
      <button class="primary" type="submit">Guardar</button>
    </div>
  </form>
</div>
<script>
const SUPABASE_URL='https://tizyjenayrcdkcodsjnc.supabase.co';
const REAL_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpenlqZW5heXJjZGtjb2Rzam5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzE4MDYsImV4cCI6MjA4NzgwNzgwNn0.Xue8zgo8QJiKTErtzfUOgpczMngsAaePJZqLvA8Z7oI';
const TABLE='proveedores', META='proveedores_meta', DB='proveedores_cache_v1';
let db, providerRows=[], filtered=[], editingProviderId=null;
const el={status:document.getElementById('status'),rows:document.getElementById('rows'),filterId:filterId,filterName:filterName,filterDiscount:filterDiscount,filterDate:filterDate};
function headers(extra={}){return{apikey:REAL_KEY,Authorization:`Bearer ${REAL_KEY}`,'Content-Type':'application/json',...extra}}
function norm(v){return String(v??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function money(v){return `${(Number(v||0)*100).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}%`}
function dateOnly(v){if(!v)return null; const d=new Date(v); const out=isNaN(d)?String(v).slice(0,10):d.toISOString().slice(0,10); return out ? out : null}
function openDb(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>r.result.createObjectStore('data',{keyPath:'id_proveedor'});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function putAll(data){return CorralonSystem.setProvidersCache(data)}
function getAll(){return CorralonSystem.getProvidersCache()}
function providerFrom(obj){return CorralonSystem.providerFromObject(obj)}
function escapeHtml(value){return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function parsePercentInput(value){let text=String(value??'').replace('%','').replace(',','.').trim();if(!text)return 0;let n=Number(text);if(!Number.isFinite(n))return 0;return Math.abs(n)>1?n/100:n}
function percentInput(value){return (Number(value||0)*100).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function boolInput(value){if(typeof value==='boolean')return value;const text=norm(value);return ['-1','1','true','si','sí','yes','x'].includes(text)}
function providerUpdatedDisplay(p){const value=p?.updated_at||p?.ultima_actualizacion||'';if(!value)return'';const d=new Date(String(value).replace(' ','T'));return Number.isNaN(d.getTime())?String(value):d.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function render(){const f={id:norm(filterId.value),name:norm(filterName.value),disc:norm(filterDiscount.value),date:norm(filterDate.value)};filtered=providerRows.filter(p=>(!f.id||norm(p.id_proveedor).includes(f.id))&&(!f.name||p.proveedor_norm.includes(f.name))&&(!f.disc||norm(money(p.descuento_lista)).includes(f.disc))&&(!f.date||norm(`${p.ultima_actualizacion||''} ${p.updated_at||''} ${providerUpdatedDisplay(p)}`).includes(f.date))); el.rows.innerHTML=filtered.map(p=>`<div class="row" data-id="${escapeHtml(p.id_proveedor)}"><div><button class="edit-btn" type="button" data-edit="${escapeHtml(p.id_proveedor)}" title="Editar">✎</button></div><div>${escapeHtml(p.id_proveedor)}</div><div title="${escapeHtml(p.proveedor)}">${escapeHtml(p.proveedor)}</div><div class="money">${money(p.descuento_factura)}</div><div class="money">${money(p.descuento_lista)}</div><div>${escapeHtml(providerUpdatedDisplay(p))}</div><div>${escapeHtml(p.vendedor||'')}</div><div>${escapeHtml(p.telefono||'')}</div></div>`).join(''); el.status.textContent=`${filtered.length.toLocaleString('es-AR')} / ${providerRows.length.toLocaleString('es-AR')} proveedores`}
async function importCloud(){el.status.textContent='Importando proveedores...';providerRows=await CorralonSystem.importProvidersCloud();render()}
function openProviderModal(provider=null){editingProviderId=provider?.id_proveedor||null;modalTitle.textContent=provider?'Editar proveedor':'Nuevo proveedor';editId.value=provider?.id_proveedor||'';editId.disabled=Boolean(provider);editName.value=provider?.proveedor||'';editDiscountInvoice.value=percentInput(provider?.descuento_factura);editDiscountList.value=percentInput(provider?.descuento_lista);editDate.value=provider?.ultima_actualizacion||'';editSeller.value=provider?.vendedor||'';editPhone.value=provider?.telefono||'';editFreightPercent.value=percentInput(provider?.porc_flete);editIvaPercent.value=percentInput(provider?.porc_iva);editIvaIncluded.checked=boolInput(provider?.iva_incluido);editNote.value=provider?.nota||'';providerModal.classList.add('visible');setTimeout(()=>provider?editName.focus():editId.focus(),0)}
function closeProviderModal(){providerModal.classList.remove('visible');editingProviderId=null;providerForm.reset();editId.disabled=false}
async function saveProvider(provider){const response=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?on_conflict=id_proveedor`,{method:'POST',headers:headers({Prefer:'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(provider)});if(!response.ok)throw new Error(await response.text());const index=providerRows.findIndex(p=>String(p.id_proveedor)===String(provider.id_proveedor));if(index>=0)providerRows[index]=provider;else providerRows.push(provider);providerRows.sort((a,b)=>String(a.proveedor||'').localeCompare(String(b.proveedor||''),'es'));await CorralonSystem.setProvidersCache(providerRows);render()}
providerForm.addEventListener('submit',async(event)=>{event.preventDefault();const current=providerRows.find(p=>String(p.id_proveedor)===String(editId.value).trim())||{};const provider={...current,id_proveedor:String(editId.value).trim(),proveedor:String(editName.value).trim(),descuento_factura:parsePercentInput(editDiscountInvoice.value),descuento_lista:parsePercentInput(editDiscountList.value),ultima_actualizacion:editDate.value||null,vendedor:String(editSeller.value).trim(),telefono:String(editPhone.value).trim(),nota:String(editNote.value).trim(),proveedor_norm:norm(editName.value),porc_flete:parsePercentInput(editFreightPercent.value),porc_iva:parsePercentInput(editIvaPercent.value),iva_incluido:editIvaIncluded.checked,descuento_total_fc:current.descuento_total_fc??null};if(!provider.id_proveedor||!provider.proveedor)return;try{el.status.textContent='Guardando proveedor...';await saveProvider(provider);closeProviderModal()}catch(error){console.error(error);el.status.textContent='Error guardando proveedor'}});
newProviderBtn.onclick=()=>openProviderModal();
closeModalBtn.onclick=closeProviderModal;cancelModalBtn.onclick=closeProviderModal;providerModal.addEventListener('click',(event)=>{if(event.target===providerModal)closeProviderModal()});
el.rows.addEventListener('click',(event)=>{const btn=event.target.closest('[data-edit]');if(!btn)return;const provider=providerRows.find(p=>String(p.id_proveedor)===String(btn.dataset.edit));if(provider)openProviderModal(provider)});
[filterId,filterName,filterDiscount,filterDate].forEach(i=>{i.oninput=render;i.onfocus=()=>i.select()});
(async()=>{db=await openDb();providerRows=await getAll();render();importCloud().catch(()=>render())})();
</script>
</body>
</html>
