  <style>
    *{box-sizing:border-box}

    .table{border:1px solid var(--line);border-radius:14px;background:#fff;display:grid;grid-template-rows:34px 1fr 26px;min-height:0;overflow:hidden;box-shadow:var(--shadow)}
    .head,.row{display:grid;grid-template-columns:24px 86px 130px 82px 150px minmax(340px,1fr) 82px 130px 130px 72px}
    .head{background:linear-gradient(90deg,var(--soft2),var(--soft));font:900 17px 'Barlow Condensed';color:var(--text);padding-right:14px;border-bottom:1px solid var(--line)}
    .head div{padding:0;border-right:1px solid #d9edff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .row div{padding:0;border-right:1px solid #d9edff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sort-head{width:100%;height:100%;display:flex;align-items:center;justify-content:space-between;gap:6px;border:0;background:transparent;color:inherit;font:inherit;padding:5px 7px;box-shadow:none;border-radius:0;text-align:left}
    .sort-mark{color:var(--accent);font-size:13px;min-width:14px;text-align:center}
    .body{overflow:auto;min-height:0}.row{min-height:30px;border-bottom:1px solid #eef4ff;font-size:16px}.row:nth-child(even){background:var(--row)}.row:hover{background:var(--select)}.row.active{background:#dff7ff}.row.selected{background:#cfefff!important}.row.sync-pending{background:#ffd6d6!important}.row.sync-pending .selector-cell{background:#ffc4c4!important;color:#b00020}
    .selector-cell{display:flex;align-items:center;justify-content:center;background:#f6fbff;color:var(--accent);cursor:default;user-select:none;font-weight:900}.row.selected .selector-cell{background:#bfe6ff}
    .head [data-table-corner]{cursor:pointer;background:linear-gradient(135deg,#f8fcff,#eefbff)}
    .combo-cell{position:relative;display:flex;align-items:center}.combo-cell input{padding-right:30px}.combo-trigger{position:absolute;right:3px;top:3px;width:24px;height:24px;display:none;align-items:center;justify-content:center;padding:0;border:1px solid #b9dcff;border-radius:7px;background:#f8fcff;color:var(--text);font:900 13px Barlow,Arial;box-shadow:none}.combo-cell:focus-within .combo-trigger,.combo-cell.combo-focused .combo-trigger{display:flex}.combo-trigger:hover{background:var(--select)}
    .cell-selected{background:#fff6da!important;box-shadow:inset 0 0 0 2px var(--line2)!important}
    .row input{height:30px;background:transparent;border:0;padding:0 7px;font:16px Barlow,Arial;color:var(--text)}.row input:focus{background:#fff;box-shadow:none}
    .provider-link,input.provider-link{color:#2366d1!important;text-decoration:underline;cursor:pointer}
    .money{text-align:right;font-variant-numeric:tabular-nums}.qty{text-align:right}.pedido-cell{text-align:center}.pedido-cell input{width:18px;height:18px;accent-color:var(--accent)}
    .foot{display:flex;align-items:center;gap:12px;background:#fff;padding:3px 8px;border-top:1px solid #d9edff;color:var(--muted);font-size:13px;font-weight:800}.note{color:var(--green);margin-left:auto}
    .combo-menu{position:fixed;z-index:50;display:none;max-height:280px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:var(--shadow);min-width:360px}
    .combo-menu.visible{display:block}.combo-option{display:grid;grid-template-columns:110px 1fr 150px 110px;gap:8px;padding:6px 8px;border-bottom:1px solid #edf4ff;cursor:pointer;font-size:15px}.combo-option:hover,.combo-option.active{background:var(--select)}.combo-price{text-align:right;color:var(--green);font-weight:800}
    .context-menu{position:fixed;z-index:70;display:none;min-width:190px;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:var(--shadow);padding:5px}.context-menu.visible{display:block}.context-menu button{width:100%;height:32px;border:0;border-radius:7px;box-shadow:none;text-align:left;background:#fff}.context-menu button:hover{background:var(--select)}
    .modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(12,24,48,.28);backdrop-filter:blur(5px)}.modal.visible{display:flex}.modal-card{width:94vw;height:88vh;display:grid;grid-template-rows:auto 1fr;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}.modal-head{display:flex;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(90deg,var(--soft),#fff)}.modal-head h2{margin:0;font:900 27px 'Barlow Condensed';color:var(--text)}.modal-head button{margin-left:auto}.compare-frame{width:83.333%;height:83.333%;border:0;background:#fff;transform:scale(1.2);transform-origin:0 0}
    @media(max-width:900px){.filters{grid-template-columns:1fr}.head,.row{grid-template-columns:24px 84px 110px 78px minmax(120px,150px) minmax(220px,1fr) 70px 110px 110px 64px}.actions .status{display:none}}

<body>
<div class="app">
  <header>
    <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="">
    <h1><span class="title-chip">Faltantes</span></h1>
    <div class="actions"><span class="status" id="status">Inicializando...</span><button id="syncBtn" type="button">Sincronizar</button><button data-nav-url="menu.html">Menu</button></div>
  </header>
  <main>
    <section class="filters">
      <div class="field"><div class="label">Filtrar por Cod Proveedor</div><input id="filterCode" autocomplete="off"></div>
      <div class="field"><div class="label">Filtrar por Articulo</div><input id="filterArticle" autocomplete="off"></div>
      <div class="field"><div class="label">Filtrar por prov</div><input id="filterProvider" autocomplete="off"></div>
      <div class="toggle-card"><label class="toggle-card-row"><input type="checkbox" id="useProviderList"> Filtrar en listas de precio</label><div class="catalog-progress" id="catalogProgress"><div class="catalog-progress-fill" id="catalogProgressFill"></div></div></div>
    </section>
    <section class="table">
      <div class="head">
        <div data-table-corner title="Seleccionar todo"></div>
        <div><button class="sort-head" type="button" data-sort-col="idart"><span>Idart</span><span class="sort-mark" data-sort-mark="idart">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="codProv"><span>CodProv</span><span class="sort-mark" data-sort-mark="codProv">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="filtro"><span>Filtro</span><span class="sort-mark" data-sort-mark="filtro">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="proveedor"><span>Proveedor</span><span class="sort-mark" data-sort-mark="proveedor">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="descripcion"><span>Descripcion</span><span class="sort-mark" data-sort-mark="descripcion">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="cantidad"><span>Canti</span><span class="sort-mark" data-sort-mark="cantidad">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="precioCosto"><span>Precio Costo</span><span class="sort-mark" data-sort-mark="precioCosto">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="precioFinal"><span>Precio final</span><span class="sort-mark" data-sort-mark="precioFinal">-</span></button></div>
        <div><button class="sort-head" type="button" data-sort-col="pedido"><span>Pedido</span><span class="sort-mark" data-sort-mark="pedido">-</span></button></div>
      </div>
      <div class="body" id="rows"></div>
      <div class="foot"><span>Registro:</span><span id="recordInfo">0 de 0</span><span class="note" id="sourceInfo"></span></div>
    </section>
  </main>
</div>
<div class="combo-menu" id="comboMenu"></div>
<div class="context-menu" id="rowContextMenu">
  <button type="button" id="compareSelectedBtn">Comparar</button>
  <button type="button" id="deleteSelectedBtn">Eliminar seleccionado</button>
  <button type="button" id="deletePedidosBtn">Eliminar pedidos</button>
</div>
<div class="modal" id="compareModal">
  <div class="modal-card">
    <div class="modal-head"><h2>Comparar listas</h2><button id="closeCompareBtn" type="button">Cerrar</button></div>
    <iframe class="compare-frame" id="compareFrame" title="Comparar listas"></iframe>
  </div>
</div>
<script>
const FaltantesCore=CorralonSystem.faltantes;
const LOCAL_KEY=FaltantesCore.LOCAL_KEY;
const PAGE=100;
const cols=[1,2,3,4,5,6,9];
let firebaseUnsub=null, catalog=[], catalogCache={index:null,proveedores:null}, catalogByIdart=new Map(), providerRows=[], providerCodeMap=new Map(), rows=[], rendered=PAGE, saveTimer=null, syncTick=0, pendingSync=new Map(), columnFiltro=FaltantesCore.loadColumnFiltro(), activeCell={row:0,col:5}, sortState={col:'id',dir:1}, selectedRows=new Set(), lastSelectedUid='', contextRowUid='', dragSelecting=false, dragMode='select', combo={input:null,rowIndex:-1,active:0,options:[],mode:'article',navigated:false};
const els={status,rows:document.getElementById('rows'),recordInfo,sourceInfo,filterCode,filterArticle,filterProvider,useProviderList,syncBtn:document.getElementById('syncBtn'),comboMenu,rowContextMenu,compareSelectedBtn:document.getElementById('compareSelectedBtn'),deleteSelectedBtn,deletePedidosBtn,compareModal:document.getElementById('compareModal'),compareFrame:document.getElementById('compareFrame'),closeCompareBtn:document.getElementById('closeCompareBtn')};
function norm(v){return CorralonSystem.norm(v)}
function searchNorm(v){return FaltantesCore.searchNorm(v)}
function money(v){return CorralonSystem.money(v)}
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function makeLocalUid(){return FaltantesCore.makeLocalUid()}
function blankRow(){return FaltantesCore.blankRow(columnFiltro,els.useProviderList.checked?'proveedores':'index')}
function isBlank(row){return FaltantesCore.isBlank(row)}
function ensureBlank(){while(rows.length>1&&isBlank(rows[rows.length-1])&&isBlank(rows[rows.length-2]))rows.splice(rows.length-1,1);if(!rows.length||!isBlank(rows[rows.length-1]))rows.push(blankRow())}
function syncColumnFiltro(value=columnFiltro){columnFiltro=String(value??'');localStorage.setItem(`${LOCAL_KEY}_filtro`,columnFiltro);rows.forEach(row=>row.filtro=columnFiltro)}
function syncVisibleFiltroInputs(origin=null){els.rows.querySelectorAll('[data-col="3"]').forEach(input=>{if(input!==origin)input.value=columnFiltro})}
function loadLocal(){rows=FaltantesCore.loadLocalRows();if(!columnFiltro)columnFiltro=rows.find(r=>String(r.filtro||'').trim())?.filtro||'';syncColumnFiltro(columnFiltro)}
function saveLocal(){syncColumnFiltro(columnFiltro);FaltantesCore.saveLocalRows(rows,columnFiltro)}
async function loadRemote(){try{const data=await FaltantesCore.loadRemoteRows();if(data.length){rows=data;if(!columnFiltro)columnFiltro=rows.find(r=>String(r.filtro||'').trim())?.filtro||'';syncColumnFiltro(columnFiltro);sortRows();saveLocal();paint();scrollTableToBottom()}}catch(error){console.warn(error)}}
function gridEditing(){return !!document.activeElement?.closest?.('#rows [data-col]')}
function paintSyncState(){els.rows.querySelectorAll('.row').forEach(rowEl=>rowEl.classList.toggle('sync-pending',pendingSync.has(rowEl.dataset.uid)))}
function markPending(row){if(!row||isBlank(row))return;if(!row.localUid)row.localUid=makeLocalUid();pendingSync.set(row.localUid,++syncTick);paintSyncState()}
function startFirebaseSync(){if(firebaseUnsub)return;firebaseUnsub=FaltantesCore.subscribeRows((remote)=>{if(!remote.length)return;if(pendingSync.size||gridEditing()){paintSyncState();return}rows=remote;if(!columnFiltro)columnFiltro=rows.find(r=>String(r.filtro||'').trim())?.filtro||'';syncColumnFiltro(columnFiltro);sortRows();saveLocal();paint()},console.warn)}
async function saveRemote(){const sent=new Map(pendingSync);if(!sent.size)return;try{await FaltantesCore.saveRows(rows);sent.forEach((version,uid)=>{if(pendingSync.get(uid)===version)pendingSync.delete(uid)});paintSyncState()}catch(error){console.warn(error);paintSyncState()}}
function queueSave(row=null){markPending(row);saveLocal();clearTimeout(saveTimer);saveTimer=setTimeout(saveRemote,650)}
async function loadProviders(){try{providerRows=await FaltantesCore.loadProviderNames()}catch(error){console.warn(error);providerRows=[]}}
async function loadCatalog(force=false){els.status.textContent='Cargando articulos...';const useProviderList=Boolean(els.useProviderList.checked);const loaded=await FaltantesCore.loadCatalog(useProviderList,force?{}:catalogCache,force);catalog=loaded.catalog;catalogByIdart=loaded.byIdart;catalogCache=loaded.cache;if(Array.isArray(catalogCache.proveedores))rebuildProviderCodeMap(catalogCache.proveedores);els.sourceInfo.textContent=`Combo: ${FaltantesCore.catalogSourceLabel(useProviderList)}`;els.status.textContent=`${catalog.length.toLocaleString('es-AR')} articulos disponibles`}
function rebuildIdartMap(rows){const byIdart=new Map();for(const row of rows){const digits=String(row.idart||'').replace(/\D/g,'').padStart(6,'0');if(digits&&!byIdart.has(digits))byIdart.set(digits,row)}return byIdart}
function syncCatalogBackground(){const useProviderList=Boolean(els.useProviderList.checked);FaltantesCore.syncCatalogInBackground(useProviderList,catalogCache,(updated,cache)=>{catalogCache=cache;if(Boolean(els.useProviderList.checked)!==useProviderList)return;catalog=updated;catalogByIdart=rebuildIdartMap(updated);els.sourceInfo.textContent=`Combo: ${FaltantesCore.catalogSourceLabel(useProviderList)} actualizado`;if(!gridEditing()&&!els.comboMenu.classList.contains('visible'))els.status.textContent=`${catalog.length.toLocaleString('es-AR')} articulos disponibles`})}
function warmOppositeCatalog(){const other=!Boolean(els.useProviderList.checked);FaltantesCore.loadCatalog(other,catalogCache,false).then(loaded=>{catalogCache=loaded.cache;FaltantesCore.syncCatalogInBackground(other,catalogCache)}).catch(console.warn)}
let catalogReady=false;
function showCatalogProgress(pct){const p=document.getElementById('catalogProgress'),f=document.getElementById('catalogProgressFill');if(!p||!f)return;if(pct>=100){p.classList.remove('active');f.style.width='0%';return}p.classList.add('active');f.style.width=pct+'%';}
async function startCatalogInit(){showCatalogProgress(1);els.status.textContent='Cargando artículos...';try{await FaltantesCore.loadCorralonCatalog(catalogCache,false)}catch(e){console.warn(e)}showCatalogProgress(5);try{await FaltantesCore.loadProviderCatalogWithProgress(catalogCache,(pct)=>showCatalogProgress(5+pct*0.94));rebuildProviderCodeMap(catalogCache.proveedores);if(!providerCodeMap.size)FaltantesCore.syncCatalogInBackground(true,catalogCache,(updated,cache)=>{catalogCache=cache;rebuildProviderCodeMap(updated)}).catch(console.warn)}catch(e){console.warn(e)}showCatalogProgress(100);catalogReady=true;await loadCatalog(false);syncCatalogBackground();}
function cleanProviderId(value){return String(value??'').trim().replace(/\.0+$/,'')}
function providerDisplay(provider){return String(provider?.proveedor||'').trim()||cleanProviderId(provider?.id_proveedor||provider?.idProveedor||'')}
function providerPageValue(provider){return String(provider?.pagina_link||provider?.pagina||provider?.web||'').trim()}
function providerUrl(value){const text=String(value||'').trim();return text?/^https?:\/\//i.test(text)?text:`https://${text}`:''}
function providerNameOnly(value){return String(value||'').replace(/^\s*\d+\s*[-–]\s*/,'').trim()}
function providerNameFromId(id){const clean=cleanProviderId(id);if(!clean)return'';const found=providerRows.find(item=>cleanProviderId(item.id_proveedor||item.idProveedor)===clean);return String(found?.proveedor||'').trim()}
function providerCodeKey(value){return articleSearchNorm(value).replace(/\s+/g,'')}
function rebuildProviderCodeMap(items=[]){providerCodeMap=new Map();for(const item of items||[]){const code=providerCodeKey(item?.codProv||item?.cod_proveedor||'');if(!code)continue;const id=cleanProviderId(item?.idProveedor||item?.id_proveedor||'');const name=String(item?.proveedor||'').trim()||providerNameFromId(id);if(!name&&!id)continue;const row={idProveedor:id,proveedor:name,descripcion:String(item?.descripcion||item?.articulo||'')};if(!providerCodeMap.has(code))providerCodeMap.set(code,[]);providerCodeMap.get(code).push(row)}}
function providerFromCode(code,item=null){if(!providerCodeMap.size&&Array.isArray(catalogCache.proveedores))rebuildProviderCodeMap(catalogCache.proveedores);const matches=providerCodeMap.get(providerCodeKey(code))||[];if(!matches.length)return null;if(matches.length===1)return matches[0];const targetWords=articleSearchNorm(item?.descripcion||item?.articulo||'').split(' ').filter(word=>word.length>1);let best=null,bestScore=-1;for(const match of matches){const text=articleSearchNorm(match.descripcion);let score=0;for(const word of targetWords){if(text.includes(word))score++}if(text&&articleSearchNorm(item?.descripcion||'')===text)score+=100;if(score>bestScore){bestScore=score;best=match}}return best||matches[0]}
function catalogProviderId(item,row=null){return cleanProviderId(item?.idProveedor||item?.id_proveedor||item?.IDProveedor||item?.idproveedor||item?.idProveed||item?.IDProveed||item?.idproveed||item?.idprov||row?.idProveedor||'')}
function catalogProviderFallbackName(item){return String(item?.proveedor||item?.Proveedor||item?.nombreProveedor||item?.NombreProveedor||item?.proveedor_nombre||item?.nombre_proveedor||item?.razonSocial||item?.razon_social||item?.RazonSocial||'').trim()}
function applyCatalogArticle(row,item){if(!row||!item)return false;const ok=FaltantesCore.applyArticle(row,item,columnFiltro);let id=catalogProviderId(item,row);let name=id?providerNameFromId(id):'';if(item.source==='index'&&!id){const byCode=providerFromCode(item.codProv||item.cod_proveedor||row.codProv||'',item);if(byCode){id=byCode.idProveedor||id;name=byCode.proveedor||name}}if(id)row.idProveedor=id;if(item.source==='index')row.proveedor=name||catalogProviderFallbackName(item)||row.proveedor||'';else row.proveedor=catalogProviderFallbackName(item)||name||row.proveedor||'';return ok}
function providerLinkForText(value,id=''){const cleanId=cleanProviderId(id||String(value||'').match(/^\s*([0-9.]+)\s*[-–]/)?.[1]||'');const name=norm(providerNameOnly(value));const provider=providerRows.find(item=>(cleanId&&cleanProviderId(item.id_proveedor||item.idProveedor)===cleanId)||(name&&norm(item.proveedor)===name));return providerUrl(providerPageValue(provider))}
function providerLinkForRow(row){return providerLinkForText(row?.proveedor||'',row?.idProveedor||row?.id_proveedor||'')}
function openProviderPage(value,id=''){const link=providerLinkForText(value,id);if(!link)return false;window.open(link,'_blank','noopener');return true}
function articleSearchNorm(value){return String(value??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/([0-9]+)([a-z]+)/g,'$1 $2').replace(/([a-z]+)([0-9]+)/g,'$1 $2').replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim()}
function looksLikeProviderCode(value){const q=articleSearchNorm(value);return Boolean(q)&&!/ /.test(q)&&/[0-9]/.test(q)}

document.addEventListener('keydown',event=>{if(event.defaultPrevented)return;if(event.key==='Escape'&&els.compareModal.classList.contains('visible')){event.preventDefault();closeComparePopup();return}if(event.key==='Escape'&&els.comboMenu.classList.contains('visible')){event.preventDefault();hideCombo();return}if(event.key==='F4'){const gridInput=document.activeElement?.closest?.('#rows [data-col]');if(gridInput){const col=Number(gridInput.dataset.col);if(col===5){event.preventDefault();if(els.comboMenu.classList.contains('visible')&&combo.input===gridInput&&combo.mode==='article'){hideCombo();return}showCombo(gridInput,false,'article');return}if(col===4){event.preventDefault();if(els.comboMenu.classList.contains('visible')&&combo.input===gridInput&&combo.mode==='provider'){hideCombo();return}showCombo(gridInput,false,'provider');return}}}if(event.key==='F2'){const input=document.activeElement;if(input?.matches?.('input:not([type="checkbox"])')&&toggleInputSelection(input)){event.preventDefault();return}}if(event.key==='F1'){event.preventDefault();els.filterCode.focus();els.filterCode.select();return}if((event.key==='Delete'||event.key==='Supr')&&selectedRows.size>0){const focused=document.activeElement;const isTextInput=focused?.matches?.('input:not([type="checkbox"])')&&focused?.closest?.('#rows');if(!isTextInput){event.preventDefault();deleteRowsByPredicate(row=>selectedRows.has(row.localUid));return}}const gridInput=document.activeElement?.closest?.('#rows [data-col]');if(!gridInput)return;const col=Number(gridInput.dataset.col);if((col===5||col===4)&&els.comboMenu.classList.contains('visible')){if(event.key==='ArrowDown'){event.preventDefault();combo.active=Math.min(combo.options.length-1,combo.active+1);showCombo(combo.input,true,combo.mode);return}if(event.key==='ArrowUp'){event.preventDefault();combo.active=Math.max(0,combo.active-1);showCombo(combo.input,true,combo.mode);return}if(event.key==='Enter'){event.preventDefault();if(combo.options.length)pickCombo();else hideCombo();return}}if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();moveCell(0,event.shiftKey?-1:1);return}if(event.key==='ArrowDown'){event.preventDefault();moveCell(1,0);return}if(event.key==='ArrowUp'){event.preventDefault();moveCell(-1,0);return}if(event.key==='ArrowRight'||event.key==='ArrowLeft'){const input=gridInput;const all=input.selectionStart===0&&input.selectionEnd===input.value.length;const atStart=input.selectionStart===0&&input.selectionEnd===0;const atEnd=input.selectionStart===input.value.length&&input.selectionEnd===input.value.length;if(all||(event.key==='ArrowLeft'&&atStart)||(event.key==='ArrowRight'&&atEnd)){event.preventDefault();moveCell(0,event.key==='ArrowRight'?1:-1)}}})
async function init(){loadLocal();ensureBlank();paint();await Promise.all([loadRemote(),loadProviders()]);startCatalogInit();startFirebaseSync();ensureBlank();paint();scrollTableToBottom();focusCell(Math.max(0,rows.length-1),5)}
init();
</script>
