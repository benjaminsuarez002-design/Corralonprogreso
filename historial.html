<html lang="es">
<head>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rojo: #e50000; --rojo2: #c0392b; --violeta: #6c4fc7;
  --borde: #c8c0e8; --fila-header: #d0c8f0; --fila-body: #e8e4f8;
  --texto-dark: #1a1a2e; --sombra: 0 2px 12px rgba(108,79,199,0.13);
}
html, body { height: 100%; }
body { font-family: 'Barlow', sans-serif; background: #f0ece8; min-height: 100dvh; }
body::before { content: ''; position: fixed; inset: 0; background-color: #f0ece8; background-image: radial-gradient(ellipse at 15% 25%, rgba(255,255,255,0.92) 0%, transparent 55%); z-index: 0; }

/* ── LOGIN ── */
#loginBg { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 10; }
.login-box { background: #fff; border-radius: 24px; padding: 32px 28px; width: 100%; max-width: 340px; box-shadow: 0 8px 40px rgba(108,79,199,0.15); text-align: center; position: relative; z-index: 1; }
.login-logo { width: 120px; height: auto; margin-bottom: 16px; }
.login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--texto-dark); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: #aaa; margin-bottom: 24px; }
.login-input { width: 100%; padding: 12px 16px; border: 2px solid var(--borde); border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; outline: none; text-align: center; letter-spacing: 4px; color: var(--texto-dark); transition: border-color .2s; margin-bottom: 10px; }
.login-input:focus { border-color: var(--violeta); }
.login-error { font-size: 12px; color: var(--rojo); min-height: 18px; margin-bottom: 12px; }
.login-remember { display: flex; align-items: center; gap: 8px; justify-content: flex-start; margin: 0 0 14px; color: #666; font-size: 13px; }
.login-remember input { width: 16px; height: 16px; accent-color: var(--violeta); cursor: pointer; }
.login-remember label { cursor: pointer; user-select: none; }
.btn-login { width: 100%; padding: 14px; background: var(--violeta); color: #fff; border: none; border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; }
.btn-volver { width: 100%; padding: 12px; background: transparent; color: #aaa; border: 1.5px solid var(--borde); border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }

/* ── APP ── */
#appContent { display: flex; flex-direction: column; min-height: 100dvh; position: relative; z-index: 1; }
.header { background: #fff; border-bottom: 2px solid var(--borde); padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; box-shadow: var(--sombra); position: sticky; top: 0; z-index: 5; }
.header img { height: 38px; width: auto; }
.header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; color: var(--rojo); text-transform: uppercase; letter-spacing: 1px; flex: 1; }
.btn-back { background: var(--fila-header); border: none; color: var(--violeta); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; padding: 7px 14px; border-radius: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: .5px; }

.hist-tabs { display: flex; background: #fff; border-bottom: 1.5px solid var(--borde); position: sticky; top: 62px; z-index: 4; }
.hist-tab {
  flex: 1;
  border: none;
  background: transparent;
  padding: 12px 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #888;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .2s;
}
.hist-tab.active {
  color: var(--violeta);
  border-bottom-color: var(--violeta);
}
.hist-panel { display: none; }
.hist-panel.active { display: block; }
.hist-search {
  padding: 10px 14px;
  background: #fff;
  border-bottom: 1px solid var(--borde);
}
.hist-search input {
  width: 100%;
  border: 1.5px solid var(--borde);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--texto-dark);
  outline: none;
}
.hist-search input:focus {
  border-color: var(--violeta);
  box-shadow: 0 0 0 3px rgba(108,79,199,.12);
}

/* ── HISTORIAL LIST ── */
.h-item { padding: 13px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background .15s; background: #fff; }
.h-item:nth-child(even) { background: var(--fila-body); }
.h-item:hover { background: var(--fila-header); }
.h-nro { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: var(--violeta); min-width: 90px; }
.h-info { flex: 1; min-width: 0; }
.h-cliente { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--texto-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-meta { font-size: 11px; color: #999; margin-top: 2px; }
.h-extra { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
.h-chip { display:inline-flex; max-width:100%; align-items:center; border:1px solid #cfeaff; border-radius:999px; background:#f2fbff; color:#24435f; padding:2px 7px; font-size:10px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.h-total { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--violeta); flex-shrink: 0; }
.h-empty { text-align: center; padding: 60px 20px; color: #bbb; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; }
.h-item.has-photo { box-shadow: inset 4px 0 0 #00a6ff; background: #eef8ff; }
.h-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.h-mini-btn { border: 1px solid var(--borde); background: #fff; color: var(--violeta); border-radius: 8px; padding: 6px 9px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 900; cursor: pointer; }
.h-mini-btn.photo { color: #0077c8; border-color: #9bdcff; background: #f0fbff; }
.h-mini-btn.danger { color: var(--rojo); border-color: #ffcaca; background: #fff6f6; }
.photo-preview { max-width: 100%; max-height: 70vh; border-radius: 12px; display: block; margin: 0 auto; cursor: zoom-in; }
.foto-close {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 10000;
  width: 42px;
  height: 42px;
  border: 0;
  border-radius: 50%;
  background: rgba(255,255,255,.96);
  color: var(--violeta);
  font-size: 24px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 8px 26px rgba(0,0,0,.25);
  display: none;
}
#verFotoGarantiaBg.open .foto-close { display: block; }
#verFotoGarantiaBg.fullscreen-photo {
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,.96);
}
#verFotoGarantiaBg.fullscreen-photo .confirm-box {
  width: 100vw;
  height: 100vh;
  max-width: none !important;
  border-radius: 0;
  background: transparent;
  padding: 0;
  display: grid;
  place-items: center;
}
#verFotoGarantiaBg.fullscreen-photo .confirm-title,
#verFotoGarantiaBg.fullscreen-photo .confirm-btns { display: none; }
#verFotoGarantiaBg.fullscreen-photo .photo-preview {
  max-width: 100vw;
  max-height: 100vh;
  border-radius: 0;
  cursor: zoom-out;
  touch-action: none;
  user-select: none;
  transform-origin: center center;
}
.dropzone {
  border: 2px dashed var(--borde);
  border-radius: 14px;
  background: #faf8ff;
  min-height: 150px;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 18px;
  cursor: pointer;
  transition: border-color .2s, background .2s, transform .2s;
  margin: 12px 0 16px;
}
.dropzone:hover,
.dropzone.dragover {
  border-color: var(--violeta);
  background: #f1ecff;
  transform: translateY(-1px);
}
.dropzone-icon { font-size: 34px; margin-bottom: 8px; }
.dropzone-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 900; color: var(--violeta); text-transform: uppercase; }
.dropzone-sub { font-size: 12px; color: #888; margin-top: 4px; }
.dropzone-file { margin-top: 8px; font-size: 12px; color: var(--texto-dark); font-weight: 700; word-break: break-word; }

/* ── DETALLE ── */
.detalle-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: none; align-items: flex-end; }
.detalle-bg.open { display: flex; }
.detalle-panel { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; display: flex; flex-direction: column; }
.detalle-head { padding: 14px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--fila-header); border-radius: 20px 20px 0 0; }
.detalle-nro { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; color: var(--violeta); }
.detalle-body { overflow-y: auto; flex: 1; padding: 16px; }
.detalle-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.detalle-campo { display: flex; flex-direction: column; gap: 2px; }
.detalle-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
.detalle-val { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--texto-dark); }
.detalle-val.pre-line { white-space: pre-wrap; line-height: 1.25; }
.detalle-tabla-head { display: grid; grid-template-columns: 45px 1fr 75px 80px; gap: 6px; background: var(--fila-header); padding: 6px 8px; border-radius: 8px 8px 0 0; }
.detalle-th { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: var(--violeta); text-transform: uppercase; letter-spacing: .5px; }
.detalle-fila { display: grid; grid-template-columns: 45px 1fr 75px 80px; gap: 6px; padding: 6px 8px; border-bottom: 1px solid var(--borde); }
.detalle-fila:nth-child(even) { background: var(--fila-body); }
.detalle-td { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--texto-dark); }
.detalle-td.num { text-align: right; }
.detalle-td.bold { font-weight: 700; color: var(--violeta); }
.detalle-total { display: flex; justify-content: flex-end; align-items: center; gap: 12px; padding: 10px 8px 0; border-top: 2px solid var(--borde); margin-top: 2px; }
.detalle-total-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: #888; text-transform: uppercase; }
.detalle-total-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; color: var(--violeta); }
.detalle-acciones { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--borde); flex-shrink: 0; }
.btn-det { flex: 1; padding: 11px; border: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-det.pdf  { background: var(--violeta); color: #fff; }
.btn-det.edit { background: #f5f3ff; color: var(--violeta); border: 1.5px solid var(--borde); }
.btn-det.del  { background: #fff0f0; color: var(--rojo); border: 1.5px solid #fcc; }

/* ── PDF ACCIONES ── */
.pdf-actions-bg { position: fixed; inset: 0; background: rgba(20,14,42,.58); z-index: 260; display: none; align-items: center; justify-content: center; padding: 20px; }
.pdf-actions-bg.open { display: flex; }
.pdf-actions-box { width: 100%; max-width: 420px; background: #fff; border: 1px solid var(--borde); border-radius: 18px; padding: 22px; box-shadow: var(--sombra); }
.pdf-actions-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 16px; }
.pdf-actions-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; line-height: 1; font-weight: 900; color: var(--violeta); text-transform: uppercase; }
.pdf-actions-sub { margin-top: 6px; font-size: 13px; color: #777; line-height: 1.35; }
.pdf-actions-close { width: 34px; height: 34px; border: none; border-radius: 50%; background: rgba(108,79,199,.12); color: var(--violeta); font-size: 20px; font-weight: 900; cursor: pointer; }
.pdf-actions-info { border: 1px solid var(--borde); background: rgba(108,79,199,.05); border-radius: 12px; padding: 12px; margin-bottom: 14px; font-size: 14px; color: var(--texto-dark); line-height: 1.45; }
.pdf-actions-grid { display: grid; gap: 10px; }
.pdf-action-btn { width: 100%; border: none; border-radius: 12px; padding: 13px 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #fff; background: var(--violeta); box-shadow: 0 8px 18px rgba(108,79,199,.22); }
.pdf-action-btn.print { background: #2f8edc; }
.pdf-action-btn:hover { filter: brightness(.96); transform: translateY(-1px); }

/* ── EDITAR ── */
.edit-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: none; align-items: flex-end; }
.edit-bg.open { display: flex; }
.edit-panel { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh; display: flex; flex-direction: column; }
.edit-head { padding: 14px 16px; border-bottom: 1px solid var(--borde); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--fila-header); border-radius: 20px 20px 0 0; }
.edit-body { overflow-y: auto; flex: 1; padding: 14px; }
.edit-section { margin-bottom: 14px; }
.edit-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.edit-inp { width: 100%; padding: 8px 12px; border: 1.5px solid var(--borde); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--texto-dark); outline: none; transition: border-color .2s; }
.edit-inp:focus { border-color: var(--violeta); }
.edit-items-head { display: grid; grid-template-columns: 45px 1fr 75px 80px 28px; gap: 4px; background: var(--fila-header); padding: 5px 6px; border-radius: 6px 6px 0 0; }
.edit-th { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: var(--violeta); text-transform: uppercase; }
.edit-item-row { display: grid; grid-template-columns: 45px 1fr 75px 80px 28px; gap: 4px; padding: 4px 6px; border-bottom: 1px solid var(--borde); align-items: center; }
.edit-item-row:nth-child(even) { background: var(--fila-body); }
.edit-item-inp { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; border: none; background: transparent; outline: none; width: 100%; padding: 2px 3px; border-radius: 4px; color: var(--texto-dark); }
.edit-item-inp:focus { background: rgba(108,79,199,.08); }
.edit-item-inp.num { text-align: right; }
.edit-add-row { display: grid; grid-template-columns: 45px 1fr 75px 80px 28px; gap: 4px; padding: 4px 6px; background: rgba(108,79,199,.04); border-bottom: 1px dashed var(--borde); align-items: center; }
.edit-footer { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--borde); flex-shrink: 0; }
.btn-edit-cancel { flex: 1; padding: 11px; border: 1.5px solid var(--borde); border-radius: 10px; background: transparent; color: #888; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-edit-save { flex: 2; padding: 11px; border: none; border-radius: 10px; background: var(--violeta); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-add { background: var(--violeta); border: none; color: #fff; font-size: 18px; cursor: pointer; border-radius: 6px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.btn-del-item { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 2px; border-radius: 4px; }
.btn-del-item:hover { color: var(--rojo); }

/* ── CONFIRM ── */
.confirm-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
.confirm-bg.open { display: flex; }
.confirm-box { background: #fff; border-radius: 18px; padding: 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: var(--sombra); }
.confirm-icon { font-size: 36px; margin-bottom: 10px; }
.confirm-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; color: var(--texto-dark); text-transform: uppercase; margin-bottom: 8px; }
.confirm-sub { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; }
.btn-confirm-cancel { flex: 1; padding: 12px; border: 1.5px solid var(--borde); border-radius: 10px; background: transparent; color: #888; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-confirm-ok { flex: 2; padding: 12px; border: none; border-radius: 10px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; color: #fff; }

/* ── TOAST / LOADING ── */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--texto-dark); color: #fff; padding: 10px 20px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; z-index: 999; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .3s; }
.toast.show { opacity: 1; }
.loading-overlay { position: fixed; inset: 0; background: rgba(240,236,232,0.9); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 600; }
.loading-overlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 4px solid #d0c8f0; border-top-color: var(--violeta); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { color: var(--violeta); font-size: 16px; letter-spacing: 1px; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; }
</style>

<!-- ── CONTENIDO HISTORIAL ── -->
<div id="appContent">
  <div class="header">
    <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="Logo">
    <div class="header-title">Historial</div>
    <button class="btn-back" onclick="cerrarSesion()">Salir</button>
    <button class="btn-back" data-nav-url="remitos.html">← Volver</button>
    <button class="btn-back" data-nav-url="menu.html">Menú principal</button>
  </div>
  <div class="hist-tabs">
    <button class="hist-tab active" id="tabRemitos" onclick="activarTabHistorial('remitos')">Remitos</button>
    <button class="hist-tab" id="tabPresupuestos" onclick="activarTabHistorial('presupuestos')">Presupuestos</button>
    <button class="hist-tab" id="tabGarantias" onclick="activarTabHistorial('garantias')">Garantías</button>
  </div>
  <div class="hist-panel active" id="panelRemitos">
    <div class="hist-search">
      <input id="remitosSearch" type="text" placeholder="Buscar remito, cliente, fecha o total..." autocomplete="off">
    </div>
    <div id="historialBody"></div>
  </div>
  <div class="hist-panel" id="panelPresupuestos">
    <div id="presupuestosBody"></div>
  </div>
  <div class="hist-panel" id="panelGarantias">
    <div id="garantiasBody"></div>
  </div>
</div>

<!-- ── DETALLE ── -->
<div class="detalle-bg" id="detalleBg" onclick="if(event.target===this)cerrarDetalle()">
  <div class="detalle-panel">
    <div class="detalle-head">
      <span class="detalle-nro" id="detalleNro">—</span>
      <button onclick="cerrarDetalle()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#888;">✕</button>
    </div>
    <div class="detalle-body" id="detalleBody"></div>
    <div class="detalle-acciones">
      <button id="btnDetallePdf" class="btn-det pdf" onclick="verPDFDetalle()">📄 PDF</button>
      <button id="btnDetalleEdit" class="btn-det edit" onclick="abrirEditar()">✏️ Editar</button>
      <button id="btnDetalleDel" class="btn-det del" onclick="confirmarEliminar()">🗑 Eliminar</button>
    </div>
  </div>
</div>

<!-- ── PDF ACCIONES ── -->
<div class="pdf-actions-bg" id="pdfActionsBg">
  <div class="pdf-actions-box">

  try {
    await histDb.collection(HISTORIAL_NOTIFS_COLLECTION).doc(historialNotifId(data.tipo, data.id)).set({
      ...data,
      resuelta: Boolean(data.resuelta),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAt: data.createdAt || firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    console.warn('No se pudo guardar notificación de historial', error);

function fmt(n) {
  return '$' + Number(n).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtCantidad(valor) {
  const numero = Number(valor);
  if (!Number.isFinite(numero)) return String(valor ?? '');
  return numero.toLocaleString('es-AR', {
    useGrouping: false,
    maximumFractionDigits: 6
  });
}
function parseMonto(valor) {
  let texto = String(valor ?? '').trim();
  if(!texto) return 0;
  texto = texto.replace(/\$/g, '').replace(/\s+/g, '');
  const tieneComa = texto.includes(',');
  const tienePunto = texto.includes('.');
  if(tieneComa) {
    texto = texto.replace(/\./g, '').replace(',', '.');
  } else if(tienePunto) {
    const partes = texto.split('.');
    if(partes.length > 2 || partes[partes.length - 1].length === 3) texto = texto.replace(/\./g, '');
  }
  return Number.parseFloat(texto.replace(/[^0-9.-]/g, '')) || 0;
}
const REMITO_DIGITS = 8;
function remitoShort(value) {
  const raw = String(value ?? '').split('-').pop() || '';
  const n = parseInt(raw.replace(/\D/g, ''), 10) || 0;
  return String(n).padStart(REMITO_DIGITS, '0');
}
function remitoFull(value) {
  return '0001-' + remitoShort(value);
}

async function cargarPresupuestos() {

    const res = await fetch(`${SUPABASE_URL}/rest/v1/${PRESUPUESTOS_TABLE}?select=*&order=fecha_iso.desc.nullslast,id.desc&limit=100`, {
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText || 'No se pudieron cargar los presupuestos');
    }
    const presupuestos = await res.json();
    _presupuestosCache = Array.isArray(presupuestos) ? presupuestos : [];
    if (!_presupuestosCache.length) {
      body.innerHTML = '<div class="h-empty">Sin presupuestos todavia</div>';
      return;
    }

    body.innerHTML = _presupuestosCache.map((p, idx) => {
      const cantItems = Array.isArray(p.items) ? p.items.length : 0;
      const fechaTxt = p.fecha || (p.fecha_iso ? new Date(p.fecha_iso).toLocaleDateString('es-AR') : '');
      const titulo = tituloPresupuestoHistorial(p);
      return `
        <div class="h-item" onclick="abrirDetallePresupuesto(${idx})">

    }).join('');
  } catch (e) {
    _presupuestosCache = [];
    body.innerHTML = '<div class="h-empty">Error cargando presupuestos</div>';
    console.error('Error cargando presupuestos desde Supabase:', e);

async function subirFotoGarantia(file, garantiaId) {
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
  const path = `garantias/${garantiaId}/${Date.now()}.${ext}`;
  const response = await fetch(`${SUPABASE_URL}/storage/v1/object/${SUPABASE_BUCKET}/${path}`, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      'Content-Type': file.type || 'application/octet-stream',
      'x-upsert': 'true'
    },
    body: file
  });
  if (!response.ok) throw new Error(await response.text());
  const encodedPath = path.split('/').map(encodeURIComponent).join('/');
  return {
    path,
    url: `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/${encodedPath}`
  };
}

async function pegarImagenGarantiaDesdeClipboard() {
  if (!document.getElementById('garantiaFotoBg').classList.contains('open')) return;
  try {
    if (navigator.clipboard?.read) {
      const items = await navigator.clipboard.read();
      for (const item of items) {
        const imageType = item.types.find((type) => type.startsWith('image/'));
        if (!imageType) continue;
        const blob = await item.getType(imageType);
        const ext = imageType.split('/')[1] || 'png';
        setGarantiaFotoFile(new File([blob], `garantia-pegada.${ext}`, { type: imageType }));
        return;
      }
    }
    toast('No encontré una imagen en el portapapeles');
  } catch (error) {
    console.error(error);
    toast('El navegador bloqueó el pegado');
  }
}

function pegarImagenGarantiaDesdePasteEvent(event) {
  if (!document.getElementById('garantiaFotoBg').classList.contains('open')) return false;
  const items = [...(event.clipboardData?.items || [])];
  const imageItem = items.find((item) => item.kind === 'file' && item.type.startsWith('image/'));

function aplicarFotoTransform() {
  const img = document.getElementById('garantiaFotoPreview');
  img.style.transform = `translate(${_fotoPanX}px, ${_fotoPanY}px) scale(${_fotoZoom})`;
}

function resetFotoZoom() {
  _fotoZoom = 1;
  _fotoPanX = 0;
  _fotoPanY = 0;
  _fotoDragging = false;
  _fotoDragStart = null;
  _fotoPinchStart = null;
  aplicarFotoTransform();
}

function ajustarFotoZoom(delta, originX = 0, originY = 0) {
  const nextZoom = Math.min(6, Math.max(1, _fotoZoom * delta));
  if (nextZoom === _fotoZoom) return;
  const ratio = nextZoom / _fotoZoom;
  _fotoPanX = originX - (originX - _fotoPanX) * ratio;
  _fotoPanY = originY - (originY - _fotoPanY) * ratio;
  _fotoZoom = nextZoom;
  if (_fotoZoom === 1) {
    _fotoPanX = 0;
    _fotoPanY = 0;
  }
  aplicarFotoTransform();
}

function distanciaTouches(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}

function centroTouches(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2 - (window.innerWidth / 2),
    y: (touches[0].clientY + touches[1].clientY) / 2 - (window.innerHeight / 2)
  };
}

async function copiarPresupuestoColumna(tipo) {
  const items = Array.isArray(_presupuestoDetalleActual?.items) ? _presupuestoDetalleActual.items : [];
  const texto = items.map((it) => {
    if (tipo === 'cantidad') return fmtCantidad(it.cantidad);
    if (tipo === 'completo') {
      const idart = it.idart || it.idArt || it.codigo || '';
      const descripcion = it.nombre || it.descripcion || it.articulo || '';
      const cantidad = fmtCantidad(it.cantidad);
      return [idart, descripcion, cantidad].join('\t');
    }
    return it.idart || it.idArt || it.codigo || '';
  }).join('\n');
  if (!texto.trim()) { toast('No hay datos para copiar'); return; }
  const mensaje = tipo === 'cantidad' ? 'Cantidades copiadas' : tipo === 'completo' ? 'Presupuesto completo copiado' : 'IDArt copiados';
  try {
    await navigator.clipboard.writeText(texto);
    toast(mensaje);
  } catch (_) {
    const area = document.createElement('textarea');
    area.value = texto;
    document.body.appendChild(area);
    area.select();
    document.execCommand('copy');
    area.remove();
    toast(mensaje);
  }
}

async function abrirHistorialSolicitadoDesdeMenu() {
  let target = null;
  try { target = JSON.parse(localStorage.getItem('corralon_open_historial_notification') || 'null'); } catch {}
  const params = new URLSearchParams(location.search);
  const urlTipo = params.get('abrirTipo');
  const urlId = params.get('abrirId');
  if (urlTipo && urlId) target = { tipo: urlTipo, id: urlId };
  if (!target?.tipo || !target?.id) return;
  localStorage.removeItem('corralon_open_historial_notification');
  if (urlTipo || urlId) history.replaceState(null, '', location.pathname);
  if (target.tipo === 'remito') {
    await activarTabHistorial('remitos');
    abrirDetalle(target.id);
    return;
  }
  if (target.tipo === 'presupuesto') {
    await activarTabHistorial('presupuestos');
    const idx = findPresupuestoIndexById(target.id);
    if (idx >= 0) abrirDetallePresupuesto(idx);
    else toast('No se encontro el presupuesto web solicitado');
    return;
  }
  if (target.tipo === 'garantia') {
    await activarTabHistorial('garantias');
    const idx = _garantiasCache.findIndex(g => String(g.id || '') === String(target.id));
    if (idx >= 0) abrirFotoGarantia(idx);
  }
}

function nombreArchivoPdfDetalle(nombre) {
  return String(nombre || 'documento')
    .replace(/[\\/:*?"<>|]+/g, '-')
    .replace(/\s+/g, ' ')
    .trim() || 'documento';
}

function generarPdfDetalleActual() {
  if (_detalleTipoActual === 'presupuesto') {
    const p = _presupuestoDetalleActual;
    if(!p) return null;
    const doc = generarPDFPresupuestoDoc(p);
    const fechaTxt = p.fecha || (p.fecha_iso ? new Date(p.fecha_iso).toLocaleDateString('es-AR') : '-');
    return {
      doc,
      titulo: `Presupuesto ${p.numero || '-'} - ${fechaTxt}`,
      archivo: nombreArchivoPdfDetalle(`Presupuesto-${p.numero || '-'}-${fechaTxt}`),
      info: `<strong>Movimiento:</strong> Presupuesto ${esc(p.numero || '-')}<br><strong>Fecha:</strong> ${esc(fechaTxt)}`
    };
  }

  const r = _remitoDetalleActual;
  if(!r) return null;
  const its = (r.items||[]).map(it => ({
    cantidad: it.cant,
    nombre: it.descripcion,
    codigo: it.codigo || '',
    precio: it.precio
  }));
  const total = its.reduce((s,it) => s + (it.precio||0)*(it.cantidad||0), 0);
  const nroRemito = r.nro ? remitoFull(r.nro) : '-';
  const doc = generarPDFDoc(r.cliente, r.fecha, nroRemito, total, its);
  return {
    doc,
    titulo: `${r.cliente || 'Cliente'} - ${nroRemito} - ${r.fecha || '-'}`,
    archivo: nombreArchivoPdfDetalle(`${r.cliente || 'Cliente'}-${nroRemito}-${r.fecha || '-'}`),
    info: `<strong>Remito:</strong> ${esc(nroRemito)}<br><strong>Cliente:</strong> ${esc(r.cliente || 'Cliente')}<br><strong>Total:</strong> ${fmt(total)}`
  };
}

        onchange="editItems[${i}].desc=this.value">
      <input type="text" class="edit-item-inp num" value="${it.precio||0}" inputmode="numeric" autocomplete="off"
        onchange="editItems[${i}].precio=parseMonto(this.value);this.value=editItems[${i}].precio;actualizarSubEdit()">
      <input type="text" class="edit-item-inp num" id="editSub${i}" value="${Number((it.cant||0)*(it.precio||0)).toLocaleString('es-AR')}" inputmode="numeric" autocomplete="off"
        onchange="calcularPrecioEditDesdeSubtotal(${i}, this)">
      <button class="btn-del-item" style="font-size:13px" onclick="editItems.splice(${i},1);renderEditItems()">✕</button>
    </div>`).join('');
}

function normalizarEditNro() {
  const input = document.getElementById('editNro');
  if(!input) return;
  input.value = remitoShort(input.value);
}

function normalizarEditFecha() {
  const input = document.getElementById('editFecha');
  if(!input) return;
  const parsed = window.CorralonFunciones?.parseFechaFlexible?.(input.value);
  if(parsed) input.value = parsed.text;
}

function actualizarSubEdit() {
  editItems.forEach((it, i) => {
    const el = document.getElementById('editSub' + i);
    if(el) el.value = Number((it.cant||0)*(it.precio||0)).toLocaleString('es-AR');
  });
}

function calcularPrecioEditDesdeSubtotal(i, input) {
  const it = editItems[i];
  if(!it) return;
  const cant = Number(it.cant) || 1;
  const subtotal = parseMonto(input.value);
  it.precio = cant ? subtotal / cant : subtotal;
  const row = input.closest('.edit-item-row');
  const priceInput = row?.querySelectorAll('input.edit-item-inp')[2];
  if(priceInput) priceInput.value = Number(it.precio || 0).toLocaleString('es-AR');
  input.value = Number(subtotal || 0).toLocaleString('es-AR');
}

function calcularPrecioNuevoDesdeSubtotal() {
  const cantEl = document.getElementById('eNuevoCant');
  const precioEl = document.getElementById('eNuevoPrecio');
  const subtotalEl = document.getElementById('eNuevoSubtotal');
  if(!precioEl || !subtotalEl) return;
  const cant = parseFloat(cantEl?.value) || 1;
  const subtotal = parseMonto(subtotalEl.value);
  if(!subtotal) return;
  const precio = cant ? subtotal / cant : subtotal;
  precioEl.value = Number(precio || 0).toLocaleString('es-AR');
  subtotalEl.value = Number(subtotal || 0).toLocaleString('es-AR');
}

function editAgregarItem() {
  const cant  = parseFloat(document.getElementById('eNuevoCant').value) || 1;
  const desc  = document.getElementById('eNuevoDesc').value.trim();
  const precio= parseMonto(document.getElementById('eNuevoPrecio').value);
  if(!desc && !precio) return;
  editItems.push({ cant, desc, precio });
  document.getElementById('eNuevoCant').value = '';
  document.getElementById('eNuevoDesc').value = '';
  document.getElementById('eNuevoPrecio').value = '';
  document.getElementById('eNuevoSubtotal').value = '';
  renderEditItems();
  setTimeout(() => document.getElementById('eNuevoCant').focus(), 30);
}

async function guardarEdicion() {
  const r = _remitoDetalleActual;
  if(!r) return;
  normalizarEditFecha();
  normalizarEditNro();
  const cliente  = document.getElementById('editCliente').value.trim();
  const fecha    = document.getElementById('editFecha').value.trim();
  const nroCorto = document.getElementById('editNro').value.trim();
  if(!cliente) { toast('⚠️ Ingresá el nombre del cliente'); return; }
  const nextItems = editItems.map(it => ({ id: it.id, cant: it.cant, descripcion: it.desc, precio: it.precio }));
  const nextRemito = {
    ...r,
    nro: remitoFull(nroCorto),
    cliente,
    fecha,
    total: nextItems.reduce((s,it) => s + (it.cant||0)*(it.precio||0), 0),
    items: nextItems
  };
  _remitoDetalleActual = nextRemito;
  const cacheIndex = _remitosCache.findIndex(item => String(item.id) === String(r.id));
  if(cacheIndex >= 0) _remitosCache[cacheIndex] = { ..._remitosCache[cacheIndex], ...nextRemito };
  cerrarEditar();
  renderDetalleRemito(nextRemito);
  document.getElementById('detalleBg').classList.add('open');
  toast('✅ Remito actualizado');
  guardarEdicionRemota(nextRemito).catch(error => {
    console.error(error);
    toast('⚠️ Se guardó local, falta sincronizar');
  });
}

async function guardarEdicionRemota(remito) {
  const nroCorto = remitoShort(remito.nro);
  const items = remito.items || [];
  await fetch(`${SUPABASE_URL}/rest/v1/remitos?id=eq.${remito.id}`, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ nro: remitoFull(nroCorto), cliente: remito.cliente, fecha: remito.fecha, total: remito.total })
  });
  await fetch(`${SUPABASE_URL}/rest/v1/items_remito?remito_id=eq.${remito.id}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
  });
  if(items.length) {
    await fetch(`${SUPABASE_URL}/rest/v1/items_remito`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(items.map(it => ({ remito_id: remito.id, cant: it.cant, descripcion: it.descripcion, precio: it.precio })))
    });
  }
  cargarHistorial();
}

// ── NAVEGACIÓN TECLADO EDITAR ──
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'v' && document.getElementById('garantiaFotoBg').classList.contains('open')) {
    e.preventDefault();
    pegarImagenGarantiaDesdeClipboard();
    return;
  }
  const active = document.activeElement;
  if(!active) return;
  const editBg = document.getElementById('editBg');
  if(!editBg.classList.contains('open') || !editBg.contains(active)) return;
  const rows = [...document.querySelectorAll('.edit-item-row')];
  const agInputs = [document.getElementById('eNuevoCant'), document.getElementById('eNuevoDesc'), document.getElementById('eNuevoPrecio'), document.getElementById('eNuevoSubtotal')];
  const COL = 4;
  function focusEditCell(rowIdx, colIdx) {
    colIdx = Math.max(0, Math.min(COL-1, colIdx));
    if(rowIdx === rows.length) { agInputs[colIdx] && agInputs[colIdx].focus(); }
    else if(rowIdx >= 0 && rowIdx < rows.length) {
    const ins = [...rows[rowIdx].querySelectorAll('input.edit-item-inp')];
      ins[colIdx] && ins[colIdx].focus();
    }
  }
  if(active.classList.contains('edit-item-inp') && active.closest('.edit-item-row')) {
    const row = active.closest('.edit-item-row');
    const rowIdx = rows.indexOf(row);
    const inputs = [...row.querySelectorAll('input.edit-item-inp')];
    const colIdx = inputs.indexOf(active);
    if(e.key === 'Enter' || e.key === 'ArrowDown') { e.preventDefault(); focusEditCell(rowIdx+1, colIdx); }
    else if(e.key === 'ArrowUp') { e.preventDefault(); if(rowIdx>0) focusEditCell(rowIdx-1, colIdx); }
    else if(e.key === 'ArrowRight' && active.selectionStart === active.value.length) { e.preventDefault(); if(colIdx<COL-1) focusEditCell(rowIdx, colIdx+1); else focusEditCell(rowIdx+1, 0); }
    else if(e.key === 'ArrowLeft' && active.selectionStart === 0) { e.preventDefault(); if(colIdx>0) focusEditCell(rowIdx, colIdx-1); else if(rowIdx>0) focusEditCell(rowIdx-1, COL-1); }
    return;
  }
  const agIdx = agInputs.indexOf(active);
  if(agIdx !== -1) {
    if(e.key === 'Enter' && agIdx === COL-1) { e.preventDefault(); calcularPrecioNuevoDesdeSubtotal(); editAgregarItem(); return; }
    if(e.key === 'ArrowUp' && rows.length>0) { e.preventDefault(); focusEditCell(rows.length-1, agIdx); }
    else if(e.key === 'ArrowRight' && active.selectionStart === active.value.length && agIdx < COL-1) { e.preventDefault(); agInputs[agIdx+1].focus(); }
    else if(e.key === 'ArrowLeft' && active.selectionStart === 0 && agIdx > 0) { e.preventDefault(); agInputs[agIdx-1].focus(); }
    return;
  }
  if(e.key === 'Enter') {
    const headerInputs = ['editCliente','editFecha','editNro'].map(id => document.getElementById(id)).filter(Boolean);
    const hi = headerInputs.indexOf(active);
    if(hi !== -1) {
      e.preventDefault();
      if(active.id === 'editNro') normalizarEditNro();
      if(hi < headerInputs.length-1) headerInputs[hi+1].focus();
      else if(agInputs[0]) agInputs[0].focus();
    }
  }
});

const fotoPreviewEl = document.getElementById('garantiaFotoPreview');
fotoPreviewEl.addEventListener('wheel', (event) => {
  if (!document.getElementById('verFotoGarantiaBg').classList.contains('fullscreen-photo')) return;
  event.preventDefault();
  const rect = fotoPreviewEl.getBoundingClientRect();
  const originX = event.clientX - (rect.left + rect.width / 2);
  const originY = event.clientY - (rect.top + rect.height / 2);
  ajustarFotoZoom(event.deltaY < 0 ? 1.12 : 0.9, originX, originY);
}, { passive: false });
fotoPreviewEl.addEventListener('mousedown', (event) => {
  if (!document.getElementById('verFotoGarantiaBg').classList.contains('fullscreen-photo') || _fotoZoom <= 1) return;
  event.preventDefault();
  _fotoDragging = true;
  _fotoDragStart = { x: event.clientX, y: event.clientY, panX: _fotoPanX, panY: _fotoPanY };
  fotoPreviewEl.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', (event) => {
  if (!_fotoDragging || !_fotoDragStart) return;
  _fotoPanX = _fotoDragStart.panX + event.clientX - _fotoDragStart.x;
  _fotoPanY = _fotoDragStart.panY + event.clientY - _fotoDragStart.y;
  aplicarFotoTransform();
});
document.addEventListener('mouseup', () => {
  _fotoDragging = false;
  _fotoDragStart = null;
  fotoPreviewEl.style.cursor = _fotoZoom > 1 ? 'grab' : 'zoom-out';
});
fotoPreviewEl.addEventListener('dblclick', (event) => {
  if (!document.getElementById('verFotoGarantiaBg').classList.contains('fullscreen-photo')) return;
  event.preventDefault();
  resetFotoZoom();
});
fotoPreviewEl.addEventListener('touchstart', (event) => {
  if (!document.getElementById('verFotoGarantiaBg').classList.contains('fullscreen-photo')) return;
  if (event.touches.length === 2) {
    const center = centroTouches(event.touches);
    _fotoPinchStart = { dist: distanciaTouches(event.touches), zoom: _fotoZoom, x: center.x, y: center.y };
    return;
  }
  if (event.touches.length === 1 && _fotoZoom > 1) {
    _fotoDragStart = { x: event.touches[0].clientX, y: event.touches[0].clientY, panX: _fotoPanX, panY: _fotoPanY };
  }
}, { passive: false });
fotoPreviewEl.addEventListener('touchmove', (event) => {
  if (!document.getElementById('verFotoGarantiaBg').classList.contains('fullscreen-photo')) return;
  if (event.touches.length === 2 && _fotoPinchStart) {
    event.preventDefault();
    const nextZoom = Math.min(6, Math.max(1, _fotoPinchStart.zoom * (distanciaTouches(event.touches) / _fotoPinchStart.dist)));
    const delta = nextZoom / _fotoZoom;
    ajustarFotoZoom(delta, _fotoPinchStart.x, _fotoPinchStart.y);
    return;
  }
  if (event.touches.length === 1 && _fotoDragStart && _fotoZoom > 1) {
    event.preventDefault();
    _fotoPanX = _fotoDragStart.panX + event.touches[0].clientX - _fotoDragStart.x;
    _fotoPanY = _fotoDragStart.panY + event.touches[0].clientY - _fotoDragStart.y;
    aplicarFotoTransform();
  }
}, { passive: false });
fotoPreviewEl.addEventListener('touchend', () => {
  _fotoDragStart = null;
  _fotoPinchStart = null;
});

function pedirConfirm(opts) {
  document.getElementById('confirmIcon').textContent  = opts.icon || '⚠️';
  document.getElementById('confirmTitle').textContent = opts.titulo || '¿Confirmar?';
  document.getElementById('confirmSub').textContent   = opts.sub || '';
  document.getElementById('confirmOkBtn').style.background = opts.color || 'var(--violeta)';
  document.getElementById('confirmOkBtn').textContent = opts.btnTxt || 'Confirmar';
  _confirmCallback = opts.callback;
  document.getElementById('confirmBg').classList.add('open');
}
function cerrarConfirm() {
  document.getElementById('confirmBg').classList.remove('open');
  _confirmCallback = null;
}
function ejecutarConfirm() {
  const cb = _confirmCallback;
  cerrarConfirm();
  if(cb) cb();
}
