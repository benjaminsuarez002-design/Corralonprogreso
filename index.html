function fmtPrecio(n) {

function normalizarTexto(texto) {
  return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[-_]/g, " ").replace(/[^\w\s]/g, "").replace(/\s+/g, " ").trim();
}

function renderProductos(lista) {

// Funcion con el cambio: ordenamiento con prioridad a los que empiezan por la busqueda
function aplicarBusquedaActual() {
  const input = document.getElementById('searchInput');
  const q = normalizarTexto(input.value);
  paginaActual = 1;

  let resultado;

  if (!q) {
    resultado = [...todosArticulos].sort((a, b) =>
      (a.nombre || '').localeCompare(b.nombre || '', 'es')
    );
  } else {
    const palabras = q.split(' ').filter(Boolean);
    resultado = todosArticulos.filter(a =>
      palabras.every(p => a._busqueda.includes(p))
    );

    // Funcion que devuelve el nivel de prioridad (menor = mejor)
    function prioridad(nombre) {
      const n = normalizarTexto(nombre || '');
      if (n.startsWith(q)) return 0; // empieza por la busqueda completa
      // contiene cada palabra como palabra completa (delimitada por espacio o inicio/fin)
      const tieneExactas = palabras.every(p => {
        const re = new RegExp('(^| )' + p + '( |$)');
        return re.test(n);
      });
      if (tieneExactas) return 1; // contiene palabras exactas
      return 2; // solo contiene como subcadena
    }

    resultado.sort((a, b) => {
      const pA = prioridad(a.nombre);
      const pB = prioridad(b.nombre);
      if (pA !== pB) return pA - pB;
      return normalizarTexto(a.nombre || '').localeCompare(normalizarTexto(b.nombre || ''), 'es');
    });
  }

  actualizarChipsRubro(resultado);
  if (rubroActivo) resultado = resultado.filter(a => (a.rubro || '') === rubroActivo);
  if (sortActivo === 'asc') resultado.sort((a,b) => (a.precio||0)-(b.precio||0));
  else if (sortActivo === 'desc') resultado.sort((a,b) => (b.precio||0)-(a.precio||0));
  renderProductos(resultado);
}

function actualizarChipsRubro(listaBase) {
  const dropdown = document.getElementById('rubroDropdown');
  const label = document.getElementById('rubroLabel');
  const rubros = [...new Set(listaBase.map(a => a.rubro || '').filter(Boolean))].sort();
  dropdown.innerHTML = '';
  const todos = document.createElement('div');
  todos.className = 'rubro-option' + (!rubroActivo ? ' active' : '');
  todos.textContent = 'Todos los rubros';
  todos.onclick = () => { rubroActivo = ''; label.textContent = 'Rubros'; dropdown.classList.remove('open'); aplicarBusquedaActual(); };
  dropdown.appendChild(todos);
  rubros.forEach(r => {
    const opt = document.createElement('div');
    opt.className = 'rubro-option' + (rubroActivo === r ? ' active' : '');
    opt.textContent = r;
    opt.onclick = () => { rubroActivo = r; label.textContent = r; dropdown.classList.remove('open'); aplicarBusquedaActual(); };
    dropdown.appendChild(opt);
  });
}

let carrito = {};
function guardarCarrito() { localStorage.setItem('carrito', JSON.stringify(carrito)); }

function actualizarBurbuja() { document.getElementById('cartCount').textContent = Object.keys(carrito).length; }
function actualizarVistaCarrito() {
  actualizarBurbuja();

  for (const clave in carrito) {

}
function abrirPanel() { document.getElementById('cartPanel').classList.add('open'); document.getElementById('darkOverlay').classList.remove('hidden'); }
function cerrarPanel() { document.getElementById('cartPanel').classList.remove('open'); document.getElementById('darkOverlay').classList.add('hidden'); }

document.getElementById('modalAddCart').addEventListener('click', () => {
  const cant = parseInt(document.getElementById('modalCantidad').value||1,10);

  const codigo = btn.dataset.codigo;
  if(!codigo) return;

});

  if(e.target.classList.contains('qty-plus')) { carrito[codigo].cantidad++; guardarCarrito(); actualizarVistaCarrito(); }
  else if(e.target.classList.contains('qty-minus')) { if(carrito[codigo].cantidad>1) carrito[codigo].cantidad--; guardarCarrito(); actualizarVistaCarrito(); }
  else if(e.target.classList.contains('remove-item')) { delete carrito[codigo]; guardarCarrito(); actualizarVistaCarrito(); }
});

async function crearPresupuesto() {
  const items = Object.values(carrito);
  if (!items.length) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:#f0ece8;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:99999;';
  overlay.innerHTML = `<div style="width:40px;height:40px;border:4px solid #d0c8f0;border-top-color:#6c4fc7;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;"></div><div style="color:#6c4fc7;font-size:16px;letter-spacing:1px;text-transform:uppercase;">Generando presupuesto...</div>`;
  document.body.appendChild(overlay);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const fecha = new Date();
  let numeroPedidoData;
  try {
    numeroPedidoData = await obtenerSiguienteNumeroPedido();
  } catch (e) {
    document.body.removeChild(overlay);
    alert(`No se pudo obtener el número de pedido correlativo.\n\nDetalle: ${String(e?.message || e || '')}`);
    return;
  }
  const numeroPedido = numeroPedidoData.numero_completo;
  const fechaStr = fecha.toLocaleDateString('es-AR');
  const nombreArchivo = `Pedido-${numeroPedido}.pdf`;
  if (logoCacheData) doc.addImage(logoCacheData, 'PNG', 15, 10, 50, 20);
  doc.setFontSize(18); doc.text("CORRALON PROGRESO", 105, 18, { align: "center" });
  doc.setFontSize(11); doc.text(`Fecha: ${fechaStr}`, 195, 28, { align: "right" });
  doc.text(`Pedido Nro: ${numeroPedido}`, 15, 33);
  doc.line(15, 40, 195, 40);
  let y = 50;
  const col = { cantidad: 15, descripcion: 35, idart: 115, precio: 150, importe: 185 };
  doc.setFillColor(230,230,230); doc.rect(15, y-6, 180, 8, 'F'); doc.setFontSize(10);
  doc.text("Cantidad", col.cantidad, y); doc.text("Descripcion", col.descripcion, y); doc.text("IDArt", col.idart, y); doc.text("Prec. Uni.", col.precio, y); doc.text("Importe", col.importe, y, { align: "right" });
  y += 4; doc.line(15, y, 195, y); y += 6;
  let total = 0;
  items.forEach(it => {
    const importe = it.precio * it.cantidad; total += importe;
    doc.text(Number(it.cantidad).toFixed(2), col.cantidad, y);
    doc.text(it.nombre.substring(0,40), col.descripcion, y);
    doc.text(it.codigo, col.idart, y);
    doc.text(fmtPrecio(it.precio), col.precio, y, { align: "right" });
    doc.text(fmtPrecio(importe), col.importe, y, { align: "right" });
    y += 8;
  });
  doc.line(15, y, 195, y); y += 10;
  doc.setFontSize(12); doc.text(`TOTAL: ${fmtPrecio(total)}`, 195, y, { align: "right" });
  const mensaje = `Hola, me gustaria pedir el presupuesto Nro ${numeroPedido}.`;
  ultimoPedidoGenerado = { mensaje, nombreArchivo, doc };
  carrito = {}; guardarCarrito(); actualizarVistaCarrito(); cerrarPanel();
  document.getElementById('waModalSub').innerHTML = `Pedido <b>${numeroPedido}</b> generado correctamente.<br>Elegi una opcion:`;
  document.getElementById('waModal').classList.remove('hidden');
  document.getElementById('waEnviar').onclick = () => {
    document.getElementById('waModal').classList.add('hidden');
    window.open('https://wa.me/2645802404?text=' + encodeURIComponent(mensaje), '_blank');
  };
  document.getElementById('btnDescargarPdf').onclick = () => {
    document.getElementById('waModal').classList.add('hidden');
    if (ultimoPedidoGenerado?.doc) ultimoPedidoGenerado.doc.save(ultimoPedidoGenerado.nombreArchivo);
  };
  document.getElementById('waCloseBtn').onclick = () => { document.getElementById('waModal').classList.add('hidden'); };
  document.body.removeChild(overlay);
}
