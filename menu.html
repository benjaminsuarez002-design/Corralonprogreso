<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú principal — Corralón Progreso</title>
<link rel="icon" type="image/x-icon" href="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/icono-corralon-Photoroom.ico">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4efe9;
    --panel: #ffffff;
    --line: #d8cfee;
    --purple: #6c4fc7;
    --purple-dark: #4d35a0;
    --red: #e50000;
    --text: #1f2233;
    --muted: #7b8090;
    --shadow: 0 10px 30px rgba(58, 35, 120, .12);
  }
  body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.95) 0%, transparent 35%),
      radial-gradient(circle at 85% 8%, rgba(108,79,199,.09) 0%, transparent 30%),
      var(--bg);
    padding: 18px;
    display: grid;
    place-items: center;
  }
  #appContent {
    display: none;
    width: 100%;
    max-width: 760px;
  }
  .menu-card {
    width: min(100%, 760px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .menu-head {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, #faf8ff 0%, #f5f0ff 100%);
  }
  .menu-head img {
    height: 34px;
    width: auto;
    mix-blend-mode: multiply;
  }
  .menu-title {
    font-size: 22px;
    font-weight: 900;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .menu-sub {
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    font-weight: 700;
  }
  .menu-logout {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 7px 12px;
    background: #fff;
    color: var(--purple-dark);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
  }
  .menu-grid {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .menu-btn {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    text-decoration: none;
    color: var(--text);
    background: #fff;
    font-size: 15px;
    font-weight: 800;
    transition: .18s ease;
  }
  .menu-btn:hover {
    border-color: var(--purple);
    box-shadow: inset 0 0 0 1px var(--purple);
    color: var(--purple-dark);
    transform: translateY(-1px);
  }
  .menu-btn strong {
    display: block;
    font-size: 16px;
    color: var(--purple-dark);
  }
  .menu-btn span {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  #loginBg {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(244, 239, 233, .92);
    backdrop-filter: blur(4px);
  }
  .login-box {
    width: min(100%, 360px);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .login-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--purple-dark);
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .login-input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
    outline: none;
  }
  .login-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(108,79,199,.15);
  }
  .login-error {
    min-height: 18px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--red);
  }
  .login-remember {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .login-cta {
    margin-top: 12px;
    width: 100%;
    border: 1px solid var(--purple);
    background: var(--purple);
    color: #fff;
    border-radius: 10px;
    padding: 10px 12px;
    font-weight: 800;
    cursor: pointer;
  }

  @media (max-width: 680px) {
    body { padding: 12px; }
    .menu-grid { grid-template-columns: 1fr; padding: 12px; }
    .menu-title { font-size: 18px; }
    .menu-sub { display: none; }
    .menu-head img { height: 30px; }
  }
</style>
</head>
<body>
  <div id="loginBg">
    <div class="login-box">
      <div class="login-title">Menú principal</div>
      <div class="login-sub">Ingresá la misma contraseña de Historial</div>
      <input type="password" id="loginInput" class="login-input" placeholder="••••••••" autocomplete="current-password">
      <div class="login-error" id="loginError"></div>
      <div class="login-remember">
        <input type="checkbox" id="rememberLogin">
        <label for="rememberLogin">Mantenerme logueado</label>
      </div>
      <button class="login-cta" id="loginBtn" type="button">Acceder</button>
    </div>
  </div>

  <div id="appContent">
    <section class="menu-card">
      <header class="menu-head">
        <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="Corralón Progreso">
        <h1 class="menu-title">Menú principal</h1>
        <div class="menu-sub">Accesos rápidos</div>
        <button class="menu-logout" id="logoutBtn" type="button">Salir</button>
      </header>
      <div class="menu-grid">
        <a class="menu-btn" href="index.html"><strong>Lista de precios</strong><span>Catálogo público</span></a>
        <a class="menu-btn" href="remitos.html"><strong>Remitos</strong><span>Carga y emisión</span></a>
        <a class="menu-btn" href="historial.html"><strong>Historial</strong><span>Remitos y presupuestos</span></a>
        <a class="menu-btn" href="comprobantes.html"><strong>Comprobantes</strong><span>Carga y resumen</span></a>
        <a class="menu-btn" href="soloadmin.html"><strong>Administrar página</strong><span>Panel de administración</span></a>
      </div>
    </section>
  </div>

  <script>
    const ADMIN_PASS = 'Akashiya2301';
    const HISTORIAL_LOGIN_STORAGE_KEY = 'historial_keep_logged_v1';
    const loginBg = document.getElementById('loginBg');
    const appContent = document.getElementById('appContent');
    const loginInput = document.getElementById('loginInput');
    const loginError = document.getElementById('loginError');
    const rememberLogin = document.getElementById('rememberLogin');

    function mostrarMenu() {
      loginBg.style.display = 'none';
      appContent.style.display = 'block';
    }

    function recordarSesion(activar) {
      if (activar) localStorage.setItem(HISTORIAL_LOGIN_STORAGE_KEY, '1');
      else localStorage.removeItem(HISTORIAL_LOGIN_STORAGE_KEY);
    }

    function tieneSesionRecordada() {
      return localStorage.getItem(HISTORIAL_LOGIN_STORAGE_KEY) === '1';
    }

    function verificarPass() {
      const val = String(loginInput.value || '');
      if (val === ADMIN_PASS) {
        recordarSesion(rememberLogin.checked);
        loginError.textContent = '';
        mostrarMenu();
      } else {
        loginError.textContent = '❌ Contraseña incorrecta';
        loginInput.value = '';
        loginInput.focus();
      }
    }

    function cerrarSesion() {
      localStorage.removeItem(HISTORIAL_LOGIN_STORAGE_KEY);
      appContent.style.display = 'none';
      loginBg.style.display = 'flex';
      loginInput.value = '';
      loginError.textContent = '';
      rememberLogin.checked = false;
      loginInput.focus();
    }

    document.getElementById('loginBtn').addEventListener('click', verificarPass);
    document.getElementById('logoutBtn').addEventListener('click', cerrarSesion);
    loginInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') verificarPass();
    });

    rememberLogin.checked = tieneSesionRecordada();
    if (tieneSesionRecordada()) {
      mostrarMenu();
    } else {
      loginInput.focus();
    }
  </script>
</body>
</html>
