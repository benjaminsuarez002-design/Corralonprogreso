<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú principal — Corralón Progreso</title>
<link rel="icon" type="image/x-icon" href="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/icono-corralon-Photoroom.ico">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4efe9;
    --panel: #ffffff;
    --line: #d8cfee;
    --purple: #6c4fc7;
    --purple-dark: #4d35a0;
    --red: #e50000;
    --text: #1f2233;
    --muted: #7b8090;
    --shadow: 0 10px 30px rgba(58, 35, 120, .12);
  }
  body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.95) 0%, transparent 35%),
      radial-gradient(circle at 85% 8%, rgba(108,79,199,.09) 0%, transparent 30%),
      var(--bg);
    padding: 18px;
    display: grid;
    place-items: center;
  }
  .menu-card {
    width: min(100%, 760px);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .menu-head {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(180deg, #faf8ff 0%, #f5f0ff 100%);
  }
  .menu-head img {
    height: 34px;
    width: auto;
    mix-blend-mode: multiply;
  }
  .menu-title {
    font-size: 22px;
    font-weight: 900;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .menu-sub {
    color: var(--muted);
    font-size: 13px;
    margin-left: auto;
    font-weight: 700;
  }
  .menu-grid {
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .menu-btn {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    text-decoration: none;
    color: var(--text);
    background: #fff;
    font-size: 15px;
    font-weight: 800;
    transition: .18s ease;
  }
  .menu-btn:hover {
    border-color: var(--purple);
    box-shadow: inset 0 0 0 1px var(--purple);
    color: var(--purple-dark);
    transform: translateY(-1px);
  }
  .menu-btn strong {
    display: block;
    font-size: 16px;
    color: var(--purple-dark);
  }
  .menu-btn span {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  @media (max-width: 680px) {
    body { padding: 12px; }
    .menu-grid { grid-template-columns: 1fr; padding: 12px; }
    .menu-title { font-size: 18px; }
    .menu-sub { display: none; }
    .menu-head img { height: 30px; }
  }
</style>
</head>
<body>
  <section class="menu-card">
    <header class="menu-head">
      <img src="https://tizyjenayrcdkcodsjnc.supabase.co/storage/v1/object/public/Archivos/c0bb8b29-8b6f-466f-8452-45fb46a1316c.png" alt="Corralón Progreso">
      <h1 class="menu-title">Menú principal</h1>
      <div class="menu-sub">Accesos rápidos</div>
    </header>
    <div class="menu-grid">
      <a class="menu-btn" href="index.html"><strong>Lista de precios</strong><span>Catálogo público</span></a>
      <a class="menu-btn" href="remitos.html"><strong>Remitos</strong><span>Carga y emisión</span></a>
      <a class="menu-btn" href="historial.html"><strong>Historial</strong><span>Remitos y presupuestos</span></a>
      <a class="menu-btn" href="comprobantes.html"><strong>Comprobantes</strong><span>Carga y resumen</span></a>
      <a class="menu-btn" href="soloadmin.html"><strong>Administrar página</strong><span>Panel de administración</span></a>
    </div>
  </section>
</body>
</html>
